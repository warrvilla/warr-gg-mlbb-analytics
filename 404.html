<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="assets/favicon.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Warr.GG</title>
<link rel="stylesheet" href="warr-styles.css">
<style>
  .nf-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;}
  .nf-code{font-family:var(--font-display,inherit);font-size:72px;font-weight:700;letter-spacing:-0.04em;
    background:linear-gradient(135deg,#A888CC,#5E5CE6);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .nf-msg{font-size:14px;color:var(--text2);max-width:380px;line-height:1.5;}
  .nf-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:999px;
    background:var(--glass);border:0.5px solid var(--glass-border);color:var(--text);font-size:13px;font-weight:600;
    text-decoration:none;box-shadow:var(--glass-shadow);transition:transform .15s ease;}
  .nf-btn:hover{transform:translateY(-1px);}
</style>
</head>
<body>
<div class="nf-wrap">
  <img src="assets/logo.png" alt="Warr.GG" style="height:44px;opacity:.9;" onerror="this.remove()">
  <div class="nf-code">404</div>
  <div class="nf-msg">This lane is empty. The page you're looking for was banned, rotated, or never picked.</div>
  <a class="nf-btn" href="/">Back to base</a>
</div>
</body>
</html>
