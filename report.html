<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="assets/favicon.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Report — Warr.GG</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="warr-lib.js"></script>
<script src="warr-nav.js"></script>
<link rel="stylesheet" href="warr-styles.css">
<style>
  .rpt-wrap { max-width: 1080px; margin: 0 auto; padding: 18px 16px 80px; }

  /* ── Control bar ── */
  .rpt-controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    margin-bottom: 18px;
  }
  .rpt-field { display: flex; flex-direction: column; gap: 5px; }
  .rpt-field label {
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--text2); font-weight: 700;
  }
  .rpt-field select, .rpt-field input[type="date"] {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
    color: var(--text); border-radius: 10px; padding: 9px 11px; font: inherit;
    min-width: 150px;
  }
  .rpt-presets { display: flex; flex-wrap: wrap; gap: 6px; }
  .rpt-preset {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
    color: var(--text2); border-radius: 999px; padding: 8px 14px; cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 600; transition: all .15s;
  }
  .rpt-preset:hover { color: var(--text); border-color: rgba(168,136,204,0.4); }
  .rpt-preset.active {
    background: linear-gradient(135deg, rgba(168,136,204,0.22), rgba(94,92,230,0.22));
    border-color: rgba(168,136,204,0.55); color: #F0EAFA;
  }
  .rpt-custom { display: none; gap: 10px; }
  .rpt-custom.show { display: flex; flex-wrap: wrap; }

  /* ── Digest headline ── */
  .rpt-digest {
    background: linear-gradient(135deg, rgba(168,136,204,0.14) 0%, rgba(94,92,230,0.10) 100%);
    border: 1px solid rgba(168,136,204,0.28); border-radius: 16px;
    padding: 18px 20px; margin-bottom: 18px;
  }
  .rpt-digest .dh-team { font-size: 22px; font-weight: 800; letter-spacing: -.01em; }
  .rpt-digest .dh-range { color: var(--text2); font-size: 13px; margin-top: 2px; }
  .rpt-digest .dh-line { margin-top: 12px; font-size: 15px; line-height: 1.55; color: var(--text); }
  .rpt-digest .dh-line b { color: #EBDFFA; }

  /* ── KPI grid ── */
  .rpt-kpis {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .kpi {
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 16px;
  }
  .kpi .k-label { font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--text2); font-weight: 700; }
  .kpi .k-val { font-size: 30px; font-weight: 800; margin-top: 6px; line-height: 1; }
  .kpi .k-sub { font-size: 12px; color: var(--text2); margin-top: 6px; }
  .delta { font-size: 13px; font-weight: 700; }
  .delta.up { color: var(--green); }
  .delta.down { color: var(--red); }
  .delta.flat { color: var(--text2); }

  /* form pips */
  .form-pips { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .pip { width: 20px; height: 20px; border-radius: 6px; font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; }
  .pip.W { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
  .pip.L { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }

  /* ── section cards ── */
  .rpt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 760px){ .rpt-grid { grid-template-columns: 1fr; } }
  .rcard {
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 18px; margin-bottom: 14px;
  }
  .rcard h3 {
    margin: 0 0 14px; font-size: 13px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text2); font-weight: 700;
  }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
  .bar-row .br-label { width: 92px; font-size: 13px; color: var(--text); flex-shrink: 0; }
  .bar-track { flex: 1; height: 9px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; }
  .bar-row .br-val { width: 78px; text-align: right; font-size: 13px; font-weight: 700; flex-shrink: 0; }

  .hero-line { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .hero-line img { width: 30px; height: 30px; border-radius: 8px; object-fit: cover; background: rgba(255,255,255,0.05); }
  .hero-line .hl-name { flex: 1; font-size: 14px; }
  .hero-line .hl-meta { font-size: 12px; color: var(--text2); }
  .hero-line .hl-wr { font-size: 13px; font-weight: 700; width: 44px; text-align: right; }

  table.kda { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.kda th { text-align: left; color: var(--text2); font-weight: 700; font-size: 11px;
    text-transform: uppercase; letter-spacing: .05em; padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  table.kda td { padding: 7px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  table.kda td.r { text-align: right; }

  .insight { display: flex; gap: 8px; align-items: flex-start; font-size: 13.5px; line-height: 1.5; margin-bottom: 8px; }
  .insight .dot { margin-top: 6px; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .insight.good .dot { background: var(--green); }
  .insight.bad .dot { background: var(--red); }

  .series-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13.5px; }
  .series-row .sr-res { width: 22px; height: 22px; border-radius: 6px; font-weight: 800; font-size: 12px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .series-row .sr-res.W { background: var(--green-dim); color: var(--green); }
  .series-row .sr-res.L { background: var(--red-dim); color: var(--red); }
  .series-row .sr-opp { flex: 1; }
  .series-row .sr-meta { color: var(--text2); font-size: 12px; }

  .rpt-empty { text-align: center; padding: 70px 20px; color: var(--text2); }
  .rpt-empty .e-emoji { font-size: 40px; margin-bottom: 12px; opacity: .7; }

  .rpt-actions { display: flex; gap: 8px; margin-left: auto; }

  @media print {
    nav.topnav, .mobile-nav, .rpt-controls, .rpt-actions { display: none !important; }
    body { background: #fff !important; }
  }
</style>
</head>
<body>
<div id="warr-nav-root"></div>
<div class="rpt-wrap">

  <div class="rpt-controls">
    <div class="rpt-field">
      <label for="rTeam">Team</label>
      <select id="rTeam"></select>
    </div>
    <div class="rpt-field" style="flex:1; min-width:240px;">
      <label>Date range</label>
      <div class="rpt-presets" id="rPresets">
        <button class="rpt-preset" data-p="today">Today</button>
        <button class="rpt-preset" data-p="yesterday">Yesterday</button>
        <button class="rpt-preset active" data-p="7d">Last 7 days</button>
        <button class="rpt-preset" data-p="month">This month</button>
        <button class="rpt-preset" data-p="30d">Last 30 days</button>
        <button class="rpt-preset" data-p="all">All time</button>
        <button class="rpt-preset" data-p="custom">Custom</button>
      </div>
      <div class="rpt-custom" id="rCustom" style="margin-top:8px;">
        <input type="date" id="rFrom"><span style="color:var(--text2);align-self:center;">→</span><input type="date" id="rTo">
      </div>
    </div>
    <div class="rpt-actions">
      <button class="btn btn-ghost" id="rPrint">⎙ PDF</button>
      <button class="btn btn-accent" id="rCsv">↓ CSV</button>
    </div>
  </div>

  <div id="rOut"></div>

</div>

<script>
// ═══════════════ Team Report — date-scoped performance ═══════════════
const MAP_NAMES = ['Dangerous Grass','Broken Walls','Flying Cloud','Expanding River'];

function heroImg(name){
  let src = '';
  try { if (WDB && WDB.heroPortrait) src = WDB.heroPortrait(name); } catch(_){}
  return `<img src="${src}" alt="" onerror="this.style.display='none'">`;
}

// ── Stat engine: faithful port of scout's rebuildTeams, for ONE team ──
function computeTeamStats(matches, name){
  const games = matches.filter(m => m.blueTeam===name || m.redTeam===name);
  const t = { name, gamesPlayed: games.length };
  if (!games.length) return t;
  const won = m => (m.winner==='blue'&&m.blueTeam===name)||(m.winner==='red'&&m.redTeam===name);
  const sorted = [...games].sort((a,b)=> new Date(a.date)-new Date(b.date));

  t.wins = games.filter(won).length;
  t.losses = t.gamesPlayed - t.wins;
  t.winRate = Math.round(t.wins/t.gamesPlayed*100);
  t.leagues = [...new Set(games.map(m=>m.league).filter(Boolean))];

  const blueGames = games.filter(m=>m.blueTeam===name);
  const redGames  = games.filter(m=>m.redTeam===name);
  t.blueSideGames = blueGames.length;
  t.redSideGames  = redGames.length;
  t.blueWins = blueGames.filter(m=>m.winner==='blue').length;
  t.redWins  = redGames.filter(m=>m.winner==='red').length;
  t.blueSideWR = t.blueSideGames ? Math.round(t.blueWins/t.blueSideGames*100) : null;
  t.redSideWR  = t.redSideGames  ? Math.round(t.redWins/t.redSideGames*100)   : null;

  t.form = sorted.slice(-8).map(m => won(m) ? 'W' : 'L');
  let streak=0, streakType=null;
  for (let i=sorted.length-1;i>=0;i--){
    const r = won(sorted[i]) ? 'W':'L';
    if (streakType===null){ streakType=r; streak=1; }
    else if (r===streakType) streak++; else break;
  }
  t.streak = { type: streakType, count: streak };

  const pickC={}, banRecC={}, pickW={}, fpC={};
  games.forEach(m => {
    const ours = m.blueTeam===name;
    const w = (ours && m.winner==='blue')||(!ours && m.winner==='red');
    const picks = ours?(m.bluePicks||[]):(m.redPicks||[]);
    const oppBans = ours?(m.redBans||[]):(m.blueBans||[]);
    picks.forEach(p => { const n=p.name||p; if(!n) return; pickC[n]=(pickC[n]||0)+1; if(w) pickW[n]=(pickW[n]||0)+1; });
    oppBans.forEach(b => { const n=b.name||b; if(n) banRecC[n]=(banRecC[n]||0)+1; });
    if (picks[0]){ const n=picks[0].name||picks[0]; if(n) fpC[n]=(fpC[n]||0)+1; }
  });
  t.topPicks = Object.entries(pickC).sort((a,b)=>b[1]-a[1])
    .map(([n,c])=>({name:n,count:c,wr:pickW[n]?Math.round(pickW[n]/c*100):0}));
  t.bansReceived = Object.entries(banRecC).sort((a,b)=>b[1]-a[1]).map(([n,c])=>({name:n,count:c}));
  t.topFirstPick = Object.entries(fpC).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,c])=>({name:n,count:c}));
  t.poolDepth = Object.values(pickC).filter(c=>c>=2).length;

  let turtleTotal=0,turtleWon=0,lordTotal=0,lordWon=0;
  let firstLordOurs=0,firstLordWins=0, fbGames=0,fbOurs=0,fbWins=0;
  let towerGames=0,towerSum=0,oppTowerSum=0;
  const playerKDA={};
  games.forEach(m => {
    const isBlue = m.blueTeam===name, side = isBlue?'blue':'red', w = won(m);
    const obj = m.objectives||{};
    const tArr = obj.turtle || [obj.t1,obj.t2,obj.t3].filter(Boolean) || [];
    const lArr = obj.lord   || [obj.l1,obj.l2,obj.l3].filter(Boolean) || [];
    tArr.forEach(v=>{ if(v){ turtleTotal++; if(v===side) turtleWon++; } });
    lArr.forEach(v=>{ if(v){ lordTotal++; if(v===side) lordWon++; } });
    const firstL = lArr.find(v=>v==='blue'||v==='red');
    if (firstL){ if(firstL===side){ firstLordOurs++; if(w) firstLordWins++; } }
    if (m.firstBlood==='blue'||m.firstBlood==='red'){ fbGames++; if(m.firstBlood===side){ fbOurs++; if(w) fbWins++; } }
    if (m.towers && (m.towers.blue!=null||m.towers.red!=null)){
      const ours = isBlue?m.towers.blue:m.towers.red, opp = isBlue?m.towers.red:m.towers.blue;
      if (ours!=null){ towerGames++; towerSum+=Number(ours)||0; oppTowerSum+=Number(opp)||0; }
    }
    const picks = isBlue?(m.bluePicks||[]):(m.redPicks||[]);
    picks.forEach(p => {
      if (!p || !p.kda || !p.player) return;
      const k=Number(p.kda.k)||0,d=Number(p.kda.d)||0,a=Number(p.kda.a)||0;
      if (!playerKDA[p.player]) playerKDA[p.player]={games:0,k:0,d:0,a:0,lane:p.lane||null,wins:0};
      const pk=playerKDA[p.player]; pk.games++; pk.k+=k; pk.d+=d; pk.a+=a;
      if (p.lane && !pk.lane) pk.lane=p.lane; if (w) pk.wins++;
    });
  });
  t.turtleCtrl = turtleTotal?Math.round(turtleWon/turtleTotal*100):null;
  t.lordCtrl   = lordTotal?Math.round(lordWon/lordTotal*100):null;
  t.firstLordOurs=firstLordOurs; t.firstLordToWin = firstLordOurs?Math.round(firstLordWins/firstLordOurs*100):null;
  t.fbGames=fbGames; t.fbOurs=fbOurs; t.fbRate = fbGames?Math.round(fbOurs/fbGames*100):null;
  t.towerGames=towerGames; t.avgTowers = towerGames?+(towerSum/towerGames).toFixed(1):null;
  t.towerDiff = towerGames?+((towerSum-oppTowerSum)/towerGames).toFixed(1):null;
  t.playerKDA = Object.keys(playerKDA).length?playerKDA:null;
  return t;
}

// ── Series grouping for the recent-results list ──
function groupSeries(matches, name){
  const map = {};
  matches.filter(m=>m.blueTeam===name||m.redTeam===name).forEach(m => {
    const sid = (typeof WDB!=='undefined'&&WDB) && m.seriesId ? m.seriesId
      : `${m.date}|${[m.blueTeam,m.redTeam].sort().join('|')}|${m.week||''}|${m.stage||''}`;
    if (!map[sid]) map[sid]={ date:m.date, league:m.league||'', week:m.week||'', stage:m.stage||'', blueTeam:m.blueTeam, redTeam:m.redTeam, games:[] };
    map[sid].games.push(m);
  });
  const arr = Object.values(map).sort((a,b)=> new Date(b.date)-new Date(a.date));
  arr.forEach(s => {
    s.opponent = s.blueTeam===name ? s.redTeam : s.blueTeam;
    s.ourWins = s.games.filter(g => (g.blueTeam===name&&g.winner==='blue')||(g.redTeam===name&&g.winner==='red')).length;
    s.oppWins = s.games.length - s.ourWins;
    s.result = s.ourWins>=s.oppWins ? 'W':'L';
  });
  return arr;
}

// ── Date helpers ──
const pad = n => String(n).padStart(2,'0');
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
function rangeForPreset(p){
  const today = new Date(); today.setHours(0,0,0,0);
  const t = ymd(today);
  if (p==='today') return { from:t, to:t };
  if (p==='yesterday'){ const y=new Date(today); y.setDate(y.getDate()-1); return { from:ymd(y), to:ymd(y) }; }
  if (p==='7d'){ const f=new Date(today); f.setDate(f.getDate()-6); return { from:ymd(f), to:t }; }
  if (p==='30d'){ const f=new Date(today); f.setDate(f.getDate()-29); return { from:ymd(f), to:t }; }
  if (p==='month'){ const f=new Date(today.getFullYear(),today.getMonth(),1); return { from:ymd(f), to:t }; }
  if (p==='all') return { from:'0000-01-01', to:'9999-12-31' };
  return null;
}
function prevRange(from, to){
  if (from==='0000-01-01') return null;
  const f=new Date(from), tt=new Date(to);
  const days = Math.round((tt-f)/86400000)+1;
  const pTo=new Date(f); pTo.setDate(pTo.getDate()-1);
  const pFrom=new Date(pTo); pFrom.setDate(pFrom.getDate()-(days-1));
  return { from:ymd(pFrom), to:ymd(pTo) };
}
function inRange(m, from, to){ const d=(m.date||''); return d && d>=from && d<=to; }
function fmtDate(s){ const d=new Date(s); return isNaN(d)?s:`${d.toLocaleString('default',{month:'short'})} ${d.getDate()}, ${d.getFullYear()}`; }
function rangeLabel(from,to,preset){
  const names={today:'Today',yesterday:'Yesterday','7d':'Last 7 days','30d':'Last 30 days',month:'This month',all:'All time'};
  if (names[preset] && preset!=='custom') return names[preset];
  return from===to ? fmtDate(from) : `${fmtDate(from)} – ${fmtDate(to)}`;
}

// ── State ──
let ALL = [];           // all matches
let TEAMS = [];         // team names
let _preset = '7d';
let _team = '';

function teamNamesFrom(matches){
  const s = new Set();
  matches.forEach(m => { if(m.blueTeam) s.add(m.blueTeam); if(m.redTeam) s.add(m.redTeam); });
  return [...s].sort((a,b)=>a.localeCompare(b));
}

function deltaHtml(cur, prev){
  if (prev==null || cur==null) return '';
  const d = cur - prev;
  if (d===0) return `<span class="delta flat">±0</span>`;
  const cls = d>0?'up':'down', arrow = d>0?'▲':'▼';
  return `<span class="delta ${cls}">${arrow} ${Math.abs(d)} pts</span>`;
}

function bar(label, val, games, color){
  if (val==null) return `<div class="bar-row"><div class="br-label">${label}</div><div class="bar-track"></div><div class="br-val" style="color:var(--text2)">—</div></div>`;
  return `<div class="bar-row">
    <div class="br-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${val}%;background:${color};"></div></div>
    <div class="br-val">${val}% <span style="color:var(--text2);font-weight:500;">(${games})</span></div>
  </div>`;
}

function render(){
  const out = document.getElementById('rOut');
  if (!_team){ out.innerHTML = `<div class="rpt-empty"><div class="e-emoji">📊</div>No team data yet. Log some matches in Scout first.</div>`; return; }

  let from, to;
  if (_preset==='custom'){ from=document.getElementById('rFrom').value; to=document.getElementById('rTo').value;
    if (!from||!to){ out.innerHTML=`<div class="rpt-empty">Pick a start and end date.</div>`; return; }
    if (from>to){ [from,to]=[to,from]; } }
  else { const r=rangeForPreset(_preset); from=r.from; to=r.to; }

  const cur = ALL.filter(m => inRange(m, from, to));
  const t = computeTeamStats(cur, _team);

  // previous-period comparison
  const pr = prevRange(from, to);
  let prevWR=null, prevGames=0;
  if (pr){ const pt = computeTeamStats(ALL.filter(m=>inRange(m,pr.from,pr.to)), _team); if(pt.gamesPlayed){ prevWR=pt.winRate; prevGames=pt.gamesPlayed; } }

  if (!t.gamesPlayed){
    out.innerHTML = `<div class="rcard" style="text-align:center;padding:50px 20px;color:var(--text2)">
      <div style="font-size:34px;margin-bottom:10px;opacity:.6">🗓️</div>
      <b style="color:var(--text)">${_team}</b> played no games in <b style="color:var(--text)">${rangeLabel(from,to,_preset)}</b>.<br>
      Try a wider range.</div>`;
    return;
  }

  const wrColor = t.winRate>=60?'var(--green)':t.winRate>=50?'var(--gold)':'var(--red)';
  const streakTxt = t.streak.type ? `${t.streak.count}${t.streak.type} streak` : '—';

  // digest line
  const sideTxt = (t.blueSideWR!=null||t.redSideWR!=null)
    ? ` Blue side <b>${t.blueSideWR!=null?t.blueSideWR+'%':'—'}</b> · Red side <b>${t.redSideWR!=null?t.redSideWR+'%':'—'}</b>.` : '';
  const trendTxt = prevWR!=null
    ? (t.winRate>prevWR ? ` Win rate is <b style="color:var(--green)">up ${t.winRate-prevWR} pts</b> vs the previous period.`
      : t.winRate<prevWR ? ` Win rate is <b style="color:var(--red)">down ${prevWR-t.winRate} pts</b> vs the previous period.`
      : ` Win rate is <b>flat</b> vs the previous period.`) : '';
  const topComfort = t.topPicks.filter(p=>p.count>=2).sort((a,b)=>b.wr-a.wr)[0];
  const comfortTxt = topComfort ? ` Best pick: <b>${topComfort.name}</b> (${topComfort.wr}% in ${topComfort.count}).` : '';

  // strengths / focus
  const good=[], bad=[];
  if (t.blueSideWR!=null && t.blueSideWR>=65 && t.blueSideGames>=3) good.push(`Dominant Blue side — ${t.blueSideWR}% (${t.blueSideGames}g)`);
  if (t.redSideWR!=null && t.redSideWR>=65 && t.redSideGames>=3) good.push(`Dominant Red side — ${t.redSideWR}% (${t.redSideGames}g)`);
  if (t.turtleCtrl!=null && t.turtleCtrl>=65) good.push(`Strong Turtle control (${t.turtleCtrl}%)`);
  if (t.lordCtrl!=null && t.lordCtrl>=65) good.push(`Strong Lord control (${t.lordCtrl}%)`);
  if (t.firstLordToWin!=null && t.firstLordToWin>=80 && t.firstLordOurs>=3) good.push(`Closes games — ${t.firstLordToWin}% win after First Lord`);
  const comfortPicks = t.topPicks.filter(p=>p.count>=3 && p.wr>=65);
  if (comfortPicks.length) good.push(`Comfort picks: ${comfortPicks.slice(0,3).map(p=>`${p.name} (${p.wr}%)`).join(', ')}`);
  if (t.towerDiff!=null && t.towerDiff>=3 && t.towerGames>=3) good.push(`+${t.towerDiff} avg tower diff`);

  if (t.blueSideWR!=null && t.blueSideWR<40 && t.blueSideGames>=3) bad.push(`Weak Blue side — ${t.blueSideWR}% (${t.blueSideGames}g)`);
  if (t.redSideWR!=null && t.redSideWR<40 && t.redSideGames>=3) bad.push(`Weak Red side — ${t.redSideWR}% (${t.redSideGames}g)`);
  if (t.blueSideWR!=null && t.redSideWR!=null && Math.abs(t.blueSideWR-t.redSideWR)>25) bad.push(`Side-dependent — Blue ${t.blueSideWR}% vs Red ${t.redSideWR}%`);
  if (t.poolDepth<6 && t.gamesPlayed>=5) bad.push(`Shallow pool — ${t.poolDepth} heroes with 2+ games`);
  const badPicks = t.topPicks.filter(p=>p.count>=3 && p.wr<40);
  if (badPicks.length) bad.push(`Low WR on: ${badPicks.slice(0,3).map(p=>`${p.name} (${p.wr}%)`).join(', ')}`);
  if (t.bansReceived.length>=3) bad.push(`Targeted bans: ${t.bansReceived.slice(0,3).map(b=>b.name).join(', ')}`);
  if (t.fbRate!=null && t.fbRate<=30 && t.fbGames>=4) bad.push(`Low First Blood rate — ${t.fbRate}%`);

  const series = groupSeries(cur, _team);

  // player KDA rows
  let kdaRows='';
  if (t.playerKDA){
    kdaRows = Object.entries(t.playerKDA).filter(([_,p])=>p.games>=1)
      .map(([player,p])=>({player,...p, ratio:((p.k+p.a)/Math.max(1,p.d)), wr:Math.round(p.wins/p.games*100)}))
      .sort((a,b)=>b.games-a.games)
      .map(p => `<tr>
        <td><b>${p.player}</b>${p.lane?` <span style="color:var(--text2);font-size:11px">${p.lane}</span>`:''}</td>
        <td class="r">${p.games}</td>
        <td class="r">${(p.k/p.games).toFixed(1)}/${(p.d/p.games).toFixed(1)}/${(p.a/p.games).toFixed(1)}</td>
        <td class="r" style="color:${p.ratio>=4?'var(--green)':p.ratio>=2.5?'var(--gold)':'var(--red)'};font-weight:700">${p.ratio.toFixed(2)}</td>
        <td class="r" style="color:${p.wr>=50?'var(--green)':'var(--red)'}">${p.wr}%</td>
      </tr>`).join('');
  }

  out.innerHTML = `
    <div class="rpt-digest">
      <div class="dh-team">${_team}</div>
      <div class="dh-range">${rangeLabel(from,to,_preset)} · ${t.gamesPlayed} game${t.gamesPlayed>1?'s':''}${t.leagues.length?` · ${t.leagues.join(', ')}`:''}</div>
      <div class="dh-line">Record <b>${t.wins}–${t.losses}</b> (<b style="color:${wrColor}">${t.winRate}% WR</b>).${trendTxt}${sideTxt}${comfortTxt}</div>
    </div>

    <div class="rpt-kpis">
      <div class="kpi"><div class="k-label">Games</div><div class="k-val">${t.gamesPlayed}</div><div class="k-sub">${series.length} series</div></div>
      <div class="kpi"><div class="k-label">Record</div><div class="k-val">${t.wins}<span style="color:var(--text2);font-size:20px">–${t.losses}</span></div><div class="k-sub">${streakTxt}</div></div>
      <div class="kpi"><div class="k-label">Win rate</div><div class="k-val" style="color:${wrColor}">${t.winRate}%</div><div class="k-sub">${deltaHtml(t.winRate, prevWR)||(prevGames?'':'no prior data')}</div></div>
      <div class="kpi"><div class="k-label">Recent form</div><div class="form-pips">${t.form.map(f=>`<span class="pip ${f}">${f}</span>`).join('')||'—'}</div><div class="k-sub" style="margin-top:8px">last ${t.form.length}</div></div>
    </div>

    <div class="rpt-grid">
      <div class="rcard">
        <h3>Side performance</h3>
        ${bar('Blue side', t.blueSideWR, t.blueSideGames, 'linear-gradient(90deg,#5E9CD6,#5E5CE6)')}
        ${bar('Red side', t.redSideWR, t.redSideGames, 'linear-gradient(90deg,#D87880,#C4607A)')}
      </div>
      <div class="rcard">
        <h3>Objective control</h3>
        ${bar('Turtle', t.turtleCtrl, '', 'linear-gradient(90deg,#4CB87A,#3A9C68)')}
        ${bar('Lord', t.lordCtrl, '', 'linear-gradient(90deg,#C89050,#B07840)')}
        ${bar('First Blood', t.fbRate, t.fbGames, 'linear-gradient(90deg,#A888CC,#8868B0)')}
        ${t.avgTowers!=null?`<div style="font-size:12.5px;color:var(--text2);margin-top:4px">Avg towers ${t.avgTowers} · diff ${t.towerDiff>0?'+':''}${t.towerDiff}</div>`:''}
      </div>
    </div>

    <div class="rpt-grid">
      <div class="rcard">
        <h3>Top picks</h3>
        ${t.topPicks.slice(0,8).map(p=>`<div class="hero-line">${heroImg(p.name)}
          <span class="hl-name">${p.name} <span class="hl-meta">×${p.count}</span></span>
          <span class="hl-wr" style="color:${p.wr>=60?'var(--green)':p.wr>=45?'var(--gold)':'var(--red)'}">${p.wr}%</span></div>`).join('') || '<div style="color:var(--text2)">No picks recorded.</div>'}
      </div>
      <div class="rcard">
        <h3>Bans received (what enemies fear)</h3>
        ${t.bansReceived.slice(0,8).map(b=>`<div class="hero-line">${heroImg(b.name)}
          <span class="hl-name">${b.name}</span>
          <span class="hl-meta">banned ×${b.count}</span></div>`).join('') || '<div style="color:var(--text2)">No bans against you recorded.</div>'}
      </div>
    </div>

    ${kdaRows ? `<div class="rcard"><h3>Player KDA</h3>
      <table class="kda"><thead><tr><th>Player</th><th class="r">G</th><th class="r">Avg K/D/A</th><th class="r">KDA</th><th class="r">WR</th></tr></thead>
      <tbody>${kdaRows}</tbody></table></div>` : ''}

    <div class="rpt-grid">
      <div class="rcard">
        <h3>✓ Strengths</h3>
        ${good.length?good.map(g=>`<div class="insight good"><span class="dot"></span><span>${g}</span></div>`).join(''):'<div style="color:var(--text2)">Not enough data yet for clear strengths.</div>'}
      </div>
      <div class="rcard">
        <h3>⚠ Focus areas</h3>
        ${bad.length?bad.map(g=>`<div class="insight bad"><span class="dot"></span><span>${g}</span></div>`).join(''):'<div style="color:var(--text2)">No clear weaknesses in this range. 🔥</div>'}
      </div>
    </div>

    <div class="rcard">
      <h3>Recent results</h3>
      ${series.slice(0,12).map(s=>`<div class="series-row">
        <div class="sr-res ${s.result}">${s.result}</div>
        <div class="sr-opp">vs <b>${s.opponent||'—'}</b> <span class="sr-meta">${s.ourWins}–${s.oppWins}</span></div>
        <div class="sr-meta">${[s.league,s.week].filter(Boolean).join(' · ')} · ${fmtDate(s.date)}</div>
      </div>`).join('')}
    </div>
  `;
}

function exportCsv(){
  if (!_team) return;
  let from,to;
  if (_preset==='custom'){ from=document.getElementById('rFrom').value; to=document.getElementById('rTo').value; }
  else { const r=rangeForPreset(_preset); from=r.from; to=r.to; }
  const cur = ALL.filter(m=>inRange(m,from,to) && (m.blueTeam===_team||m.redTeam===_team))
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
  const rows = [['Date','League','Week','Side','Opponent','Result','Our picks','Bans received']];
  cur.forEach(m=>{
    const ours = m.blueTeam===_team;
    const won = (ours&&m.winner==='blue')||(!ours&&m.winner==='red');
    const picks = (ours?(m.bluePicks||[]):(m.redPicks||[])).map(p=>p.name||p).join(' / ');
    const bansRec = (ours?(m.redBans||[]):(m.blueBans||[])).map(b=>b.name||b).join(' / ');
    rows.push([m.date||'', m.league||'', m.week||'', ours?'Blue':'Red', ours?m.redTeam:m.blueTeam, won?'W':'L', picks, bansRec]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`warr_report_${_team.replace(/\s+/g,'_')}_${from}_to_${to}.csv`; a.click();
}

// ── Boot ──
(async function(){
  const ok = await WAuth.requireAuth();
  if (!ok) return;
  try { ALL = await WDB.loadMatches(); } catch(e){ ALL = []; }
  TEAMS = teamNamesFrom(ALL);

  const sel = document.getElementById('rTeam');
  sel.innerHTML = TEAMS.map(n=>`<option>${n}</option>`).join('') || '<option value="">No teams</option>';
  // default to the user's own team if it's in the data
  let myTeam=''; try { myTeam = WAuth.getProfile()?.team_name || ''; } catch(_){}
  _team = (myTeam && TEAMS.includes(myTeam)) ? myTeam : (TEAMS[0]||'');
  if (_team) sel.value=_team;

  sel.addEventListener('change', e=>{ _team=e.target.value; render(); });

  document.getElementById('rPresets').addEventListener('click', e=>{
    const b=e.target.closest('.rpt-preset'); if(!b) return;
    _preset=b.dataset.p;
    document.querySelectorAll('.rpt-preset').forEach(x=>x.classList.toggle('active',x===b));
    document.getElementById('rCustom').classList.toggle('show', _preset==='custom');
    if (_preset!=='custom') render();
  });
  document.getElementById('rFrom').addEventListener('change', render);
  document.getElementById('rTo').addEventListener('change', render);
  document.getElementById('rPrint').addEventListener('click', ()=>window.print());
  document.getElementById('rCsv').addEventListener('click', exportCsv);

  // default custom dates = this month
  const r = rangeForPreset('month');
  document.getElementById('rFrom').value=r.from; document.getElementById('rTo').value=r.to;

  render();
})();
</script>
