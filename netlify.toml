# ═══════ Warr.GG — Netlify configuration ═══════

[functions]
  directory = "netlify/functions"

# ── Clean URLs: /heroes instead of /heroes.html ──
# 200 rewrites keep the pretty path in the address bar; the old .html URLs
# keep working (bookmarks, old links) — they just won't be shown by the nav.
# Draft Board retired — merged into AI Battle
[[redirects]]
  from = "/draft"
  to = "/ai_battle"
  status = 301
[[redirects]]
  from = "/draft_board"
  to = "/ai_battle"
  status = 301
[[redirects]]
  from = "/draft_board.html"
  to = "/ai_battle"
  status = 301
[[redirects]]
  from = "/ai_battle"
  to = "/ai_battle.html"
  status = 200
[[redirects]]
  from = "/scout"
  to = "/scout.html"
  status = 200
[[redirects]]
  from = "/stats"
  to = "/stats.html"
  status = 200
# Meta page retired — hero/meta data lives on /heroes
[[redirects]]
  from = "/patch_meta"
  to = "/heroes"
  status = 301
[[redirects]]
  from = "/patch_meta.html"
  to = "/heroes"
  status = 301
[[redirects]]
  from = "/heroes"
  to = "/heroes.html"
  status = 200
[[redirects]]
  from = "/profile"
  to = "/profile.html"
  status = 200
[[redirects]]
  from = "/team_manager"
  to = "/team_manager.html"
  status = 200
[[redirects]]
  from = "/teams"
  to = "/team_manager.html"
  status = 200
[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 200
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
[[redirects]]
  from = "/league_manager"
  to = "/league_manager.html"
  status = 200
[[redirects]]
  from = "/counters"
  to = "/counters.html"
  status = 200
[[redirects]]
  from = "/top100"
  to = "/top100.html"
  status = 200
[[redirects]]
  from = "/meta_export"
  to = "/meta_export.html"
  status = 200

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# ── Asset caching ──
# Hero portraits never change content under a given filename, so let the
# browser keep them for a year. First visit fetches them once; every page
# nav and repeat visit after that is instant (zero network round-trips).
# If you ever re-export a portrait, bump its filename or add ?v=2 to bust.
[[headers]]
  for = "/portraits/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
# Long-lived caching for the rest of the static assets, but revalidated so
# code pushes still go live (Netlify atomic deploys flush on each deploy).
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
