<style>
/* ── Page-level overrides ─────────────────────────────────────── */
.page-body {
  padding: 28px 32px 48px;
  max-width: 100%;
}

.page-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.page-heading-title {
  font-size: 18px;
  font-weight: 800;
  font-family: var(--font-head);
  letter-spacing: .5px;
  color: var(--text);
}
.page-heading-sub {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-left: 2px;
}

/* ── Filter bar ───────────────────────────────────────────────── */
.export-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.export-bar-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-right: 2px;
  flex-shrink: 0;
}
.filter-badge {
  padding: 3px 11px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-head);
  border: 1px solid var(--border2);
  border-radius: 10px;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all .12s;
  letter-spacing: .2px;
}
.filter-badge:hover { color: var(--text2); border-color: var(--border3); }
.filter-badge.active { background: var(--blue-dim); border-color: var(--blue-border); color: var(--blue); }
.gen-btn {
  margin-left: auto;
  padding: 7px 20px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-head);
  background: var(--accent);
  border: none;
  color: #fff;
  cursor: pointer;
  border-radius: var(--radius);
  letter-spacing: .5px;
  transition: opacity .2s, box-shadow .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.gen-btn:hover { opacity: .88; box-shadow: 0 0 16px var(--accent-glow); }
.gen-btn:disabled { opacity: .4; cursor: default; box-shadow: none; }

/* ── Horizontal scroll wrapper ────────────────────────────────── */
.cards-scroll-wrap {
  overflow-x: auto;
  overflow-y: visible;
  padding-bottom: 18px;
  /* Custom scrollbar */
  scrollbar-width: thin;
  scrollbar-color: var(--border3) transparent;
}
.cards-scroll-wrap::-webkit-scrollbar { height: 6px; }
.cards-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
.cards-scroll-wrap::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 6px; }

.cards-grid {
  display: flex;
  flex-direction: row;
  gap: 20px;
  width: max-content;
  padding: 4px 2px 4px;
}

/* ── Per-lane section (label + card) ─────────────────────────── */
.lane-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.lane-heading {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 4px;
}
.lane-heading-bar { width: 18px; height: 2px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
.dl-btn {
  padding: 3px 11px;
  font-size: 10px;
  font-weight: 700;
  background: var(--neon-dim);
  border: 1px solid var(--neon-border);
  color: var(--neon);
  cursor: pointer;
  border-radius: 8px;
  letter-spacing: .5px;
  transition: all .15s;
  margin-left: auto;
}
.dl-btn:hover { background: rgba(76,184,122,.22); }

/* ── Preview wrapper around card ──────────────────────────────── */
.card-preview-wrap {
  overflow: hidden;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  display: inline-block;
  line-height: 0;
  box-shadow: 0 12px 60px rgba(0,0,0,.8), 0 2px 0 rgba(255,255,255,.04) inset;
  flex-shrink: 0;
  transition: box-shadow .2s;
}
.card-preview-wrap:hover {
  box-shadow: 0 20px 80px rgba(0,0,0,.9), 0 2px 0 rgba(255,255,255,.06) inset;
}

/* ═══════════════════════════════════════════════════════════════
   THE META CARD — 750×750 rendered element (scale:2 → 1500×1500)
   ═══════════════════════════════════════════════════════════════ */
.meta-card {
  width: 750px;
  height: 750px;
  overflow: hidden;
  position: relative;
  background: #04040A;
  border-radius: 0;
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
}

/* card top accent bar */
.card-top-bar { height: 5px; width: 100%; }

/* card header row */
.card-header {
  padding: 16px 26px 12px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.card-logo { display: flex; align-items: center; gap: 6px; }
.card-logo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.card-logo-text { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 800; color: #F0F0F8; letter-spacing: .5px; }
.card-lane-title { text-align: center; flex: 1; }
.card-lane-name { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; line-height: 1; }
.card-lane-sub { font-size: 9px; font-weight: 600; color: rgba(240,240,248,.4); letter-spacing: 2px; margin-top: 3px; }
.card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.card-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 6px; letter-spacing: 1px; font-family: 'Inter', sans-serif; }

/* divider */
.card-divider { height: 1px; background: rgba(255,255,255,.07); margin: 0 24px 8px; }

/* ── Tier groups ────────────────────────────────────────────── */
.tier-groups { padding: 0 16px; }

.tier-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 6px;
  border-bottom: 1px solid rgba(255,255,255,.035);
}
.tier-row:last-child { border-bottom: none; }

.tier-label-box {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  flex-shrink: 0;
  margin-top: 3px;
  font-family: 'Inter', sans-serif;
}

.tier-heroes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}

/* individual hero chip inside tier row */
.hero-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 62px;
}
.chip-portrait {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  object-fit: cover;
  background: #161620;
  flex-shrink: 0;
  display: block;
}
.chip-name {
  font-size: 9px;
  font-weight: 700;
  color: #F0F0F8;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 62px;
  font-family: 'Inter', sans-serif;
  line-height: 1.1;
}
.chip-class {
  font-size: 7px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: .3px;
  font-family: 'Inter', sans-serif;
}
.chip-wr {
  font-size: 7px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
}
.chip-mp-dot {
  position: absolute;
  top: -4px;
  right: -4px;
  font-size: 8px;
  line-height: 1;
}

/* card footer */
.card-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 26px;
  border-top: 1px solid rgba(255,255,255,.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,.45);
}
.footer-brand { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 800; color: rgba(240,240,248,.45); letter-spacing: 1px; }
.footer-note { font-size: 9px; color: rgba(240,240,248,.22); letter-spacing: .5px; font-family: 'Inter', sans-serif; }

const ROLE_COLORS = {
  Tank:'#3B82F6', Fighter:'#F97316', Mage:'#A855F7',
  MM:'#F59E0B', Assassin:'#EF4444', Support:'#22C55E',
};

const TIER_MS = { S:9.5, A:8.0, B:6.5, C:5.0, D:3.5 };

// Tier appearance
const TIER_STYLE = {
  S: { bg:'rgba(245,158,11,.2)',  color:'#F59E0B', border:'rgba(245,158,11,.35)' },
  A: { bg:'rgba(156,163,175,.12)',color:'#9CA3AF', border:'rgba(156,163,175,.25)' },
  B: { bg:'rgba(180,83,9,.12)',   color:'#C89050', border:'rgba(180,83,9,.25)' },
  C: { bg:'rgba(75,85,99,.12)',   color:'#6B7280', border:'rgba(75,85,99,.2)' },
};

// ── State ───────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let patchVersion  = null;
let heroScoutStats = {};
let scoutMatchCount = 0;

// ── Init ────────────────────────────────────────────────────────────────────
function init() {
  loadMetaFromStorage();
  loadScoutStats();
  // Apply saved theme
  try {
    const t = localStorage.getItem('warr_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.t === t);
    });
  } catch(e) {}
  // Theme switcher
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.t;
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('warr_theme', t); } catch(e) {}
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
    });
  });
}

function loadMetaFromStorage() {
  try {
    const saved = localStorage.getItem('mlbb_draft_data');
    if (!saved) return;
    const d = JSON.parse(saved);
    if (d.patchVersion) patchVersion = d.patchVersion;
    if (d.metaScores) {
      ALL_HEROES.forEach(h => {
        const s = d.metaScores[h.name];
        if (s) { h.ms = Number(s.ms)||TIER_MS[h.tier]||6; h.tier = s.tier||h.tier; h.mp = s.mp||h.mp; }
      });
    }
    if (d.tierList) {
      ALL_HEROES.forEach(h => {
        const t = d.tierList[h.name];
        if (t) { h.tier = t.tier; h.ms = TIER_MS[t.tier] ?? h.ms; }
      });
    }
  } catch(e) {}
  ALL_HEROES.forEach(h => { if (!h.ms) h.ms = TIER_MS[h.tier] || 6; });
}

function loadScoutStats() {
  try {
    const raw = localStorage.getItem('warr_scout_data');
    const db  = raw ? JSON.parse(raw) : null;
    const raw2 = localStorage.getItem('warr_scout_db');
    const db2  = raw2 ? JSON.parse(raw2) : null;
    const source = db || db2;
    if (!source || !source.matches) return;
    const matches = currentFilter === 'all'
      ? source.matches
      : source.matches.filter(m => m.league === currentFilter);
    scoutMatchCount = matches.length;
    const heroData = {};
    matches.forEach(m => {
      const sides = [
        { picks: m.bluePicks||[], winner: m.winner === 'blue' },
        { picks: m.redPicks||[], winner: m.winner === 'red' },
      ];
      sides.forEach(({ picks, winner }) => {
        (picks||[]).forEach(p => {
          const name = p.name || p;
          if (!heroData[name]) heroData[name] = { picks:0, wins:0 };
          heroData[name].picks++;
          if (winner) heroData[name].wins++;
        });
      });
    });
    heroScoutStats = {};
    Object.entries(heroData).forEach(([name, d]) => {
      if (d.picks >= 3) {
        heroScoutStats[name] = { picks: d.picks, wins: d.wins, winRate: Math.round(d.wins/d.picks*100) };
      }
    });
  } catch(e) { console.warn('Scout load error:', e); }
}

function getHeroLane(h) {
  return (HERO_LANES[h.name] || ['Flex'])[0];
}

function getHeroScore(h) {
  const base   = h.ms || TIER_MS[h.tier] || 6;
  const wr     = heroScoutStats[h.name]?.winRate;
  const wrBoost = wr !== undefined ? (wr >= 60 ? 1.0 : wr >= 55 ? 0.5 : wr >= 45 ? 0 : -0.3) : 0;
  const mpBoost = h.mp === 'mustban' ? 0.8 : h.mp === 'highpick' ? 0.4 : h.mp === 'mustpick' ? 0.6 : 0;
  return base + wrBoost + mpBoost;
}

function getTopForLane(lane) {
  return ALL_HEROES
    .filter(h => getHeroLane(h) === lane)
    .sort((a, b) => getHeroScore(b) - getHeroScore(a))
    .slice(0, 12); // up to 12 heroes per lane for better coverage
}

function getRoleColor(role) {
  for (const [k, v] of Object.entries(ROLE_COLORS)) {
    if (role.includes(k)) return v;
  }
  return '#94A3B8';
}

function getShortRole(role) {
  const map = { Fighter:'Fighter', Assassin:'Assn', Mage:'Mage', MM:'MM', Support:'Supp', Tank:'Tank' };
  const parts = role.split('/');
  return parts.slice(0,2).map(p => map[p.trim()] || p.trim()).join('/');
}

function imgSrc(name) {
  return `portraits/${name}.png`;
}

// ── Card Rendering ──────────────────────────────────────────────────────────
function buildCard(lane) {
  const cfg = LANE_CONFIG[lane];
  const heroes = getTopForLane(lane);
  const filterLabel = currentFilter === 'all' ? 'All Leagues' : currentFilter;
  const patchLabel  = patchVersion ? `PATCH ${patchVersion}` : 'META 2025';

    ? `${scoutMatchCount} games · ${filterLabel}`

    S: { color:'#F59E0B', border:'rgba(245,158,11,.55)' },
    A: { color:'#E0E6F0', border:'rgba(224,230,240,.45)' },
    B: { color:'#C89050', border:'rgba(200,144,80,.5)' },
    C: { color:'#6B7280', border:'rgba(107,114,128,.4)' },

  // 12 heroes max → 4 cols × 3 rows
  const gridHeroes = heroes.slice(0, 12);

  const heroTiles = gridHeroes.map(h => {
    const roleColor = getRoleColor(h.role);
    const shortRole = h.role.split('/')[0];
    const wr        = heroScoutStats[h.name]?.winRate;
    const wrColor   = wr !== undefined ? (wr >= 55 ? '#4CB87A' : wr >= 45 ? '#F59E0B' : '#D87880') : null;
    const tc        = TIER_C[h.tier] || TIER_C.C;
    const isMustban = h.mp === 'mustban';
    const isHot     = h.mp === 'highpick' || h.mp === 'mustpick';
    // Portrait border glows red for mustban, orange for hot picks
    const portraitBorder = isMustban
      ? '2px solid rgba(216,120,128,.65)'
      : isHot ? '2px solid rgba(249,115,22,.55)'
      : '1.5px solid rgba(255,255,255,.07)';

    return `<div style="position:relative;border-radius:12px;overflow:hidden;border:${portraitBorder};background:#0E0E1A;">
      <img src="${imgSrc(h.name)}"
           onerror="this.onerror=null;this.src='portraits/${h.id}.png';this.onerror=function(){this.style.background='#1A1A28'}"
           alt="${h.name}"
           style="width:100%;height:100%;object-fit:cover;display:block;">
      <!-- Bottom gradient overlay -->
      <div style="position:absolute;bottom:0;left:0;right:0;height:66px;background:linear-gradient(to top,rgba(3,3,9,.96) 0%,rgba(3,3,9,.6) 55%,transparent 100%);"></div>
      <!-- Hero name + class + WR -->

        <div style="font-size:12.5px;font-weight:800;color:#F0F0F8;font-family:'Inter',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.15;letter-spacing:-.1px;">${h.name}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:3px;">
          <div style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;background:${roleColor}2E;color:${roleColor};border:1px solid ${roleColor}50;font-family:'Inter',sans-serif;letter-spacing:.2px;">${shortRole}</div>
          ${wr !== undefined ? `<div style="font-size:8.5px;font-weight:800;color:${wrColor};font-family:'Inter',sans-serif;letter-spacing:.2px;">${wr}%</div>` : ''}
        </div>
      </div>
      <!-- Tier badge top-left -->
      <div style="position:absolute;top:7px;left:7px;min-width:20px;height:20px;padding:0 5px;border-radius:5px;background:rgba(0,0,0,.78);color:${tc.color};border:1px solid ${tc.border};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;font-family:'Inter',sans-serif;">${h.tier}</div>
      <!-- Ban / Hot badge top-right -->
      ${isMustban ? `<div style="position:absolute;top:7px;right:7px;font-size:7.5px;font-weight:800;padding:2px 5px;border-radius:4px;background:rgba(216,120,128,.22);color:#D87880;border:1px solid rgba(216,120,128,.5);font-family:'Inter',sans-serif;letter-spacing:.3px;">BAN</div>` : ''}
      ${isHot ? `<div style="position:absolute;top:7px;right:7px;font-size:7.5px;font-weight:800;padding:2px 5px;border-radius:4px;background:rgba(249,115,22,.18);color:#F97316;border:1px solid rgba(249,115,22,.45);font-family:'Inter',sans-serif;letter-spacing:.3px;">HOT</div>` : ''}
    </div>`;
  }).join('');

  /* ── Pixel budget (750 × 750):
       Header  : 152px
       Divider :   3px
       Grid    : 530px  (flex:1)
       Footer  :  65px
       Total   : 750px  ✓
  ──────────────────────────────
     Grid inner (16px L/R, 14px top/12px btm):
       cols  : (750-32-30)/4 = 172px
       rows  : (530-26-20)/3 = 161px
  ─────────────────────────────── */

  return `<div class="meta-card" id="card-${lane}">

    <!-- ── Background layers (absolute, behind everything) ── -->
    <div style="position:absolute;inset:0;background:linear-gradient(148deg,#0C0C1C 0%,#04040A 55%,#080810 100%);z-index:0;"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at -6% -6%,${cfg.color}2A 0%,transparent 52%);z-index:0;"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 110% 110%,${cfg.color}10 0%,transparent 44%);z-index:0;"></div>
    <!-- Watermark lane name -->
    <div style="position:absolute;top:8px;left:-6px;font-size:200px;font-weight:900;font-family:'Inter',sans-serif;color:${cfg.color};opacity:.028;letter-spacing:-10px;line-height:1;text-transform:uppercase;user-select:none;pointer-events:none;z-index:0;">${lane}</div>

    <!-- ── HEADER (152px) ── -->
    <div style="position:relative;z-index:1;height:152px;padding:18px 28px 0;display:flex;flex-direction:column;justify-content:center;flex-shrink:0;">
      <!-- Top micro row: logo + badges -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:7px;">
          <div style="width:7px;height:7px;border-radius:50%;background:${cfg.color};box-shadow:0 0 10px ${cfg.color}99;flex-shrink:0;"></div>
          <div style="font-size:11px;font-weight:800;color:rgba(240,240,248,.45);letter-spacing:2px;font-family:'Inter',sans-serif;text-transform:uppercase;">warr.gg</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <div style="font-size:9px;font-weight:700;padding:3px 11px;border-radius:20px;background:${cfg.color}1C;color:${cfg.color};border:1px solid ${cfg.color}40;font-family:'Inter',sans-serif;letter-spacing:.5px;">${patchLabel}</div>
          <div style="font-size:9px;font-weight:700;padding:3px 11px;border-radius:20px;background:rgba(255,255,255,.05);color:rgba(240,240,248,.35);border:1px solid rgba(255,255,255,.08);font-family:'Inter',sans-serif;letter-spacing:.5px;">${filterLabel.toUpperCase()}</div>
        </div>
      </div>
      <!-- Big lane name row -->
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="font-size:34px;line-height:1;flex-shrink:0;">${cfg.icon}</div>
        <div>
          <div style="font-size:44px;font-weight:900;color:${cfg.color};letter-spacing:3px;text-transform:uppercase;line-height:.92;font-family:'Inter',sans-serif;text-shadow:0 0 55px ${cfg.color}40;">${lane.toUpperCase()} LANE</div>
          <div style="font-size:10px;font-weight:600;color:rgba(240,240,248,.3);letter-spacing:2.5px;margin-top:7px;font-family:'Inter',sans-serif;text-transform:uppercase;">${cfg.roleHint} · TOP META PICKS</div>
        </div>
      </div>
    </div>

    <!-- ── GRADIENT DIVIDER (3px) ── -->
    <div style="position:relative;z-index:1;height:3px;background:linear-gradient(90deg,${cfg.color}80 0%,${cfg.color}28 40%,transparent 72%);flex-shrink:0;"></div>

    <!-- ── HERO GRID (flex:1 → 530px) ── -->
    <div style="position:relative;z-index:1;flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:10px;padding:14px 16px 12px;box-sizing:border-box;">
      ${heroTiles}
    </div>

    <!-- ── FOOTER (65px) ── -->
    <div style="position:relative;z-index:1;height:65px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(0,0,0,.48);border-top:1px solid rgba(255,255,255,.05);">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:5px;height:5px;border-radius:50%;background:${cfg.color};opacity:.65;"></div>
        <div style="font-size:11px;font-weight:800;color:rgba(240,240,248,.32);letter-spacing:1.5px;font-family:'Inter',sans-serif;text-transform:uppercase;">warr.gg · MLBB Draft Intelligence</div>
      </div>
      <div style="font-size:9px;color:rgba(240,240,248,.18);letter-spacing:.5px;font-family:'Inter',sans-serif;">${scoutLabel}</div>
    </div>

  </div>`;
}

// ── Download ────────────────────────────────────────────────────────────────
async function downloadCard(lane) {
  const el = document.getElementById('card-' + lane);
  if (!el) return;
  const btn = document.querySelector(`[data-dl="${lane}"]`);
  if (btn) { btn.textContent = '⏳ Exporting…'; btn.disabled = true; }
  try {
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#06060E',
      width: 750,
      height: 750,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = `warr_meta_${lane.toLowerCase()}_${currentFilter.replace(/\s/g,'_')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Export failed: ' + e.message);
  }
  if (btn) { btn.textContent = '⬇ Download PNG'; btn.disabled = false; }
}

// ── Generate All ────────────────────────────────────────────────────────────
async function generateAll() {
  const btn  = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '⏳ Generating…';
  loadScoutStats();
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  const lanes = ['Gold','EXP','Mid','Jungle','Roam'];
  for (const lane of lanes) {
    const cfg = LANE_CONFIG[lane];
    const section = document.createElement('div');
    section.className = 'lane-section';
    section.innerHTML = `
      <div class="lane-heading">
        <span class="lane-heading-bar" style="background:${cfg.color};"></span>
        ${cfg.label}
        <button class="dl-btn" data-dl="${lane}" onclick="downloadCard('${lane}')">⬇ Download PNG</button>
      </div>
      <div class="card-preview-wrap">${buildCard(lane)}</div>`;
    grid.appendChild(section);
  }
  btn.disabled = false; btn.textContent = '▶ Generate All Cards';
}

// ── Filter ──────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-badge').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

init();
</script>
