<style>
/* ── Page layout ──────────────────────────────────────────────── */
.page-body { padding: 28px 32px 48px; max-width: 100%; }

.page-heading { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.page-heading-title { font-size:18px; font-weight:800; font-family:var(--font-head); letter-spacing:.5px; color:var(--text); }
.page-heading-sub { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-left:2px; }

/* ── Filter bar ───────────────────────────────────────────────── */
.export-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.export-bar-label { font-size:9px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; flex-shrink:0; }
.filter-badge {
  padding: 3px 11px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-head);
  border: 1px solid var(--border2);
  border-radius: 10px;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all .12s;
  letter-spacing: .2px;
}
.filter-badge:hover { color:var(--text2); border-color:var(--border3); }
.filter-badge.active { background:var(--blue-dim); border-color:var(--blue-border); color:var(--blue); }
.gen-btn {
  margin-left: auto;
  padding: 7px 18px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-head);
  background: var(--accent);
  border: none;
  color: #fff;
  cursor: pointer;
  border-radius: var(--radius);
  letter-spacing: .5px;
  transition: opacity .2s, box-shadow .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.gen-btn:hover { opacity:.88; box-shadow:0 0 16px var(--accent-glow); }
.gen-btn:disabled { opacity:.4; cursor:default; box-shadow:none; }

/* ── Legend bar ───────────────────────────────────────────────── */
.legend-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  padding: 8px 14px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  font-family: var(--font-head);
  letter-spacing: .3px;
}
.legend-tier { font-weight: 800; }
.legend-sep { color: var(--border3); margin: 0 2px; }
.legend-drag {
  margin-left: auto;
  font-size: 9px;
  color: var(--text4);
  letter-spacing: .5px;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ── Horizontal scroll wrapper ────────────────────────────────── */
.cards-scroll-wrap {
  overflow-x: auto;
  overflow-y: visible;
  padding-bottom: 18px;
  cursor: grab;
  user-select: none;
  scrollbar-width: thin;
  scrollbar-color: var(--border3) transparent;
}
.cards-scroll-wrap.dragging { cursor: grabbing; }
.cards-scroll-wrap::-webkit-scrollbar { height: 5px; }
.cards-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
.cards-scroll-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 6px; }

.cards-grid {
  display: flex;
  flex-direction: row;
  gap: 18px;
  width: max-content;
  padding: 4px 2px 4px;
}

/* ── Per-lane section ─────────────────────────────────────────── */
.lane-section { display:flex; flex-direction:column; gap:7px; }
.lane-heading {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 2px;
}
.lane-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dl-btn {
  padding: 3px 11px;
  font-size: 10px;
  font-weight: 700;
  background: var(--neon-dim);
  border: 1px solid var(--neon-border);
  color: var(--neon);
  cursor: pointer;
  border-radius: 8px;
  letter-spacing: .5px;
  transition: all .15s;
  margin-left: auto;
}
.dl-btn:hover { background: rgba(76,184,122,.22); }

/* ── Preview wrapper ──────────────────────────────────────────── */
.card-preview-wrap {
  overflow: hidden;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.07);
  display: inline-block;
  line-height: 0;
  box-shadow: 0 8px 40px rgba(0,0,0,.7);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════════
   META CARD — 750×750 px  (html2canvas scale:2 → 1500×1500 PNG)
   Portraits: 44px display → 88px captured from 128px src = crisp
   ═══════════════════════════════════════════════════════════════ */
.meta-card {
  width: 750px;
  height: 750px;
  overflow: hidden;
  position: relative;
  background: #04040B;
  border-radius: 0;
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
}

</style>

// ── State ───────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let patchVersion  = null;
let heroScoutStats = {};
let scoutMatchCount = 0;

// ── Init ────────────────────────────────────────────────────────────────────
function init() {
  loadMetaFromStorage();
  loadScoutStats();
  // Apply saved theme
  try {
    const t = localStorage.getItem('warr_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.t === t);
    });
  } catch(e) {}
  // Theme switcher
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.t;
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('warr_theme', t); } catch(e) {}
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
    });
  });
  initDragScroll();
}

function loadMetaFromStorage() {
  try {
    const saved = localStorage.getItem('mlbb_draft_data');
    if (!saved) return;
    const d = JSON.parse(saved);
    if (d.patchVersion) patchVersion = d.patchVersion;
    if (d.metaScores) {
      ALL_HEROES.forEach(h => {
        const s = d.metaScores[h.name];
        if (s) { h.ms = Number(s.ms)||TIER_MS[h.tier]||6; h.tier = s.tier||h.tier; h.mp = s.mp||h.mp; }
      });
    }
    if (d.tierList) {
      ALL_HEROES.forEach(h => {
        const t = d.tierList[h.name];
        if (t) { h.tier = t.tier; h.ms = TIER_MS[t.tier] ?? h.ms; }
      });
    }
  } catch(e) {}
  ALL_HEROES.forEach(h => { if (!h.ms) h.ms = TIER_MS[h.tier] || 6; });
}

function loadScoutStats() {
  try {
    const raw = localStorage.getItem('warr_scout_data');
    const db  = raw ? JSON.parse(raw) : null;
    const raw2 = localStorage.getItem('warr_scout_db');
    const db2  = raw2 ? JSON.parse(raw2) : null;
    const source = db || db2;
    if (!source || !source.matches) return;
    const matches = currentFilter === 'all'
      ? source.matches
      : source.matches.filter(m => m.league === currentFilter);
    scoutMatchCount = matches.length;
    const heroData = {};
    matches.forEach(m => {
      // Picks
      const sides = [
        { picks: m.bluePicks||[], winner: m.winner === 'blue' },
        { picks: m.redPicks||[], winner: m.winner === 'red' },
      ];
      sides.forEach(({ picks, winner }) => {
        (picks||[]).forEach(p => {
          const name = p.name || p;
          if (!heroData[name]) heroData[name] = { picks:0, wins:0, bans:0 };
          heroData[name].picks++;
          if (winner) heroData[name].wins++;
        });
      });
      // Bans
      [...(m.blueBans||[]), ...(m.redBans||[])].forEach(b => {
        const name = b.name || b;
        if (!heroData[name]) heroData[name] = { picks:0, wins:0, bans:0 };
        heroData[name].bans++;
      });
    });
    heroScoutStats = {};
    Object.entries(heroData).forEach(([name, d]) => {
      const total = d.picks + d.bans;
      if (total >= 2) { // lower threshold so bans-only heroes still surface
        heroScoutStats[name] = {
          picks:    d.picks,
          wins:     d.wins,
          bans:     d.bans,
          winRate:  d.picks > 0 ? Math.round(d.wins / d.picks * 100) : null,
          presence: Math.round(total / scoutMatchCount * 100),
        };
      }
    });
  } catch(e) { console.warn('Scout load error:', e); }
}

function getHeroLane(h) {
  return (HERO_LANES[h.name] || ['Flex'])[0];
}

function getHeroScore(h) {
  const base   = h.ms || TIER_MS[h.tier] || 6;
  const wr     = heroScoutStats[h.name]?.winRate;
  const wrBoost = wr !== undefined ? (wr >= 60 ? 1.0 : wr >= 55 ? 0.5 : wr >= 45 ? 0 : -0.3) : 0;
  const mpBoost = h.mp === 'mustban' ? 0.8 : h.mp === 'highpick' ? 0.4 : h.mp === 'mustpick' ? 0.6 : 0;
  return base + wrBoost + mpBoost;
}

function getTopForLane(lane) {
  const pool = ALL_HEROES.filter(h => getHeroLane(h) === lane);
  // When scout data exists, sort by presence% (pick+ban / total games) — the most
  // effective competitive metric: high presence = hero must be dealt with every draft.
  // Tie-break (and no-data fallback) by composite meta score.
  if (scoutMatchCount > 0) {
    return pool.sort((a, b) => {
      const pa = heroScoutStats[a.name]?.presence ?? 0;
      const pb = heroScoutStats[b.name]?.presence ?? 0;
      if (pb !== pa) return pb - pa;
      return getHeroScore(b) - getHeroScore(a);
    }).slice(0, 12);
  }
  return pool.sort((a, b) => getHeroScore(b) - getHeroScore(a)).slice(0, 12);
}

function getRoleColor(role) {
  for (const [k, v] of Object.entries(ROLE_COLORS)) {
    if (role.includes(k)) return v;
  }
  return '#94A3B8';
}

function getShortRole(role) {
  const map = { Fighter:'Fighter', Assassin:'Assn', Mage:'Mage', MM:'MM', Support:'Supp', Tank:'Tank' };
  const parts = role.split('/');
  return parts.slice(0,2).map(p => map[p.trim()] || p.trim()).join('/');
}

function imgSrc(name) {
  return `portraits/${name}.png`;
}

// ── Full role name map (no abbreviations) ───────────────────────────────────
function fullRoleName(role) {
  const first = (role || '').split('/')[0].trim();
  const MAP = { MM:'Marksman', Support:'Support', Mage:'Mage', Tank:'Tank',
                Fighter:'Fighter', Assassin:'Assassin' };
  return MAP[first] || first;
}

// ── Download ────────────────────────────────────────────────────────────────
async function downloadCard(lane) {
  const el = document.getElementById('card-' + lane);
  if (!el) return;
  const btn = document.querySelector(`[data-dl="${lane}"]`);
  if (btn) { btn.textContent = '⏳ Exporting…'; btn.disabled = true; }
  try {
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#06060E',
      width: 750,
      height: 750,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = `warr_meta_${lane.toLowerCase()}_${currentFilter.replace(/\s/g,'_')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Export failed: ' + e.message);
  }
  if (btn) { btn.textContent = '⬇ Download PNG'; btn.disabled = false; }
}

// ── Generate All ────────────────────────────────────────────────────────────
async function generateAll() {
  const btn  = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '⏳ Generating…';
  loadScoutStats();
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  const lanes = ['Gold','EXP','Mid','Jungle','Roam'];
  for (const lane of lanes) {
    const cfg = LANE_CONFIG[lane];
    const section = document.createElement('div');
    section.className = 'lane-section';
    section.innerHTML = `
      <div class="lane-heading">
        <span class="lane-dot" style="background:${cfg.color};"></span>
        ${cfg.label}
        <button class="dl-btn" data-dl="${lane}" onclick="downloadCard('${lane}')">⬇ Download PNG</button>
      </div>
      <div class="card-preview-wrap">${buildCard(lane)}</div>`;
    grid.appendChild(section);
  }
  btn.disabled = false; btn.textContent = '▶ Generate All Cards';
}

// ── Filter ──────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-badge').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ── Drag-scroll ──────────────────────────────────────────────────────────────
function initDragScroll() {
  const wrap = document.getElementById('cardsScrollWrap');
  if (!wrap) return;
  let isDown = false, startX, scrollLeft;
  wrap.addEventListener('mousedown', e => {
    if (e.target.closest('button')) return;
    isDown = true;
    wrap.classList.add('dragging');
    startX = e.pageX - wrap.offsetLeft;
    scrollLeft = wrap.scrollLeft;
    e.preventDefault();
  });
  wrap.addEventListener('mouseleave', () => { isDown = false; wrap.classList.remove('dragging'); });
  wrap.addEventListener('mouseup',    () => { isDown = false; wrap.classList.remove('dragging'); });
  wrap.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    wrap.scrollLeft = scrollLeft - (e.pageX - wrap.offsetLeft - startX) * 1.5;
  });
}

init();
</script>
