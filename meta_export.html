<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Export — Warr.GG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#07070C; --surface:#101018; --surface2:#161620; --surface3:#1E1E2A;
  --border:rgba(255,255,255,0.07);
  --text:#F0F0F8; --text2:rgba(240,240,248,0.54); --text3:rgba(240,240,248,0.28);
  --gold:#F59E0B; --exp:#F97316; --mid:#A855F7; --jungle:#22C55E; --roam:#5EA0D8;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0a0a14; color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding:20px; }

.page-header { max-width:900px; margin:0 auto 28px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.logo { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:22px; display:flex; align-items:center; gap:8px; }
.logo-dot { width:10px; height:10px; background:#5EA0D8; border-radius:50%; box-shadow:0 0 10px #5EA0D8; }
.page-title { font-size:13px; font-weight:600; color:var(--text2); letter-spacing:1px; }
.filter-bar { max-width:900px; margin:0 auto 24px; background:#101018; border:1px solid rgba(255,255,255,.07); border-radius:10px; padding:14px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.filter-label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
.fbtn { padding:5px 14px; font-size:11px; font-weight:700; border:1px solid rgba(255,255,255,.1); background:transparent; color:var(--text2); cursor:pointer; border-radius:6px; transition:all .15s; letter-spacing:.5px; }
.fbtn:hover { border-color:rgba(255,255,255,.25); color:var(--text); }
.fbtn.active { border-color:#5EA0D8; background:rgba(94,160,216,.15); color:#5EA0D8; }
.gen-btn { margin-left:auto; padding:7px 20px; font-size:12px; font-weight:700; background:linear-gradient(135deg,#5EA0D8,#A855F7); border:none; color:#fff; cursor:pointer; border-radius:7px; letter-spacing:.5px; transition:opacity .2s; }
.gen-btn:hover { opacity:.85; }
.gen-btn:disabled { opacity:.4; cursor:default; }

.cards-grid { max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
.lane-section { }
.lane-heading { font-size:12px; font-weight:700; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.lane-heading span { width:20px; height:2px; border-radius:2px; display:inline-block; }
.dl-btn { padding:5px 14px; font-size:11px; font-weight:700; background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.3); color:#22c55e; cursor:pointer; border-radius:6px; letter-spacing:.5px; transition:all .15s; }
.dl-btn:hover { background:rgba(34,197,94,.22); }

/* ── The actual card (750x750 rendered) ── */
.meta-card {
  width:750px; height:750px; overflow:hidden; position:relative;
  background:#06060E;
  border-radius:0;
  flex-shrink:0;
  font-family:'Inter',sans-serif;
}
.card-top-bar { height:5px; width:100%; }
.card-header { padding:18px 28px 14px; display:flex; align-items:flex-start; justify-content:space-between; }
.card-logo { display:flex; align-items:center; gap:7px; }
.card-logo-dot { width:9px; height:9px; border-radius:50%; }
.card-logo-text { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:#F0F0F8; letter-spacing:.5px; }
.card-lane-title { text-align:center; flex:1; }
.card-lane-name { font-family:'Inter',sans-serif; font-size:28px; font-weight:900; letter-spacing:3px; text-transform:uppercase; line-height:1; }
.card-lane-sub { font-size:10px; font-weight:600; color:rgba(240,240,248,.4); letter-spacing:2px; margin-top:3px; }
.card-badges { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
.card-badge { font-size:9px; font-weight:700; padding:2px 8px; border-radius:6px; letter-spacing:1px; }
.card-divider { height:1px; background:rgba(255,255,255,.07); margin:0 28px 4px; }

/* hero rows */
.hero-rows { padding:0 20px; }
.hero-row { display:flex; align-items:center; gap:12px; padding:6px 8px; border-radius:8px; margin-bottom:3px; position:relative; }
.hero-row:nth-child(odd) { background:rgba(255,255,255,.022); }
.row-rank { font-size:22px; font-weight:900; width:34px; text-align:center; flex-shrink:0; font-family:'Inter',sans-serif; opacity:.85; }
.row-rank.r1 { font-size:26px; }
.row-portrait { width:48px; height:48px; border-radius:10px; object-fit:cover; flex-shrink:0; background:#161620; }
.row-info { flex:1; min-width:0; }
.row-name { font-size:15px; font-weight:800; color:#F0F0F8; letter-spacing:.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-class { font-size:9px; font-weight:700; padding:1px 7px; border-radius:5px; margin-top:3px; display:inline-block; letter-spacing:.5px; }
.row-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.mp-badge { font-size:8px; font-weight:700; padding:1px 6px; border-radius:4px; letter-spacing:.8px; }
.mp-ban { background:rgba(216,120,128,.2); color:#D87880; border:1px solid rgba(216,120,128,.3); }
.mp-pick { background:rgba(249,115,22,.2); color:#F97316; border:1px solid rgba(249,115,22,.3); }
.tier-pill { font-size:11px; font-weight:800; width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; }
.t-S { background:rgba(245,158,11,.2); color:#F59E0B; border:1px solid rgba(245,158,11,.3); }
.t-A { background:rgba(156,163,175,.12); color:#9CA3AF; border:1px solid rgba(156,163,175,.2); }
.t-B { background:rgba(180,83,9,.12); color:#B45309; border:1px solid rgba(180,83,9,.2); }
.t-C { background:rgba(75,85,99,.12); color:#6B7280; border:1px solid rgba(75,85,99,.2); }
.score-block { display:flex; flex-direction:column; align-items:flex-end; gap:2px; width:68px; }
.score-num { font-size:14px; font-weight:800; letter-spacing:-.3px; }
.score-bar-wrap { width:68px; height:4px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:3px; }
.wr-chip { font-size:9px; font-weight:700; padding:2px 7px; border-radius:5px; white-space:nowrap; }
.wr-hi { background:rgba(76,184,122,.18); color:#4CB87A; border:1px solid rgba(76,184,122,.3); }
.wr-mid { background:rgba(200,144,80,.18); color:#C89050; border:1px solid rgba(200,144,80,.3); }
.wr-lo { background:rgba(216,120,128,.18); color:#D87880; border:1px solid rgba(216,120,128,.3); }

.card-footer { position:absolute; bottom:0; left:0; right:0; padding:12px 28px; border-top:1px solid rgba(255,255,255,.05); display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,.4); }
.footer-brand { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:rgba(240,240,248,.5); letter-spacing:1px; }
.footer-note { font-size:9px; color:rgba(240,240,248,.25); letter-spacing:.5px; }

/* preview wrapper */
.card-preview-wrap { overflow:hidden; border-radius:10px; border:1px solid rgba(255,255,255,.07); display:inline-block; line-height:0; }
</style>
</head>

  'Johnson':['Roam'],'Akai':['Roam'],'Minotaur':['Roam'],'Lolita':['Roam'],
  'Grock':['Roam'],'Belerick':['Roam'],'Baxia':['Roam','Jungle'],'Carmilla':['Roam'],
  'Kaja':['Roam'],'Diggie':['Roam'],'Estes':['Roam'],'Rafaela':['Roam'],
  'Edith':['Roam'],
  'Chou':['Roam','Gold'],'Minsitthar':['Roam','EXP'],
  'Jawhead':['Roam'],
};

const LANE_CONFIG = {
  Gold:   { color:'#F59E0B', gradient:'linear-gradient(135deg,#F59E0B,#D97706)', label:'GOLD LANERS',   icon:'🥇', roleHint:'Marksman / Carry' },
  EXP:    { color:'#F97316', gradient:'linear-gradient(135deg,#F97316,#EA580C)', label:'EXP LANERS',    icon:'⚔️', roleHint:'Fighter / Tank' },
  Mid:    { color:'#A855F7', gradient:'linear-gradient(135deg,#A855F7,#7C3AED)', label:'MID LANERS',    icon:'✨', roleHint:'Mage / Assassin' },
  Jungle: { color:'#22C55E', gradient:'linear-gradient(135deg,#22C55E,#16A34A)', label:'JUNGLERS',      icon:'🌿', roleHint:'Assassin / Fighter' },
  Roam:   { color:'#5EA0D8', gradient:'linear-gradient(135deg,#5EA0D8,#3B82F6)', label:'ROAMERS',       icon:'🛡️', roleHint:'Tank / Support' },
};

const ROLE_COLORS = {
  Tank:'#3B82F6', Fighter:'#F97316', Mage:'#A855F7',
  MM:'#F59E0B', Assassin:'#EF4444', Support:'#22C55E',
};

const TIER_MS = { S:9.5, A:8.0, B:6.5, C:5.0, D:3.5 };

// ── State ──────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let patchVersion = null;
let heroScoutStats = {};  // { heroName: { picks, wins, winRate } }
let scoutMatchCount = 0;

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  loadMetaFromStorage();
  loadScoutStats();
}

function loadMetaFromStorage() {
  try {
    const saved = localStorage.getItem('mlbb_draft_data');
    if (!saved) return;
    const d = JSON.parse(saved);
    if (d.patchVersion) patchVersion = d.patchVersion;
    if (d.metaScores) {
      ALL_HEROES.forEach(h => {
        const s = d.metaScores[h.name];
        if (s) { h.ms = Number(s.ms)||TIER_MS[h.tier]||6; h.tier = s.tier||h.tier; h.mp = s.mp||h.mp; }
      });
    }
    if (d.tierList) {
      ALL_HEROES.forEach(h => {
        const t = d.tierList[h.name];
        if (t) { h.tier = t.tier; h.ms = TIER_MS[t.tier] ?? h.ms; }
      });
    }
  } catch(e) {}
  // Default ms from tier if not set
  ALL_HEROES.forEach(h => { if (!h.ms) h.ms = TIER_MS[h.tier] || 6; });
}

function loadScoutStats() {
  try {
    const raw = localStorage.getItem('warr_scout_data');
    const db = raw ? JSON.parse(raw) : null;
    if (!db || !db.matches) return;
    const matches = currentFilter === 'all'
      ? db.matches
      : db.matches.filter(m => m.league === currentFilter);
    scoutMatchCount = matches.length;
    // Compute per-hero pick/win rates with lane context
    const heroData = {};
    matches.forEach(m => {
      const sides = [
        { picks: m.bluePicks||[], winner: m.winner === 'blue' },
        { picks: m.redPicks||[], winner: m.winner === 'red' },
      ];
      sides.forEach(({ picks, winner }) => {
        (picks||[]).forEach(p => {
          const name = p.name || p;
          if (!heroData[name]) heroData[name] = { picks:0, wins:0 };
          heroData[name].picks++;
          if (winner) heroData[name].wins++;
        });
      });
    });
    heroScoutStats = {};
    Object.entries(heroData).forEach(([name, d]) => {
      if (d.picks >= 3) {
        heroScoutStats[name] = { picks: d.picks, wins: d.wins, winRate: Math.round(d.wins/d.picks*100) };
      }
    });
    // Also check warr_scout_db (alternate key)
    if (!scoutMatchCount) {
      const raw2 = localStorage.getItem('warr_scout_db');
      const db2 = raw2 ? JSON.parse(raw2) : null;
      if (db2?.matches) {
        const m2 = currentFilter === 'all' ? db2.matches : db2.matches.filter(m=>m.league===currentFilter);
        scoutMatchCount = m2.length;
        m2.forEach(m => {
          const sides = [
            { picks: m.bluePicks||[], winner: m.winner==='blue' },
            { picks: m.redPicks||[], winner: m.winner==='red' },
          ];
          sides.forEach(({ picks, winner }) => {
            (picks||[]).forEach(p => {
              const name = p.name||p;
              if (!heroData[name]) heroData[name]={picks:0,wins:0};
              heroData[name].picks++;
              if (winner) heroData[name].wins++;
            });
          });
        });
        heroScoutStats = {};
        Object.entries(heroData).forEach(([name, d]) => {
          if (d.picks >= 3) heroScoutStats[name] = { picks:d.picks, wins:d.wins, winRate:Math.round(d.wins/d.picks*100) };
        });
      }
    }
  } catch(e) { console.warn('Scout load error:', e); }
}

function getHeroLane(h) {
  return (HERO_LANES[h.name] || ['Flex'])[0];
}

function getHeroScore(h) {
  const base = h.ms || TIER_MS[h.tier] || 6;
  const wr = heroScoutStats[h.name]?.winRate;
  const wrBoost = wr !== undefined ? (wr >= 60 ? 1.0 : wr >= 55 ? 0.5 : wr >= 45 ? 0 : -0.3) : 0;
  const mpBoost = h.mp === 'mustban' ? 0.8 : h.mp === 'highpick' ? 0.4 : h.mp === 'mustpick' ? 0.6 : 0;
  return base + wrBoost + mpBoost;
}

function getTopForLane(lane) {
  const heroes = ALL_HEROES
    .filter(h => getHeroLane(h) === lane)
    .sort((a, b) => getHeroScore(b) - getHeroScore(a))
    .slice(0, 10);
  return heroes;
}

function getRoleColor(role) {
  for (const [k, v] of Object.entries(ROLE_COLORS)) {
    if (role.includes(k)) return v;
  }
  return '#94A3B8';
}

function getShortRole(role) {
  // Shorten display: "Tank/Fighter" -> "Tank/Ftr", etc.
  const map = { Fighter:'Fighter', Assassin:'Assassin', Mage:'Mage', MM:'Marksman', Support:'Support', Tank:'Tank' };
  const parts = role.split('/');
  return parts.map(p => map[p.trim()] || p.trim()).join(' / ');
}

function imgSrc(name) {
  // Use local portraits folder
  return `portraits/${name}.png`;
}

// ── Card Rendering ─────────────────────────────────────────────────────────
function buildCard(lane) {
  const cfg = LANE_CONFIG[lane];
  const heroes = getTopForLane(lane);
  const filterLabel = currentFilter === 'all' ? 'All Leagues' : currentFilter;
  const patchLabel = patchVersion ? `PATCH ${patchVersion}` : 'META 2025';
  const scoutLabel = scoutMatchCount > 0 ? `${scoutMatchCount} scouted games · ${filterLabel}` : `Default meta ranking`;

  const TIER_SCORE_MAX = 10;

  const rankColors = ['#F59E0B','#C0C0C0','#CD7F32','#94A3B8','#94A3B8','#6B7280','#6B7280','#6B7280','#6B7280','#6B7280'];

  const rows = heroes.map((h, i) => {
    const rank = i + 1;
    const score = Math.min(TIER_SCORE_MAX, h.ms || TIER_MS[h.tier] || 6);
    const scoreStr = score.toFixed(1);
    const barW = Math.round(score / TIER_SCORE_MAX * 100);
    const wr = heroScoutStats[h.name]?.winRate;
    const wrHtml = wr !== undefined
      ? `<div class="wr-chip ${wr>=55?'wr-hi':wr>=45?'wr-mid':'wr-lo'}">${wr}% WR</div>` : '';
    const mpHtml = h.mp==='mustban' ? `<div class="mp-badge mp-ban">MUST BAN</div>`
                 : h.mp==='highpick'||h.mp==='mustpick' ? `<div class="mp-badge mp-pick">HOT PICK</div>` : '';
    const roleColor = getRoleColor(h.role);
    const shortRole = getShortRole(h.role);

    return `<div class="hero-row">
      <div class="row-rank${rank===1?' r1':''}" style="color:${rankColors[i]}">${rank}</div>
      <img class="row-portrait" src="${imgSrc(h.name)}"
           onerror="this.onerror=null;this.src='portraits/${h.id}.png';this.onerror=function(){this.style.background='#${h.color?.replace('#','')||'161620'}'}"
           alt="${h.name}">
      <div class="row-info">
        <div class="row-name">${h.name}</div>
        <div class="row-class" style="background:${roleColor}22;color:${roleColor};border:1px solid ${roleColor}44;">${shortRole}</div>
      </div>
      <div class="row-right">
        ${mpHtml}
        <div class="tier-pill t-${h.tier}">${h.tier}</div>
        ${wrHtml}
        <div class="score-block">
          <div class="score-num" style="color:${cfg.color}">${scoreStr}</div>
          <div class="score-bar-wrap">
            <div class="score-bar-fill" style="width:${barW}%;background:${cfg.gradient}"></div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="meta-card" id="card-${lane}">
    <div class="card-top-bar" style="background:${cfg.gradient}"></div>
    <div class="card-header">
      <div class="card-logo">
        <div class="card-logo-dot" style="background:${cfg.color};box-shadow:0 0 8px ${cfg.color}"></div>
        <div class="card-logo-text">warr.gg</div>
      </div>
      <div class="card-lane-title">
        <div class="card-lane-name" style="color:${cfg.color};text-shadow:0 0 30px ${cfg.color}66">${cfg.label}</div>
        <div class="card-lane-sub">${cfg.roleHint} · Top 10 Meta Picks</div>
      </div>
      <div class="card-badges">
        <div class="card-badge" style="background:${cfg.color}22;color:${cfg.color};border:1px solid ${cfg.color}44;">${patchLabel}</div>
        <div class="card-badge" style="background:rgba(255,255,255,.06);color:rgba(240,240,248,.5);border:1px solid rgba(255,255,255,.1);">${filterLabel.toUpperCase()}</div>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="hero-rows">${rows}</div>
    <div class="card-footer">
      <div class="footer-brand">warr.gg · MLBB Draft Intelligence</div>
      <div class="footer-note">${scoutLabel}</div>
    </div>
  </div>`;
}

// ── Generate + Download ────────────────────────────────────────────────────
async function downloadCard(lane) {
  const el = document.getElementById('card-'+lane);
  if (!el) return;
  const btn = document.querySelector(`[data-dl="${lane}"]`);
  if (btn) { btn.textContent = '⏳ Exporting...'; btn.disabled = true; }
  try {
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#06060E',
      width: 750,
      height: 750,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = `warr_top10_${lane.toLowerCase()}_${currentFilter.replace(/\s/g,'_')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Export failed: ' + e.message);
  }
  if (btn) { btn.textContent = '⬇ Download PNG'; btn.disabled = false; }
}

async function generateAll() {
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '⏳ Generating...';
  loadScoutStats();
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  const lanes = ['Gold','EXP','Mid','Jungle','Roam'];
  for (const lane of lanes) {
    const cfg = LANE_CONFIG[lane];
    const section = document.createElement('div');
    section.className = 'lane-section';
    section.innerHTML = `
      <div class="lane-heading">
        <span style="background:${cfg.color}"></span>
        ${cfg.label}
        <button class="dl-btn" data-dl="${lane}" onclick="downloadCard('${lane}')">⬇ Download PNG</button>
      </div>
      <div class="card-preview-wrap">${buildCard(lane)}</div>`;
    grid.appendChild(section);
  }
  btn.disabled = false; btn.textContent = '▶ Generate All Cards';
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

init();
</script>
</body>
</html>
