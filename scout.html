function getFilteredMatches() {
  const q = matchSearch.toLowerCase();
  return DB_MODULE.getMatches().filter(m => {
    if (leagueFilter !== 'all' && m.league !== leagueFilter) return false;
    if (seasonFilter !== 'all' && (m.season||'') !== seasonFilter) return false;
    if (weekFilter !== 'all') {
      const wk = _weekGroup(m.week) || _UNLABELED_WEEK;
      if (wk !== weekFilter) return false;
    }
    if (q) {
      const inText = m.blueTeam.toLowerCase().includes(q) || m.redTeam.toLowerCase().includes(q) || (m.notes||'').toLowerCase().includes(q);
      let inHero = false, inPlayer = false;
      if (!inText) {
        inHero = [...(m.bluePicks||[]), ...(m.redPicks||[]), ...(m.blueBans||[]), ...(m.redBans||[])]
          .some(h => String((h && (h.name||h)) || '').toLowerCase().includes(q));
      }
      if (!inText && !inHero) {
        inPlayer = [...(m.bluePicks||[]), ...(m.redPicks||[])]
          .some(p => String((p && p.player) || '').toLowerCase().includes(q));
      }
      if (!inText && !inHero && !inPlayer) return false;
    }
    return true;
  });
}

function getFilteredSeries() {
  const matches = getFilteredMatches();
  const map = {};
  matches.forEach(m => {
    const k = DB_MODULE.getSeriesId(m);
    if (!map[k]) map[k] = {
      key: k,
      date: m.date,
      league: m.league||'',
      blueTeam: m.blueTeam,
      redTeam: m.redTeam,
      seriesFormat: m.seriesFormat||'BO3',
      stage: m.stage||'',
      week: m.week||'',
      games: []
    };
    map[k].games.push(m);
  });

  Object.values(map).forEach(s => {
    s.games.sort((a,b) => (Number(a.gameNum)||1) - (Number(b.gameNum)||1));
    const g1 = s.games[0];
    s.blueTeam = g1.blueTeam;
    s.redTeam  = g1.redTeam;
    s.seriesFormat = g1.seriesFormat || s.seriesFormat;
    s.date = s.games.map(g=>g.date).filter(Boolean).sort()[0] || s.date;
    // Track latest savedAt across games for sort tiebreaker. Falls back to 0
    // for matches that pre-date this field; those just sort to the bottom by
    // savedAt but still get their real date for the primary sort.
    s._savedAt = Math.max(...s.games.map(g => Number(g.savedAt) || 0), 0);
  });

  return Object.values(map).sort((a,b) => {
    // Primary sort: by date desc. Invalid dates (NaN) get coerced to 0
    // (epoch) so they don't poison the comparison. Tiebreaker: savedAt desc
    // so a freshly saved match shows above older-saved matches that share
    // its date (e.g. you backfill an old Playoffs day 3 → it appears at the
    // top of that day's group, not mixed in with stale matches).
    if (matchSort==='date') {
      const da = new Date(a.date).getTime(); const db = new Date(b.date).getTime();
      const dAa = isNaN(da) ? 0 : da; const dBb = isNaN(db) ? 0 : db;
      if (dBb !== dAa) return dBb - dAa;
      return (b._savedAt||0) - (a._savedAt||0);
    }
    if (matchSort==='blue')   return a.blueTeam.localeCompare(b.blueTeam);
    if (matchSort==='red')    return a.redTeam.localeCompare(b.redTeam);
    if (matchSort==='league') return (a.league||'').localeCompare(b.league||'');
    // Default fallback — same logic as 'date'
    const da = new Date(a.date).getTime(); const db = new Date(b.date).getTime();
    const dAa = isNaN(da) ? 0 : da; const dBb = isNaN(db) ? 0 : db;
    if (dBb !== dAa) return dBb - dAa;
    return (b._savedAt||0) - (a._savedAt||0);
  });
}

}

// Compute the focus team's stats scoped to a given match pool (the season pool).
function computeFocusStats(name, matches){
  const t={name};
  const games = matches.filter(m=>m.blueTeam===name||m.redTeam===name);
  t.gamesPlayed = games.length;
  t.wins = games.filter(m=>(m.winner==='blue'&&m.blueTeam===name)||(m.winner==='red'&&m.redTeam===name)).length;
  t.losses = t.gamesPlayed - t.wins;
  t.winRate = t.gamesPlayed>0 ? Math.round(t.wins/t.gamesPlayed*100) : 0;
  t.leagues = [...new Set(games.map(m=>m.league).filter(Boolean))];
  const bg=games.filter(m=>m.blueTeam===name), rg=games.filter(m=>m.redTeam===name);
  t.blueSideGames=bg.length; t.redSideGames=rg.length;
  t.blueWins=bg.filter(m=>m.winner==='blue').length; t.redWins=rg.filter(m=>m.winner==='red').length;
  t.blueSideWR = t.blueSideGames?Math.round(t.blueWins/t.blueSideGames*100):null;
  t.redSideWR  = t.redSideGames ?Math.round(t.redWins/t.redSideGames*100):null;
  const pickC={},banC={},pickW={},banRecC={};
  let ftG=0,ftO=0,flG=0,flO=0, tk=0,ta=0,td=0;
  let turtleTot=0,turtleOurs=0, lordTot=0,lordOurs=0;     // objective WIN RATE (% secured)
  let fbG=0,fbO=0;                                         // first blood
  let towerSum=0,towerG=0;                                 // towers pushed per game
  games.forEach(m=>{
    const ours=m.blueTeam===name, side=ours?'blue':'red';
    const won=(ours&&m.winner==='blue')||(!ours&&m.winner==='red');
    const picks=ours?(m.bluePicks||[]):(m.redPicks||[]);
    const bans =ours?(m.blueBans||[]):(m.redBans||[]);
    const oppBans=ours?(m.redBans||[]):(m.blueBans||[]);
    picks.forEach(p=>{const n=p.name||p; pickC[n]=(pickC[n]||0)+1; if(won)pickW[n]=(pickW[n]||0)+1;
      if(p&&p.kda){tk+=Number(p.kda.k)||0; ta+=Number(p.kda.a)||0; td+=Number(p.kda.d)||0;}});
    bans.forEach(b=>{const n=b.name||b; banC[n]=(banC[n]||0)+1;});
    oppBans.forEach(b=>{const n=b.name||b; banRecC[n]=(banRecC[n]||0)+1;});
    const obj=m.objectives||{};
    const tArr=obj.turtle||[obj.t1,obj.t2,obj.t3].filter(Boolean)||[];
    const lArr=obj.lord||[obj.l1,obj.l2,obj.l3].filter(Boolean)||[];
    const fT=tArr.find(v=>v==='blue'||v==='red'); if(fT){ftG++; if(fT===side)ftO++;}
    const fL=lArr.find(v=>v==='blue'||v==='red'); if(fL){flG++; if(fL===side)flO++;}
    // Turtle / Lord WIN RATE = share of ALL contested objectives this team secured
    tArr.forEach(v=>{ if(v==='blue'||v==='red'){ turtleTot++; if(v===side) turtleOurs++; } });
    lArr.forEach(v=>{ if(v==='blue'||v==='red'){ lordTot++;   if(v===side) lordOurs++;   } });
    // First Blood
    if(m.firstBlood==='blue'||m.firstBlood==='red'){ fbG++; if(m.firstBlood===side) fbO++; }
    // Towers pushed (our side's tower count)
    if(m.towers&&(m.towers.blue!=null||m.towers.red!=null)){ const ourT=ours?m.towers.blue:m.towers.red; if(ourT!=null){ towerG++; towerSum+=Number(ourT)||0; } }
  });
  t.topPicks=Object.entries(pickC).sort((a,b)=>b[1]-a[1]).map(([n,c])=>({name:n,count:c,wr:pickW[n]?Math.round(pickW[n]/c*100):0}));
  t.topBans=Object.entries(banC).sort((a,b)=>b[1]-a[1]).map(([n,c])=>({name:n,count:c}));
  t.bansReceived=Object.entries(banRecC).sort((a,b)=>b[1]-a[1]).map(([n,c])=>({name:n,count:c}));
  t.firstTurtleRate = ftG?Math.round(ftO/ftG*100):null;
  t.firstLordRate   = flG?Math.round(flO/flG*100):null;
  t.kd = td?(tk/td).toFixed(2):'—';
  // ── Replacement metrics (real, from scout data) ──
  t.turtleWR   = turtleTot?Math.round(turtleOurs/turtleTot*100):null;   // Turtle Win Rate
  t.lordWR     = lordTot  ?Math.round(lordOurs/lordTot*100):null;       // Lord Win Rate
  t.fbRate     = fbG?Math.round(fbO/fbG*100):null;                      // First Blood %
  t.avgTowers  = towerG?(towerSum/towerG).toFixed(1):null;              // Avg Towers Pushed
  t.avgKills   = t.gamesPlayed?(tk/t.gamesPlayed).toFixed(1):null;      // Avg Kills / game
  t.avgDeaths  = t.gamesPlayed?(td/t.gamesPlayed).toFixed(1):null;      // Avg Death / game
  return t;
}

         <div class="md-tile"><div class="md-tile-ic">◓</div><div><div class="md-tile-v">${t.turtleWR!=null?t.turtleWR+'%':'—'}</div><div class="md-tile-l">Turtle Win Rate</div></div></div>
         <div class="md-tile"><div class="md-tile-ic">✦</div><div><div class="md-tile-v">${t.lordWR!=null?t.lordWR+'%':'—'}</div><div class="md-tile-l">Lord Win Rate</div></div></div>
         <div class="md-tile"><div class="md-tile-ic">⚔&#xFE0E;</div><div><div class="md-tile-v">${t.avgKills!=null?t.avgKills:'—'}</div><div class="md-tile-l">Avg Kills · per game</div></div></div>
         <div class="md-tile"><div class="md-tile-ic">†</div><div><div class="md-tile-v">${t.avgDeaths!=null?t.avgDeaths:'—'}</div><div class="md-tile-l">Avg Death · per game</div></div></div>
       </div>
       <section class="md-logcard" id="matchListStatic">
         <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
           <div><div class="page-title" style="font-size:16px;">Match Log</div><div class="page-sub" id="matchListSub" style="margin-top:2px;"></div></div>
           <div class="search-bar" style="flex:1;min-width:150px;margin-left:auto;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text3);flex-shrink:0;"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg><input id="matchSearchInput" placeholder="Search teams, players, heroes, or notes…" oninput="onMatchSearch(this.value)"></div>
           <select class="form-select" style="width:auto;font-size:11px;" onchange="matchSort=this.value;renderMatchListBody()"><option value="date">Sort by Date</option><option value="league">League</option><option value="blue">Blue Team</option><option value="red">Red Team</option></select>
           <select id="seasonFilterSelect" class="form-select" style="width:auto;font-size:11px;" onchange="setSeasonFilter(this.value)"><option value="all">All Seasons</option></select>
           <select id="weekFilterSelect" class="form-select" style="width:auto;font-size:11px;" onchange="setWeekFilter(this.value)"><option value="all">All Weeks</option></select>
           <button class="btn btn-accent" onclick="openNewMatch()" style="padding:7px 14px;font-size:11px;">+ New Match</button>
         </div>
         <div id="matchListBody"></div>
       </section>
       <div class="md-sidecard md-side-top"><div class="md-side-t">Most Picked Heroes</div><div class="md-hhdr"><span>Pick%</span><span>WR</span></div>${mp}</div>
       <div class="md-side-bot">
         <div class="md-sidecard"><div class="md-side-t">Most Banned Heroes</div>${mb}</div>
         <div class="md-sidecard"><div class="md-side-t">Side Performance</div><div class="md-donuts"><div>${_donut(t.blueSideWR,'#5EA0D8')}<div class="md-dl" style="color:var(--blue)">Blue Side</div><div class="md-ds">${_bw}W - ${_blL}L</div></div><div>${_donut(t.redSideWR,'#D87880')}<div class="md-dl" style="color:var(--red)">Red Side</div><div class="md-ds">${_rw}W - ${_rlL}L</div></div></div></div>
       </div>
   </div>`;
  renderMatchListBody();
  updateSidebarCounts();
}

function onMatchSearch(val) {
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(() => { matchSearch = val; _matchPage = 1; renderMatchListBody(); }, 150);
}

function renderMatchListBody() {
  const body = document.getElementById('matchListBody');
  if (!body) return;
  // Update patch dropdown with unique patches from all matches
  const weekSel = document.getElementById('weekFilterSelect');
  if (weekSel) {
    let pool = DB_MODULE.getMatches();
    if (leagueFilter !== 'all') pool = pool.filter(m => m.league === leagueFilter);
    if (seasonFilter !== 'all') pool = pool.filter(m => (m.season||'') === seasonFilter);
    const hasUnlabeled = pool.some(m => !_weekGroup(m.week));
    const weeks = [...new Set(pool.map(m => _weekGroup(m.week)).filter(Boolean))]
      .sort((a,b) => _weekSortKey(b) - _weekSortKey(a));
    if (weekFilter === 'all' && !_weekAutoPicked && weeks.length > 1) { weekFilter = weeks[0]; }
    _weekAutoPicked = true;
    if (weekFilter !== 'all' && weekFilter !== _UNLABELED_WEEK && !weeks.includes(weekFilter)) weekFilter = 'all';
    weekSel.innerHTML = `<option value="all">All Weeks</option>`
      + weeks.map(w => `<option value="${w.replace(/"/g,'&quot;')}"${weekFilter===w?' selected':''}>${w}</option>`).join('')
      + (hasUnlabeled ? `<option value="${_UNLABELED_WEEK}"${weekFilter===_UNLABELED_WEEK?' selected':''}>Unlabeled</option>` : '');
  }
  // Update season dropdown — scoped to the currently-selected league so "MPL PH" shows only MPL PH seasons
  const seasonSel = document.getElementById('seasonFilterSelect');
  if (seasonSel) {
    const pool = leagueFilter === 'all'
      ? DB_MODULE.getMatches()
      : DB_MODULE.getMatches().filter(m => m.league === leagueFilter);
    const seasons = [...new Set(pool.map(m => (m.season||'').trim()).filter(Boolean))]
      .sort((a,b) => b.localeCompare(a, undefined, {numeric:true}));
    // If currently selected season doesn't exist in this league's pool, reset to 'all'
    if (seasonFilter !== 'all' && !seasons.includes(seasonFilter)) seasonFilter = 'all';
    // Tag the admin-marked current season so the user can see at a glance which one is "now"
    const currentMark = (leagueFilter !== 'all') ? LEAGUE_CURRENT_SEASON[leagueFilter] : null;
    seasonSel.innerHTML = `<option value="all">All Seasons</option>`
      + seasons.map(s => {
          const label = (s === currentMark) ? `${s} (current)` : s;
          return `<option value="${s}"${seasonFilter===s?' selected':''}>${label}</option>`;
        }).join('');
    seasonSel.disabled = seasons.length === 0;
  }
  // Match log is INDEPENDENT of the header's focus team — it shows every series in the
  // current league/season/week/search filter. Switching the header team never changes it.
  const series = getFilteredSeries();
  const subEl = document.getElementById('matchListSub');
  if (subEl) subEl.textContent = `${series.length} series · ${series.reduce((t,s)=>t+s.games.length,0)} games`;
  if (!series.length) {
    body.innerHTML = `<div class="empty-state"><p>No matches logged yet.<br>Click <b>+ New Match</b> to get started.</p></div>`;
    return;
  }

  const _mPages = Math.max(1, Math.ceil(series.length / MATCH_PAGE_SIZE));
  if (_matchPage > _mPages) _matchPage = 1;
  const _pageSeries = series.slice((_matchPage-1)*MATCH_PAGE_SIZE, _matchPage*MATCH_PAGE_SIZE);
  let _lastWeekKey = null;
  body.innerHTML = _pageSeries.map(s => {
    const sk = s.key;
    // Default to EXPANDED for any series the user hasn't explicitly collapsed.
    // The old behavior (undefined → collapsed) made new matches appear to
    // "disappear" — you'd save a Playoffs/Day3/BO5 game and see only the
    // series header because the brand-new sk had no entry in _seriesCollapsed.
    // On "All Leagues" the list is huge — collapse series by default so it's
    // scannable; a specific-league view stays expanded for quick reading.
    // Series are CLOSED by default (open one to see its games). Keeps the
    // list scannable and the pager reachable. _seriesCollapsed[sk]===false
    // means the user explicitly opened it.
    const collapsed = _seriesCollapsed[sk] !== false;
    const lc = LEAGUE_CSS[s.league] || 'lg-other';
    const d = new Date(s.date);
    const day = isNaN(d.getTime()) ? '?' : d.getDate();
    const mon = isNaN(d.getTime()) ? '' : d.toLocaleString('default',{month:'short'});
    // Week group header
    const weekKey = `${s.league}|${s.stage||''}|${s.week||''}`;
    let groupHdr = '';
    if (weekKey !== _lastWeekKey) {
      _lastWeekKey = weekKey;
      const wLabel = s.week || s.stage || 'General';
      const lgLabel = s.league ? `${s.league} — ` : '';
      groupHdr = `<div class="week-group-hdr"><div class="week-group-line"></div><span>${lgLabel}${wLabel}</span><div class="week-group-line"></div></div>`;
    }
    const blueWins = s.games.filter(g => (g.winner==='blue'?g.blueTeam:g.redTeam) === s.blueTeam).length;
    const redWins  = s.games.filter(g => (g.winner==='blue'?g.blueTeam:g.redTeam) === s.redTeam).length;
    const scoreColor = blueWins > redWins ? 'var(--blue)' : redWins > blueWins ? 'var(--red)' : 'var(--text3)';
    const seriesWinner = blueWins > redWins ? s.blueTeam : redWins > blueWins ? s.redTeam : '';

    const gamePanels = s.games.map((g,gi) => {
      const bp = g.bluePicks||[], rp = g.redPicks||[];
      const bb = g.blueBans||[], rb = g.redBans||[];
      const img = (name, size=26) => {
        const id = heroByName(name)?.id || _normKey(name) || name;
        const cls = size === 26 ? 'hero-thumb' : 'hero-thumb-sm';
        return `<img class="${cls}" src="${_heroIcon(name)}" onerror="${_heroIconErr(name)}" title="${name}" style="${size===20?'width:20px;height:20px;':''}">`;
      };
      const line = (picks, bans, color, tn) => `
        <div class="team-draft-line">
          <div class="team-name-col" style="color:${color};" title="${tn}">${tn}</div>
          <div class="draft-heroes">${picks.map(p=>img(p.name||p)).join('')}</div>
          <div class="sep-line"></div>
          <div class="draft-bans">${bans.map(n=>img(n,20)).join('')}</div>
        </div>`;
      const wTeam  = g.winner==='blue' ? g.blueTeam : g.redTeam;
      const wColor = g.winner==='blue' ? 'var(--blue)' : 'var(--red)';
      // Objectives display
      const obj = g.objectives || {};
      const objTeamLabel = (v, blueN, redN) => {
        if (v === 'blue') return `<span class="obj-tag obj-blue">${blueN||'Blue'}</span>`;
        if (v === 'red')  return `<span class="obj-tag obj-red">${redN||'Red'}</span>`;
        return '';
      };
      // Support new array format {turtle:[],lord:[]} and legacy {t1,t2,t3,l1,l2,l3}
      const turtles = obj.turtle || [obj.t1,obj.t2,obj.t3].filter(Boolean);
      const lords   = obj.lord   || [obj.l1,obj.l2,obj.l3].filter(Boolean);
      const hasObj  = turtles.length || lords.length;
      const objRow  = hasObj ? `<div class="obj-row">
        ${turtles.length ? `<span style="font-size:8.5px;font-weight:600;color:var(--text3);letter-spacing:.5px;">TUR</span>${turtles.map((v,i)=>`<span style="font-size:7px;color:var(--text4);">T${i+1}</span>${objTeamLabel(v,g.blueTeam,g.redTeam)}`).join('')}` : ''}
        ${turtles.length && lords.length ? `<div style="width:1px;height:10px;background:var(--border2);"></div>` : ''}
        ${lords.length   ? `<span style="font-size:8.5px;font-weight:600;color:var(--text3);letter-spacing:.5px;">LRD</span>${lords.map((v,i)=>`<span style="font-size:7px;color:var(--text4);">L${i+1}</span>${objTeamLabel(v,g.blueTeam,g.redTeam)}`).join('')}` : ''}
      </div>` : '';

      // team KDA totals + objective counts for this game's summary bar
      const _kSum = arr => (arr||[]).reduce((a,p)=>{const k=(p&&p.kda)||{};a.k+=Number(k.k)||0;a.d+=Number(k.d)||0;a.a+=Number(k.a)||0;return a;},{k:0,d:0,a:0});
      const _bk=_kSum(bp), _rk=_kSum(rp);
      const _hasKda=(_bk.k+_bk.d+_bk.a+_rk.k+_rk.d+_rk.a)>0;
      const _cnt=(arr,sd)=>(arr||[]).filter(v=>v===sd).length;
      const _fb=g.firstBlood==='blue'?g.blueTeam:(g.firstBlood==='red'?g.redTeam:'');
      const _canMod=(typeof WAdmin==='undefined')||(WAdmin.canDelete&&WAdmin.canDelete(g));
      return `<div class="game-panel${gi===0?' active':''}">
        <div class="gp-bar">
          <span class="gp-win" style="background:${wColor}18;color:${wColor};border:1px solid ${wColor}44;">▲ ${wTeam}</span>
          ${turtles.length?`<span class="gp-obj">🐢 <b style="color:var(--blue)">${_cnt(turtles,'blue')}</b>–<b style="color:var(--red)">${_cnt(turtles,'red')}</b></span>`:''}
          ${lords.length?`<span class="gp-obj">✦ <b style="color:var(--blue)">${_cnt(lords,'blue')}</b>–<b style="color:var(--red)">${_cnt(lords,'red')}</b></span>`:''}
          ${_fb?`<span class="gp-obj">FB <b>${_fb}</b></span>`:''}
          ${_hasKda?`<span class="gp-kda"><span style="color:var(--blue)">${_bk.k}/${_bk.d}/${_bk.a}</span><span style="color:var(--text4)">vs</span><span style="color:var(--red)">${_rk.k}/${_rk.d}/${_rk.a}</span></span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
          <span style="font-size:8px;font-weight:700;color:var(--text3);letter-spacing:.5px;">PICKS</span>
          <div style="width:1px;height:8px;background:var(--border2);"></div>
          <span style="font-size:8px;font-weight:700;color:var(--text4);">BANS</span>
          <div style="flex:1;"></div>
          ${g.vodLink ? `<a href="${g.vodLink}" target="_blank" style="font-size:9px;color:var(--blue);text-decoration:none;padding:2px 7px;border:1px solid var(--blue-border);border-radius:8px;">▶ VOD</a>` : ''}
          ${_canMod ? `<button onclick="openEditMatch('${g.id}')" class="del-btn" title="Edit game" style="color:var(--text3);">✎</button>` : ''}
          ${(typeof WAdmin !== 'undefined' && WAdmin.isLockedMatch(g) && !WAdmin.isAdmin())
            ? `<span title="🔒 Official data — only admin can edit/delete" style="font-size:9px;color:var(--text3);padding:2px 7px;border:1px solid var(--border);border-radius:8px;cursor:default;">🔒</span>`
            : `<button onclick="deleteMatch('${g.id}')" class="del-btn">✕</button>`
          }
        </div>
        <div>
          ${line(bp, bb, 'var(--blue)', g.blueTeam)}
          ${line(rp, rb, 'var(--red)',  g.redTeam)}
        </div>
        ${objRow}
      </div>`;
    }).join('');
    // Clickable Game tabs (G1/G2/G3) with the per-game winner chip
    const gameTabs = s.games.map((g,gi)=>{
      const wc=g.winner==='blue'?'var(--blue)':'var(--red)';
      const wl=(g.winner==='blue'?g.blueTeam:g.redTeam)||'';
      return `<button class="gtab${gi===0?' active':''}" onclick="_pickGame(this)">G${g.gameNum||1}<span class="gtab-res" style="background:${wc}22;color:${wc};">${wl}</span></button>`;
    }).join('');

    const _mono=n=>(typeof WDB!=='undefined'&&WDB.teamMonogram)?WDB.teamMonogram(n||'?'):{init:(n||'?')[0]||'?',color:'#7C5CF6'};
    const _bm=_mono(s.blueTeam), _rm=_mono(s.redTeam);
    const _tlogo=n=>(typeof WDB!=='undefined'&&WDB.teamLogo)?WDB.teamLogo(n):'';
    const _res = seriesWinner===s.blueTeam ? 'WIN' : (seriesWinner===s.redTeam ? 'LOSS' : '');
    return groupHdr + `<div class="ml-card">
      <div class="ml-row">
        <div class="ml-date"><div class="ml-day">${day}</div><div class="ml-mon">${(mon||'').toUpperCase()}</div></div>
        <div class="ml-stage"><span class="ml-stage-t">${s.stage||s.league||'Match'}</span><span class="ml-bo">${s.seriesFormat||('BO'+s.games.length)}</span></div>
        <div class="ml-team ml-teamA${seriesWinner===s.blueTeam?' win':''}"><span class="nm">${s.blueTeam}</span><span class="ml-logo" style="--mc:${_bm.color}"><img src="${_tlogo(s.blueTeam)}" loading="lazy" onerror="this.closest('.ml-logo').classList.add('noimg')"><i>${_bm.init}</i></span></div>
        <div class="ml-score"><span class="ml-sc" style="color:${scoreColor}">${blueWins} - ${redWins}</span>${_res?`<span class="ml-res ${_res==='WIN'?'w':'l'}">${_res}</span>`:''}</div>
        <div class="ml-team ml-teamB${seriesWinner===s.redTeam?' win':''}"><span class="ml-logo" style="--mc:${_rm.color}"><img src="${_tlogo(s.redTeam)}" loading="lazy" onerror="this.closest('.ml-logo').classList.add('noimg')"><i>${_rm.init}</i></span><span class="nm">${s.redTeam}</span></div>
        <button class="ml-view" onclick="const x=this.closest('.ml-card').querySelector('.ml-detail');x.classList.toggle('open');this.textContent=x.classList.contains('open')?'Hide ▾':'View Details ▸';">View Details ▸</button>
      </div>
      <div class="ml-detail">${s.games.length>1?`<div class="game-tabs">${gameTabs}</div>`:''}${gamePanels}</div>
    </div>`;
  }).join('') + _renderPager(series.length, MATCH_PAGE_SIZE, _matchPage, 'goMatchPage');
}

// Switch which game is shown within a series (pure DOM swap — no re-render, no scroll jump)
function _pickGame(btn){
  const card = btn.closest('.ml-card'); if(!card) return;
  const tabs = [...card.querySelectorAll('.gtab')];
  const panels = [...card.querySelectorAll('.game-panel')];
  const i = tabs.indexOf(btn);
  tabs.forEach((t,j)=>t.classList.toggle('active', j===i));
  panels.forEach((p,j)=>p.classList.toggle('active', j===i));
}

function toggleSeries(sk) {
  // Toggle aligned with new default (expanded). collapsed === true means collapsed;
  // anything else (undefined, false) is expanded.
  _seriesCollapsed[sk] = _seriesCollapsed[sk] === true ? false : true;
  renderMatchListBody();
}

function deleteMatch(id) {
  // Admin lock — check if this match is from a protected league
  const match = DB_MODULE.getMatches().find(m => m.id === id);
  if (match && typeof WAdmin !== 'undefined' && !WAdmin.canDelete(match)) {
    toast(`🔒 Only the Warr.GG admin can delete ${match.league} data.`, 'error');
    return;
  }
  if (!confirm('Delete this game?')) return;
  DB_MODULE.deleteMatch(id);
  DB_MODULE.rebuildTeams();
  DB_MODULE.save();
  renderMatchList();
  toast('Match deleted');
  // Auto-sync deletion to cloud (non-blocking)
  _setSyncStatus('syncing');
  _cloudDeleteMatch(id);
}

// ══════════════════════════════════════════════════════════════
// MATCH MODAL — OPEN/CLOSE
// ══════════════════════════════════════════════════════════════
function openNewMatch() {
  editingMatchId = null;
  draftStepIndex = 0;
  draftSlots = Array(DRAFT_STEPS.length).fill(null);
  draftLaneFilter = 'All';
  draftHeroSearch = '';
  draftFilterMode = 'lane';
  // Pre-pick the user's most recently filtered league when possible — feels like a smart default.
  const _isAdmNM = typeof WAdmin!=='undefined' && WAdmin.isAdmin && WAdmin.isAdmin();
  const _lockedNM = (typeof WAdmin!=='undefined' && WAdmin.LOCKED_LEAGUES) ? WAdmin.LOCKED_LEAGUES : [];
  const _defaultLeague = _isAdmNM ? 'MPL PH' : 'Scrims';
  let seedLeague = (leagueFilter !== 'all' && LEAGUES.includes(leagueFilter)) ? leagueFilter : _defaultLeague;
  // Non-admins can't seed an official league they can't save to.
  if (!_isAdmNM && _lockedNM.includes(seedLeague)) seedLeague = 'Scrims';
  // Pre-fill the season from that league's admin-marked current_season.
  // Each league has its OWN current_season — MPL PH could be S17 while MPL ID is S15.
  const seedSeason = LEAGUE_CURRENT_SEASON[seedLeague] || '';
  _openMatchModal({
    id:'', league:seedLeague, season:seedSeason, stage:'Regular Season', week:'',
    seriesFormat:'BO3', gameNum:1, blueTeam:'', redTeam:'', winner:'blue',
    date: new Date().toISOString().split('T')[0], vodLink:'', notes:'',
    blueBans:[], redBans:[], bluePicks:[], redPicks:[]
  });
}

// When the League dropdown changes inside the entry modal, swap the Season field
// to that league's current_season — but only if Season is empty OR was the previous
// league's current_season (i.e. user hasn't typed something custom).
function _onLeagueChangedInModal(newLeague) {
  checkLeagueAdminLock(newLeague);
  const sInput = document.getElementById('mf-season');
  if (!sInput) return;
  const cur = (sInput.value || '').trim();
  const isAutoFilled = cur === '' || Object.values(LEAGUE_CURRENT_SEASON).includes(cur);
  if (isAutoFilled) sInput.value = LEAGUE_CURRENT_SEASON[newLeague] || '';
}

function openEditMatch(id) {
  const m = DB_MODULE.getMatches().find(x => x.id === id);
  if (!m) return;
  editingMatchId = id;
  draftSlots = Array(DRAFT_STEPS.length).fill(null);
  draftStepIndex = 0;
  draftLaneFilter = 'All';
  draftHeroSearch = '';

  let bi=0, ri=0, bpi=0, rpi=0;
  DRAFT_STEPS.forEach((step, i) => {
    if (step.type === 'ban') {
      const arr = step.team==='blue' ? m.blueBans : m.redBans;
      const idx = step.team==='blue' ? bi++ : ri++;
      const name = arr && arr[idx];
      if (name) { draftSlots[i] = {heroName:name, heroId:heroByName(name)?.id||name, lane:null, type:'ban', team:step.team}; draftStepIndex = i+1; }
    } else {
      const arr = step.team==='blue' ? m.bluePicks : m.redPicks;
      const idx = step.team==='blue' ? bpi++ : rpi++;
      const pick = arr && arr[idx];
      if (pick) {
        const _h = heroByName(pick.name);
        const _autoLane = pick.lane || (_h ? heroLanes(_h)[0] : null) || null;
        draftSlots[i] = {
          heroName: pick.name,
          heroId: _h?.id || pick.name,
          lane: _autoLane,
          type: 'pick',
          team: step.team,
          player: pick.player || null,
          kda: pick.kda ? { k:pick.kda.k, d:pick.kda.d, a:pick.kda.a } : null,
        };
        draftStepIndex = i+1;
      }
    }
  });

  draftLaneFilter = 'All';
  draftHeroSearch = '';
  draftFilterMode = 'lane';
  _openMatchModal(m);
}

function _openMatchModal(m) {
  const existingTeams = Object.keys(DB_MODULE.getTeams());
  const teamOpts = existingTeams.map(t => `<option value="${t}">${t}</option>`).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'matchModal';
  overlay.innerHTML = `
    <div class="modal" style="max-width:920px;">
      <div class="modal-header">
        <div class="modal-title">${editingMatchId ? 'Edit Match' : '+ New Match'}</div>
        <div style="font-size:10px;color:var(--text3);margin-left:4px;">
          ${editingMatchId ? `ID: <span style="font-family:var(--font-mono);">${editingMatchId}</span>` : ''}
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="closeMatchModal()">✕ Close</button>
      </div>
      <div class="modal-body">

        <!-- MATCH INFO -->
        <div class="card" style="margin-bottom:12px;">
          <div class="card-title">Match Info</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">League</label>

// DRAFT BOARD RENDERING
// ══════════════════════════════════════════════════════════════
function renderDraftBoard() {
  const bd = document.getElementById('draftBoard');
  if (!bd) return;
  const blueTeam = document.getElementById('mf-blue')?.value || 'Blue Side';
  const redTeam  = document.getElementById('mf-red')?.value  || 'Red Side';

  const renderSlot = (step, i) => {
    const sl = draftSlots[i];
    const isActive = (i === draftStepIndex);
    const isBan = step.type === 'ban';
    const cls = ['draft-step', isBan?'ban-step':'pick-step', sl?'':'empty', isActive?'active-step':''].filter(Boolean).join(' ');
    const label = `<span class="step-type ${isBan?'ban-label':'pick-label'}">${isBan?'BAN':'PICK'}</span>`;

    if (sl) {
      const lc = LANE_COLORS[sl.lane] || '';
      const laneBtn = !isBan ? `<span class="lane-pill ${sl.lane?'assigned':''}"
        style="${sl.lane ? `background:${lc}22;color:${lc};border-color:${lc}88;` : ''}"
        onclick="showLanePicker(${i},this)" title="Click to set lane" style="position:relative;">${sl.lane || '+ lane'}</span>` : '';
      const playerBtn = !isBan ? `<span class="lane-pill ${sl.player?'assigned':''}"
        style="${sl.player ? 'background:rgba(124,92,246,0.12);color:var(--accent);border-color:rgba(124,92,246,0.4);' : ''}"
        onclick="showPlayerPicker(${i},this,'${step.team}')" title="Tag player">${sl.player || '+ player'}</span>` : '';
      // Inline K · D · A inputs for picks. Optional — empty fields produce no kda.
      // type=text + inputmode=numeric: type-only behavior, no native spinners, mobile shows numpad.
      const kda = sl.kda || {};
      const kdaInputs = !isBan ? `<span class="kda-trio">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" class="k" data-kda-slot="${i}" data-kda-key="k" value="${kda.k ?? ''}" placeholder="K" onchange="setKda(${i},'k',this.value)" title="Kills">
        <span class="kda-sep">/</span>
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" class="d" data-kda-slot="${i}" data-kda-key="d" value="${kda.d ?? ''}" placeholder="D" onchange="setKda(${i},'d',this.value)" title="Deaths">
        <span class="kda-sep">/</span>
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" class="a" data-kda-slot="${i}" data-kda-key="a" value="${kda.a ?? ''}" placeholder="A" onchange="setKda(${i},'a',this.value)" title="Assists">
      </span>` : '';
      return `<div class="${cls}" data-step="${i}">
        ${label}
        <img src="${_heroIcon(sl.heroName)}" onerror="${_heroIconErr(sl.heroName)}" style="width:26px;height:26px;border-radius:8px;object-fit:cover;flex-shrink:0;">
        <span class="step-name">${sl.heroName}</span>
        ${laneBtn}
        ${playerBtn}
        ${kdaInputs}
        <button onclick="clearDraftSlot(${i})" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:10px;padding:0 2px;flex-shrink:0;line-height:1;">✕</button>
      </div>`;
    }
    return `<div class="${cls}" data-step="${i}" onclick="setDraftStep(${i})">
      ${label}<span class="step-name" style="color:var(--text3);">— empty —</span>
    </div>`;
  };

  const byPhaseTeam = (phase, team, type) =>
    DRAFT_STEPS.map((s,i) => ({s,i})).filter(({s}) => s.phase===phase && s.team===team && s.type===type);

  const blueBans1  = byPhaseTeam(1,'blue','ban'),  redBans1  = byPhaseTeam(1,'red','ban');
  const bluePicks1 = byPhaseTeam(1,'blue','pick'), redPicks1 = byPhaseTeam(1,'red','pick');
  const blueBans2  = byPhaseTeam(2,'blue','ban'),  redBans2  = byPhaseTeam(2,'red','ban');
  const bluePicks2 = byPhaseTeam(2,'blue','pick'), redPicks2 = byPhaseTeam(2,'red','pick');
  const rg = arr => arr.map(({s,i}) => renderSlot(s,i)).join('');

  const filledCount = draftSlots.filter(Boolean).length;
  const pctEl = document.getElementById('draftProgressPct');
  if (pctEl) pctEl.textContent = `${filledCount}/${DRAFT_STEPS.length} steps`;

  bd.innerHTML = `
    <div class="phase-divider">Ban Phase 1 · 3 bans each (B R B R B R)</div>
    <div class="draft-layout">
      <div>
        <div class="draft-col-title" style="background:var(--accent-dim);color:var(--accent);">${blueTeam}</div>
        <div class="draft-step-list">${rg(blueBans1)}</div>
      </div>
      <div class="vs-col">
        <div class="vs-text">VS</div>
        <div class="step-counter">Step ${Math.min(draftStepIndex+1, DRAFT_STEPS.length)}/${DRAFT_STEPS.length}</div>
        <button class="btn btn-ghost btn-sm" onclick="undoDraftStep()" title="Undo last pick">↩</button>
        <button class="btn btn-ghost btn-sm" onclick="resetDraft()" title="Reset draft">Reset</button>
      </div>
      <div>
        <div class="draft-col-title" style="background:var(--red-dim);color:var(--red);">${redTeam}</div>
        <div class="draft-step-list">${rg(redBans1)}</div>
      </div>
    </div>

    <div class="phase-divider">Pick Phase 1 · 3 picks each (B R R B B R)</div>
    <div class="draft-layout">
      <div><div class="draft-step-list">${rg(bluePicks1)}</div></div>
      <div class="vs-col"></div>
      <div><div class="draft-step-list">${rg(redPicks1)}</div></div>
    </div>

    <div class="phase-divider">Ban Phase 2 · 2 bans each (R B R B)</div>
    <div class="draft-layout">
      <div><div class="draft-step-list">${rg(blueBans2)}</div></div>
      <div class="vs-col"></div>
      <div><div class="draft-step-list">${rg(redBans2)}</div></div>
    </div>

    <div class="phase-divider">Pick Phase 2 · 2 picks each (R B B R)</div>
    <div class="draft-layout">
      <div><div class="draft-step-list">${rg(bluePicks2)}</div></div>
      <div class="vs-col"></div>
      <div><div class="draft-step-list">${rg(redPicks2)}</div></div>
    </div>`;

  // Step hint
  const hintEl = document.getElementById('draftStepHint');
  if (hintEl) {
    if (draftStepIndex < DRAFT_STEPS.length) {
      const step = DRAFT_STEPS[draftStepIndex];
      const tn = document.getElementById(step.team==='blue'?'mf-blue':'mf-red')?.value || (step.team==='blue'?'Blue':'Red');
      hintEl.innerHTML = `<span style="color:${step.type==='ban'?'var(--red)':'var(--blue)'};">▶ ${tn} — ${step.type.toUpperCase()} (Phase ${step.phase})</span>`;
    } else {
      hintEl.innerHTML = `<span style="color:var(--green);">✓ Draft complete</span>`;
    }
  }

  renderHeroPool();
}

const ROLES_FILTER = ['All','MM','Mage','Support','Tank','Assassin','Fighter'];
const ROLE_COLORS_F = {MM:'#C89050',Mage:'#7C5CF6',Support:'#4CB87A',Tank:'#5EA0D8',Assassin:'#D87880',Fighter:'#C89050'};

function renderHeroPool() {
  const lf  = document.getElementById('draftLaneFilters');
  const grid = document.getElementById('draftHeroGrid');
  if (!lf || !grid) return;

  const isLane = draftFilterMode !== 'role';
  const filters = isLane ? ['All',...LANES] : ROLES_FILTER;

  // Toggle + filter buttons
  lf.innerHTML =
    `<button class="lf-btn" style="background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.11);color:var(--text2);padding:3px 8px;font-size:9px;letter-spacing:.4px;" onclick="draftFilterMode=draftFilterMode==='lane'?'role':'lane';draftLaneFilter='All';renderHeroPool()">⇄ ${isLane?'By Lane':'By Role'}</button>` +
    filters.map(l => {
      const col = isLane ? (LANE_COLORS[l] || 'var(--text3)') : (ROLE_COLORS_F[l] || 'var(--text3)');
      const active = draftLaneFilter === l;
      return `<button class="lf-btn${active?' active':''}"
        style="${active ? `border-color:${col}66;background:${col}16;color:${col};` : ''}"
        onclick="draftLaneFilter='${l}';renderHeroPool()">
        ${l}
      </button>`;
    }).join('');

  const usedNames = new Set(draftSlots.filter(Boolean).map(s => s.heroName));
  const sq = draftHeroSearch.toLowerCase();

  const heroes = ALL_HEROES.filter(h => {
    if (sq && !h.name.toLowerCase().includes(sq)) return false;
    if (draftLaneFilter !== 'All') {
      if (isLane) {
        if (!heroLanes(h).includes(draftLaneFilter)) return false;
      } else {
        if (h.role.split('/')[0] !== draftLaneFilter) return false;
      }
    }
    return true;
  });

  // Show hero count (helpful when search/filter is active)
  const countEl = document.getElementById('draftPoolCount');
  if (countEl) countEl.textContent = sq || draftLaneFilter !== 'All' ? `${heroes.length} hero${heroes.length!==1?'es':''}` : '';

  grid.innerHTML = heroes.map(h => {
    const used = usedNames.has(h.name);
    const enc = h.name.replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    const pLane = heroLanes(h)[0] || '';
    const laneCol = LANE_COLORS[pLane] || 'var(--text3)';
    return `<div class="hc${used?' hc-used':''}" data-pick="${enc}" title="${h.name} — ${pLane||h.role}">
      <img src="${_heroIcon(h.name)}" onerror="${_heroIconErr(h.name)}">
      <div class="hc-name">${h.name}</div>
      <div class="hc-lane" style="color:${laneCol};">${pLane || '—'}</div>
    </div>`;
  }).join('');

  grid.onclick = e => {
    const card = e.target.closest('[data-pick]');
    if (!card || card.classList.contains('hc-used')) return;
    pickHero(card.dataset.pick.replace(/&amp;/g,'&').replace(/&#39;/g,"'").replace(/&quot;/g,'"'));
  };
}

// Hero → likely lanes is now sourced from WDB.HERO_LANE_DEFAULTS in warr-lib.js
// (single source of truth shared with heroes.html and ai_battle.html). If WDB
// hasn't loaded yet for any reason, fall back to a Flex placeholder.
function heroLanes(h) {
  if (typeof WDB !== 'undefined' && WDB.getHeroLanes) return WDB.getHeroLanes(h.name, h.role);
  return ['Flex'];
}

// HERO_LANES_MAP kept as a lazy alias for any legacy callers that read it directly.
const HERO_LANES_MAP = (typeof WDB !== 'undefined' ? WDB.HERO_LANE_DEFAULTS : {});

function pickHero(name) {
  if (draftStepIndex >= DRAFT_STEPS.length) { toast('Draft complete — all 20 steps filled'); return; }
  const step = DRAFT_STEPS[draftStepIndex];
  const h = heroByName(name);
  if (!h) return;
  // Auto-assign primary lane from WDB.HERO_LANE_DEFAULTS; bans always null.
  const autoLane = step.type === 'pick' ? (heroLanes(h)[0] || null) : null;
  // Auto-assign the team's main player at that lane (if known). Subs can still
  // be set manually via the player picker; we only pre-fill, never overwrite.
  const autoPlayer = step.type === 'pick' ? _defaultPlayerForLane(step.team, autoLane) : null;
  draftSlots[draftStepIndex] = {
    heroName:name, heroId:h.id, lane:autoLane, type:step.type, team:step.team,
    ...(autoPlayer ? { player:autoPlayer } : {}),
  };
  draftStepIndex++;
  renderDraftBoard();
}

// Find the team's main player whose role matches the given lane.
// Uses _scoutPlayers (loaded by loadScoutPlayers when team names are entered).
function _defaultPlayerForLane(team, lane) {
  if (!lane) return null;
  const roster = _scoutPlayers && _scoutPlayers[team];
  if (!Array.isArray(roster) || !roster.length) return null;
  const match = roster.find(p => p.role === lane && p.is_active !== false);
  return match ? match.ign : null;
}

function setDraftStep(i)  { draftStepIndex = i; renderDraftBoard(); }
function undoDraftStep()  { if (draftStepIndex <= 0) return; draftStepIndex--; draftSlots[draftStepIndex] = null; renderDraftBoard(); }
function clearDraftSlot(i){ draftSlots[i] = null; if (draftStepIndex > i) draftStepIndex = i; renderDraftBoard(); }
function resetDraft()     { if (!confirm('Reset entire draft?')) return; draftStepIndex=0; draftSlots=Array(DRAFT_STEPS.length).fill(null); renderDraftBoard(); }

function showLanePicker(idx, el) {
  document.querySelectorAll('.lane-picker-pop').forEach(p => p.remove());
  const pop = document.createElement('div');
  pop.className = 'lane-picker-pop';
  const laneButtons = LANES.map(l => {
    const c = LANE_COLORS[l] || '#94a3b8';
    return `<button style="color:${c};border-color:${c}66;background:${c}11;" onclick="setLaneFromPicker(${idx},'${l}')">${l}</button>`;
  }).join('');
  pop.innerHTML = laneButtons + `<button style="color:var(--text3);border-color:var(--border2);" onclick="setLaneFromPicker(${idx},null)">None</button>`;
  el.style.position = 'relative';
  el.appendChild(pop);
  setTimeout(() => {
    const dismiss = e => {
      if (!pop.contains(e.target) && e.target !== el) {
        pop.remove();
        document.removeEventListener('click', dismiss);
      }
    };
    document.addEventListener('click', dismiss);
  }, 0);
}
function setLaneFromPicker(idx, l) {
  const sl = draftSlots[idx];
  if (sl) {
    const prevLane = sl.lane;
    sl.lane = l || null;
    // Auto-update the player tag if it's empty or was the previous lane's default.
    // This way changing Mid → Roam swaps the player to the Roam main automatically,
    // but if you manually picked a sub, the sub stays.
    const prevDefault = prevLane ? _defaultPlayerForLane(sl.team, prevLane) : null;
    const newDefault  = l ? _defaultPlayerForLane(sl.team, l) : null;
    if (!sl.player || sl.player === prevDefault) {
      if (newDefault) sl.player = newDefault;
      else if (sl.player === prevDefault) sl.player = null;
    }
  }
  document.querySelectorAll('.lane-picker-pop').forEach(p => p.remove());
  renderDraftBoard();
}
function cycleDraftLane(i) { showLanePicker(i, event?.target); } // kept as fallback

// ── Player picker ─────────────────────────────────────────────
let _scoutPlayers = {}; // { blue: [...], red: [...] } loaded when modal opens

async function loadScoutPlayers() {
  const blueTeam = document.getElementById('mf-blue')?.value?.trim();
  const redTeam  = document.getElementById('mf-red')?.value?.trim();
  _scoutPlayers = { blue: [], red: [] };
  if (typeof WDB === 'undefined' || !WDB.loadPlayers) return;
  try {
    const all = await WDB.loadPlayers();
    if (blueTeam) _scoutPlayers.blue = all.filter(p => p.team_name === blueTeam && p.is_active !== false);
    if (redTeam)  _scoutPlayers.red  = all.filter(p => p.team_name === redTeam  && p.is_active !== false);
    // Backfill default players on any existing picks that don't have one yet.
    // Covers the case where user assigned heroes before the roster finished loading.
    let dirty = false;
    if (Array.isArray(draftSlots)) {
      draftSlots.forEach(sl => {
        if (!sl || sl.type !== 'pick' || sl.player || !sl.lane) return;
        const def = _defaultPlayerForLane(sl.team, sl.lane);
        if (def) { sl.player = def; dirty = true; }
      });
    }
    if (dirty && document.getElementById('draftBoard')) renderDraftBoard();
  } catch(e) {}
}

function showPlayerPicker(idx, el, team) {
  document.querySelectorAll('.player-picker-pop').forEach(p => p.remove());

function setPlayerFromPicker(idx, ign) {

// Inline K/D/A handler — writes to draftSlots[i].kda. Empty input = clear field.
// We do NOT re-render here; that would steal focus mid-typing.
function setKda(idx, key, raw) {
  if (!draftSlots[idx]) return;
  const v = raw === '' || raw == null ? null : Math.max(0, Number(raw)|0);
  if (!draftSlots[idx].kda) draftSlots[idx].kda = {};
  if (v == null) delete draftSlots[idx].kda[key];
  else draftSlots[idx].kda[key] = v;
  // Drop the kda object entirely if all fields are empty (keeps saved data clean).
  const k = draftSlots[idx].kda;
  if (k && k.k == null && k.d == null && k.a == null) draftSlots[idx].kda = null;
}

// SAVE MATCH
// ══════════════════════════════════════════════════════════════
function saveMatch() {
  const league    = document.getElementById('mf-league')?.value||'';
  const blueTeam  = document.getElementById('mf-blue')?.value?.trim()||'';
  const redTeam   = document.getElementById('mf-red')?.value?.trim()||'';
  if (!blueTeam || !redTeam) { toast('Enter both team names'); return; }
  if (!league) { toast('Select a league'); return; }
  // Admin lock — only admin can save official competition data
  if (typeof WAdmin !== 'undefined' && !WAdmin.canWrite(league)) {
    toast(`🔒 Only the Warr.GG admin can add ${league} data.`, 'error');
    return;
  }

  const blueBans=[], redBans=[], bluePicks=[], redPicks=[];
  DRAFT_STEPS.forEach((step,i) => {
    const sl = draftSlots[i]; if (!sl) return;
    if (step.type==='ban') { if (step.team==='blue') blueBans.push(sl.heroName); else redBans.push(sl.heroName); }
    else {
      const pick = { name: sl.heroName, lane: sl.lane };
      if (sl.player) pick.player = sl.player;
      // Persist KDA only if at least one of K/D/A was entered. Missing fields default to 0.
      if (sl.kda && (sl.kda.k != null || sl.kda.d != null || sl.kda.a != null)) {
        pick.kda = { k: sl.kda.k || 0, d: sl.kda.d || 0, a: sl.kda.a || 0 };
      }
      if (step.team==='blue') bluePicks.push(pick); else redPicks.push(pick);
    }
  });

  const stage  = (document.getElementById('mf-stage')?.value||'').trim();
  const week   = (document.getElementById('mf-week')?.value||'').trim();
  const date   = document.getElementById('mf-date')?.value || new Date().toISOString().split('T')[0];
  const format = (document.getElementById('mf-format')?.value||'BO3').trim();
  const sortedTeams = [blueTeam, redTeam].sort().join('|');

  // Find existing series to inherit seriesId
  const existingSeries = DB_MODULE.getMatches().find(m => {
    if (m.id === editingMatchId) return false;
    if ([m.blueTeam,m.redTeam].sort().join('|') !== sortedTeams) return false;
    if ((m.league||'').trim() !== league.trim()) return false;
    if ((m.stage||'').trim() !== stage) return false;
    if ((m.seriesFormat||'BO3').trim() !== format) return false;
    if (week && m.week) return m.week.trim() === week;
    return (m.date||'') === date;
  });

  // ── seriesId always derives from CURRENT grouping fields ──
  // Previously we preferred the edited match's old seriesId, which meant fixing
  // a wrong date/week left the match in its stale series — so series lists, side
  // stats, and tempo conversions didn't reflect the correction. Now: try to join
  // an existing sibling game in the corrected series, else fresh hash. If the
  // grouping fields didn't change at all, the hash will be identical anyway.
  const rawKey = `${(week||date).trim()}|${sortedTeams}|${league.trim()}|${stage}|${format}`;
  const seriesId = existingSeries?.seriesId || ('sid_' + DB_MODULE._hashStr(rawKey));

  const _readObjRow = type => [...document.querySelectorAll(`[data-type="${type}"]`)].map(b => b.dataset.val || '').filter(Boolean);
  const objectives = {
    turtle: _readObjRow('turtle'),
    lord:   _readObjRow('lord'),
  };
  // First Blood — empty string means "not entered", which we omit from the saved record.
  const firstBlood = _readFirstBlood();
  // Towers — only persist if at least one side was entered. Missing field saves as null on that side.
  const _tb = document.getElementById('mf-towers-blue')?.value;
  const _tr = document.getElementById('mf-towers-red')?.value;
  const towers = (_tb !== '' || _tr !== '') ? {
    blue: _tb !== '' ? Math.max(0, Number(_tb)|0) : null,
    red:  _tr !== '' ? Math.max(0, Number(_tr)|0) : null,
  } : null;

  // Tag the match with _createdBy at save time. loadFromSupabase uses this
  // to identify which local matches belong to the current user and should
  // be PRESERVED across cloud reloads. Without this, any locally-saved
  // match would be silently deleted on next page reload if the cloud
  // upsert hadn't completed yet — exactly the "match disappeared" bug.
  const _currentUserId = (typeof WAuth !== 'undefined' && WAuth.getUser) ? (WAuth.getUser()?.id || null) : null;
  // Preserve existing _createdBy when editing an old match (don't accidentally
  // re-tag someone else's match as ours during an edit).
  const _existingMatch = editingMatchId ? DB_MODULE.getMatches().find(m => m.id === editingMatchId) : null;
  const _createdBy = (_existingMatch && _existingMatch._createdBy) ? _existingMatch._createdBy : _currentUserId;

  const match = {
    id: editingMatchId || 'match_' + Date.now(),
    league, seriesId,
    season: document.getElementById('mf-season')?.value||'',
    patch: (document.getElementById('mf-patch')?.value||'').trim(),
    stage, week, seriesFormat: format,
    gameNum: Number(document.getElementById('mf-gamenum')?.value)||1,
    blueTeam, redTeam,
    winner: document.getElementById('mf-winner')?.value||'blue',
    date,
    vodLink: document.getElementById('mf-vod')?.value||'',
    notes: document.getElementById('mf-notes')?.value||'',
    blueBans, redBans, bluePicks, redPicks,
    objectives,
    map: document.getElementById('mf-map')?.value || '',
    // Phase-2 optional fields. Saved only when entered; report sections check before rendering.
    ...(firstBlood ? { firstBlood } : {}),
    ...(towers     ? { towers }     : {}),
    _createdBy,
    savedAt: Date.now(),
  };

  DB_MODULE.upsertMatch(match);
  DB_MODULE.rebuildTeams();
  DB_MODULE.save();

  // ── DEFENSIVE FORCED REFRESH ──
  // User-reported bug: toast says saved but the match log doesn't update.
  // Most likely cause: filters silently exclude the saved match, OR the user
  // is on a different view, OR the matchListStatic static structure was built
  // with stale state. Take all three hammers at once:

  // (1) SNAP filters TO the saved match (not away from it) so you stay in
  //     context — e.g. save game 1 of MPL MY Week 7 and you remain on MPL MY
  //     Week 7, ready to add game 2. (Old code reset everything to 'All',
  //     which then bounced Matches view to the default league.)
  leagueFilter = match.league || leagueFilter;
  seasonFilter = (match.season||'').trim() || 'all';
  weekFilter   = _weekGroup(match.week) || 'all';
  _weekAutoPicked = true;           // honor this week; don't re-default to latest
  patchFilter  = 'all';
  matchSearch  = '';

  // (2) Sync UI controls to the saved match's context.
  const _ms = document.getElementById('matchSearchInput');     if (_ms) _ms.value = '';
  const _sf = document.getElementById('seasonFilterSelect');  if (_sf) _sf.value = seasonFilter;
  const _mob= document.getElementById('mobileLeagueSelect');  if (_mob) _mob.value = leagueFilter;
  document.querySelectorAll('.sidebar-btn[id^="sb-"]').forEach(el => {
    const id = el.id.replace('sb-','');
    if (!['matches','teams','meta'].includes(id)) el.classList.toggle('active', id === leagueFilter);
  });

  // (3) Force the just-saved match's series open. seriesId on the match object
  //     is the same key getFilteredSeries groups under.
  try { if (match.seriesId) _seriesCollapsed[match.seriesId] = false; } catch(_) {}

  // (4) Switch view to matches and FORCE the static structure to rebuild
  //     by destroying matchListStatic first. Otherwise the early-return in
  //     renderMatchList keeps a stale shell.
  currentView = 'matches';
  ['matches','teams','meta'].forEach(x => document.getElementById('sb-'+x)?.classList.toggle('active', x==='matches'));
  document.getElementById('matchListStatic')?.remove();

  closeMatchModal();
  // CANONICAL refresh path: showView is the same path the sidebar buttons use,
  // and dispatches to renderMatchList. Using it instead of calling renderMatchList
  // directly avoids any state mismatch with currentView.
  showView('matches');

  // (5) Scroll the saved match into view + brief highlight so the user
  //     visually sees it land. Delay to next frame so DOM is settled.
  setTimeout(() => {
    const main = document.getElementById('mainArea');
    if (main) main.scrollTop = 0;
    if (match.seriesId){
      const card = document.querySelector(`[data-series-key="${match.seriesId}"]`);
      if (card){
        card.scrollIntoView({behavior:'smooth', block:'start'});
        card.style.transition = 'box-shadow .4s ease';
        card.style.boxShadow = '0 0 0 2px var(--accent), 0 8px 32px rgba(124,92,246,0.35)';
        setTimeout(() => { card.style.boxShadow = ''; }, 1800);
      }
    }
  }, 50);

  // Quiet diagnostic — only surfaces a warning if the match is somehow NOT
  // in the rendered set after all the defensive resets. Normal saves get
  // the clean "Match saved" toast.
  const visibleSeries = getFilteredSeries();
  const matchVisible = visibleSeries.some(s => s.games.some(g => g.id === match.id));
  const baseMsg = `✓ Match saved — ${blueTeam} vs ${redTeam}`;
  const warnMsg = matchVisible ? '' : ' · ⚠ Not visible — check date/filter';
  toast(`${baseMsg}${warnMsg}`);

  // Auto-sync to cloud (non-blocking)
  _setSyncStatus('syncing');
  _cloudSaveMatch(match);
}

function _renderTeamsGrid() {
  const teams = Object.values(DB_MODULE.getTeams()).filter(t => {
    if (leagueFilter !== 'all' && !t.leagues?.includes(leagueFilter)) return false;
    if (teamSearch && !t.name.toLowerCase().includes(teamSearch.toLowerCase())) return false;
    return true;
  }).sort((a,b) => {
    if (teamSort==='standing'){ const ar=a.rsRank?+a.rsRank:9999, br=b.rsRank?+b.rsRank:9999; if(ar!==br) return ar-br; return (b.winRate||0)-(a.winRate||0); }
    if (teamSort==='games')   return (b.gamesPlayed||0)-(a.gamesPlayed||0);
    if (teamSort==='winrate') return (b.winRate||0)-(a.winRate||0);
    if (teamSort==='wins')    return (b.wins||0)-(a.wins||0);
    if (teamSort==='name')    return a.name.localeCompare(b.name);
    if (teamSort==='bluewr')  return (b.blueSideWR||0)-(a.blueSideWR||0);
    if (teamSort==='redwr')   return (b.redSideWR||0)-(a.redSideWR||0);
    if (teamSort==='pool')    return (b.poolDepth||0)-(a.poolDepth||0);
    return (b.gamesPlayed||0)-(a.gamesPlayed||0);
  });

  const grid = document.getElementById('teamsGrid');
  if (!teams.length) {
    grid.innerHTML = `<div class="empty-state"><p>No team profiles yet.<br>Log matches to auto-generate team data.</p></div>`;
    return;

  grid.className = 'team-grid';

    const lg=(t.leagues&&t.leagues[0])||'';
    const mo=(typeof WDB!=='undefined'&&WDB.teamMonogram)?WDB.teamMonogram(t.name):{init:(t.name||'?')[0],color:'#7C5CF6'};
    const logo=(typeof WDB!=='undefined'&&WDB.teamLogo)?WDB.teamLogo(t.name):'';
    const form=(t.form||[]).slice(-5).map(r=>`<span class="tc-fl ${r==='W'?'w':'l'}">${r}</span>`).join('');
    const streak=(t.streak&&t.streak.count>1&&t.streak.type==='W')?`<span class="tc-streak">W${t.streak.count}</span>`:'';
    const maps=_TMAPS.map(mp=>{const sm=(t.mapStats||{})[mp]; const has=sm&&sm.games; const c=has?_C(sm.wr):'var(--text3)';
      return `<div class="tc-map"><span class="tc-map-ico">◈</span><span class="tc-map-nm">${mp}</span><div class="tc-map-bar"><i style="width:${has?sm.wr:0}%;background:${c}"></i></div><span class="tc-map-pct" style="color:${c}">${has?sm.wr+'%':'—'}</span><span class="tc-map-g">${has?sm.games+'g':''}</span></div>`;}).join('');
    const cell=(name,l1,l1c,l2)=>`<div class="tc-hero"><img src="${_heroIcon(name)}" onerror="${_heroIconErr(name)}"><div class="tc-hero-nm">${name}</div><div class="tc-hero-l1" style="color:${l1c}">${l1}</div>${l2?`<div class="tc-hero-l2">${l2}</div>`:''}</div>`;
    const tpc=(t.topPicks||[]).slice(0,5).map(p=>cell(p.name,(p.wr||0)+'%',_C(p.wr||0),'x'+p.count)).join('')||'<span class="tc-none">No data</span>';
    const tbc=(t.topBans||[]).slice(0,5).map(b=>cell(b.name,'x'+b.count,'var(--red)','')).join('')||'<span class="tc-none">No data</span>';

      </div>
      <div class="tc-top">
        <div class="tc-logo-lg${logo?'':' noimg'}"><img src="${logo}" onerror="this.closest('.tc-logo-lg').classList.add('noimg')"><i>${mo.init}</i></div>
        <div class="tc-hstats">
          <div class="tc-h1">
            <div class="tc-big"><div class="tc-bigv" style="color:${wrc}">${wr}%</div><div class="tc-kl">Win Rate</div></div>
            <div><div class="tc-kv">${t.wins||0}W ${t.losses||0}L</div><div class="tc-kl">Record</div></div>
          </div>

          </div>

        <div class="tc-s"><div class="tc-sl">Lord Ctrl</div><div class="tc-sv" style="color:var(--gold)">${t.lordCtrl!=null?t.lordCtrl+'%':'—'}<span> ${t.lordTotal?'('+t.lordTotal+')':''}</span></div></div>

// One-click: push every locally-stored team profile (rank, placement, link,
// win condition, notes) up to the cloud team_meta table. Fixes the case where
// info was entered before the table/sync existed, so it never reached other accounts.
async function syncAllTeamMeta() {
  if (!(typeof WAdmin!=='undefined' && WAdmin.isAdmin && WAdmin.isAdmin())) { toast('Admin only','error'); return; }
  if (!(typeof WDB!=='undefined' && WDB.saveTeamMeta)) { toast('Sync unavailable','error'); return; }
  const teams = DB_MODULE.getTeams();
  const targets = Object.entries(teams).filter(([,t]) =>
    t && ((t.rsRank!=='' && t.rsRank!=null) || t.placement || t.link || t.winCondition || t.coachNotes));
  if (!targets.length) { toast('No team profile info found to sync'); return; }
  let ok = 0, fail = 0, firstErr = '';
  for (const [name, t] of targets) {
    try {
      await WDB.saveTeamMeta(name, { rsRank: t.rsRank, placement: t.placement, link: t.link, winCondition: t.winCondition, coachNotes: t.coachNotes });
      ok++;
    } catch(e) { fail++; if(!firstErr) firstErr = (e && e.message) || 'unknown'; }
  }
  if (fail) toast(`Synced ${ok}/${targets.length} — ${fail} failed: ${firstErr}`,'error');
  else toast(`✓ Synced ${ok} team profile${ok>1?'s':''} to cloud — other accounts will see them on refresh`);
}

              ${t.turtleCtrl!==null?`<div class="stat-chip"><div class="stat-chip-val" style="color:var(--neon);">${t.turtleCtrl}%</div><div class="stat-chip-label">Turtle</div></div>`:''}
              ${t.lordCtrl!==null?`<div class="stat-chip"><div class="stat-chip-val" style="color:var(--gold);">${t.lordCtrl}%</div><div class="stat-chip-label">Lord</div></div>`:''}

            </div>` : ''}
            <div style="display:flex;gap:16px;flex-wrap:wrap;">
              <div style="flex:1;min-width:220px;">
                <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;">TOP PICKS <span style="color:var(--text4);font-weight:600;">(${(t.topPicks||[]).length})</span></div>
                <div class="hero-chips" style="max-height:150px;overflow-y:auto;padding-right:4px;">${(t.topPicks||[]).map(p=>`<span class="hero-chip">${p.name} ×${p.count} <span style="color:${p.wr>=50?'var(--green)':'var(--text3)'};">${p.wr}%</span></span>`).join('')}</div>

              </div>
              ${(t.bansReceived||[]).length ? `<div style="flex:1;min-width:220px;">
                <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;">BANS RECEIVED <span style="color:var(--text4);font-weight:600;">(${(t.bansReceived||[]).length})</span></div>
                <div class="hero-chips" style="max-height:150px;overflow-y:auto;padding-right:4px;">${(t.bansReceived||[]).map(b=>`<span class="hero-chip" style="color:var(--gold);border-color:rgba(244,165,52,.25);">${b.name} ×${b.count}</span>`).join('')}</div>

              DB_MODULE.getMatches().filter(m=>m.blueTeam===teamName||m.redTeam===teamName).forEach(m=>{
                const isBlue = m.blueTeam===teamName;
                const won = (isBlue && m.winner==='blue') || (!isBlue && m.winner==='red');
                const picks = isBlue ? (m.bluePicks||[]) : (m.redPicks||[]);
                const target = isBlue ? blueS : redS;
                picks.forEach(p => {
                  const n = p.name||p; if(!n) return;
                  if (!target[n]) target[n] = { games:0, wins:0 };
                  target[n].games += 1;

              });
              const wrcLocal = wr => wr >= 60 ? 'var(--green)' : wr >= 50 ? 'var(--gold)' : 'var(--red)';
              const rowHTML = (h, s) => {
                const wr = Math.round(s.wins/s.games*100);

              const blueRows = Object.entries(blueS).sort((a,b)=>b[1].games-a[1].games).slice(0,6).map(([h,s])=>rowHTML(h,s)).join('');
              const redRows = Object.entries(redS).sort((a,b)=>b[1].games-a[1].games).slice(0,6).map(([h,s])=>rowHTML(h,s)).join('');
              if(!blueRows && !redRows) return '';
              const bw = t.blueSideWR, rw = t.redSideWR;
              return `<div style="margin-top:10px;">
