                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                  <div style="background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.22);border-radius:8px;padding:8px 10px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid rgba(96,165,250,.18);">
                      <span style="font-size:9px;font-weight:800;color:#60a5fa;letter-spacing:1px;">◆ BLUE</span>
                      <span style="font-size:9.5px;font-family:var(--font-mono);font-weight:700;color:${bw!==null?wrcLocal(bw):'var(--text3)'};">${bw!==null?bw+'%':'—'}</span>
                    </div>
                    ${blueRows || '<div style="font-size:10px;color:var(--text3);">No data</div>'}
                  </div>
                  <div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.22);border-radius:8px;padding:8px 10px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid rgba(248,113,113,.18);">
                      <span style="font-size:9px;font-weight:800;color:#f87171;letter-spacing:1px;">◆ RED</span>
                      <span style="font-size:9.5px;font-family:var(--font-mono);font-weight:700;color:${rw!==null?wrcLocal(rw):'var(--text3)'};">${rw!==null?rw+'%':'—'}</span>
                    </div>
                    ${redRows || '<div style="font-size:10px;color:var(--text3);">No data</div>'}
                  </div>
                </div>
              </div>`;
            })()}
          </div>` : ''}
      </div>
      <div class="modal-footer">
        ${teamName ? `<button class="btn btn-danger" onclick="deleteTeam('${teamName}')">Delete</button>` : ''}
        <button class="btn btn-ghost" onclick="document.getElementById('teamModal').remove()">Cancel</button>
        <button class="btn btn-accent" onclick="saveTeam('${teamName||''}')">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function saveTeam(existing) {
  const name = (document.getElementById('tf-name')?.value || existing || '').trim();
  if (!name) { toast('Enter team name'); return; }
  let renamed = [];
  if (existing && name !== existing) {
    if (DB_MODULE.getTeams()[name] && !confirm(`"${name}" already exists — merge "${existing}" into it?`)) return;
    renamed = _renameTeamLocal(existing, name);   // rewrites all matches + moves profile (local)
  }
  const meta = {
    winCondition: document.getElementById('tf-wc')?.value||'',
    coachNotes:   document.getElementById('tf-notes')?.value||'',
    rsRank:       document.getElementById('tf-rs')?.value||'',
    placement:    document.getElementById('tf-po')?.value||'',
    link:         document.getElementById('tf-link')?.value?.trim()||'',
  };
  DB_MODULE.upsertTeam(name, meta);
  DB_MODULE.save();
  // Cloud-sync the profile so it shows on every device (requires migration 014).
  // Surface failures instead of swallowing them — a silent fail here is exactly
  // why "I edited it but other accounts don't see it" happens.
  try {
    if (typeof WDB!=='undefined' && WDB.saveTeamMeta) {
      WDB.saveTeamMeta(name, meta)
        .then(()=>{ if(typeof toast==='function') toast('Team info synced to all devices'); })
        .catch(e=>{ if(typeof toast==='function') toast('Saved locally only — cloud sync failed: '+(e&&e.message||'run migration 014'),'error'); });
    }
  } catch(e){ if(typeof toast==='function') toast('Cloud sync error: '+(e&&e.message||''),'error'); }
  document.getElementById('teamModal')?.remove();
  renderTeams();
  toast(`✓ ${name} saved`);
  if (renamed.length) _renameTeamCloud(renamed, existing, name);   // push the renamed matches to the cloud
}

// Rewrite a team's name on every match + move its profile/logo override. Returns
// the list of changed matches so the cloud sync can persist them.
function _renameTeamLocal(oldName, newName) {
  const changed = [];
  DB_MODULE.getMatches().forEach(m => {
    let ch = false;
    if (m.blueTeam === oldName) { m.blueTeam = newName; ch = true; }
    if (m.redTeam  === oldName) { m.redTeam  = newName; ch = true; }
    if (ch) changed.push(m);
  });
  const teams = DB_MODULE.getTeams();
  if (teams[oldName]) {
    const prof = teams[oldName];
    teams[newName] = { ...(teams[newName]||{}), ...prof, name: newName };
    delete teams[oldName];
  }
  try { if (WDB._teamLogoOverrides && WDB._teamLogoOverrides[oldName]) { WDB._teamLogoOverrides[newName] = WDB._teamLogoOverrides[oldName]; delete WDB._teamLogoOverrides[oldName]; } } catch(_){}
  DB_MODULE.rebuildTeams();
  DB_MODULE.save();
  return changed;
}
async function _renameTeamCloud(changed, oldName, newName) {
  _setSyncStatus('syncing');
  let ok = 0;
  for (const m of changed) { try { await WDB.saveMatch(m); ok++; } catch(_){} }
  _setSyncStatus(ok === changed.length ? 'ok' : 'err');
  toast(`✓ "${oldName}" → "${newName}" · ${ok}/${changed.length} matches synced to cloud`);
}

function deleteTeam(name) {
  if (!confirm(`Delete ${name}?`)) return;
  DB_MODULE.deleteTeam(name);
  DB_MODULE.save();
  document.getElementById('teamModal')?.remove();
  renderTeams();
  toast('Team deleted');
}

async function generateTeamImage(teamName) {
  const btn = document.getElementById('pdfBtn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

  try {
    // Lazy-load html2canvas + jsPDF only when needed
    if (!window.html2canvas) {
      await Promise.all([
        new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
          s.onload = res; s.onerror = rej; document.head.appendChild(s);
        }),
        new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
          s.onload = res; s.onerror = rej; document.head.appendChild(s);
        }),
      ]);
    }

    const el      = document.getElementById('reportBody');
    const modalEl = document.getElementById('teamReportContent');

    // Expand all collapsed series before capture
    el.querySelectorAll('.series-games.hidden').forEach(g => g.classList.remove('hidden'));

    // Temporarily remove scroll constraints so html2canvas captures the full height
    const prevModalMaxH  = modalEl.style.maxHeight;
    const prevModalOvf   = modalEl.style.overflow;
    const prevBodyMaxH   = el.style.maxHeight;
    const prevBodyOvf    = el.style.overflow;
    const prevBodyH      = el.style.height;
    modalEl.style.maxHeight = 'none';
    modalEl.style.overflow  = 'visible';
    el.style.maxHeight = 'none';
    el.style.overflow  = 'visible';
    el.style.height    = 'auto';
    await new Promise(r => setTimeout(r, 80)); // let layout settle

    // Wait for fonts to load so html2canvas renders them correctly
    await document.fonts.ready;

    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#07070C',
      logging: false,
      scrollX: 0,
      scrollY: 0,
      onclone: (_doc, cloned) => {
        // Remove overflow:hidden from all inner elements so text isn't clipped
        cloned.querySelectorAll('*').forEach(node => {
          const cs = window.getComputedStyle(node);
          if (cs.overflow === 'hidden' || cs.overflowX === 'hidden') {
            node.style.overflow  = 'visible';
            node.style.overflowX = 'visible';
            node.style.overflowY = 'visible';
            node.style.textOverflow = 'clip';
            node.style.whiteSpace   = 'normal';
          }
        });
      },
    });

    // Restore
    modalEl.style.maxHeight = prevModalMaxH;
    modalEl.style.overflow  = prevModalOvf;
    el.style.maxHeight = prevBodyMaxH;
    el.style.overflow  = prevBodyOvf;
    el.style.height    = prevBodyH;

    const { jsPDF } = window.jspdf;

    const margin   = 10;
    const pageW    = 210;
    const usableW  = pageW - margin * 2;
    const pxPerMm  = canvas.width / usableW;
    const contentH = canvas.height / pxPerMm;
    const pageH    = contentH + margin * 2;

    // PNG keeps text sharp — no JPEG compression blur
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [pageW, pageH] });
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, margin, usableW, contentH);

    pdf.save(`${teamName.replace(/[^a-z0-9]/gi, '_')}_Scout_Report.pdf`);
  } catch(e) {
    console.error('Export error:', e);
    toast('Export failed — try again');
  }

  if (btn) { btn.textContent = 'Export PDF'; btn.disabled = false; }
}

// Active map filter for team scout reports. Persists across re-opens of the
// same modal so changing the dropdown re-renders with the same filter state.
let _reportMapFilter = '';

// Called from the modal's Map dropdown — stash the new value, then rebuild
// the report by closing + re-opening with the same team name.
function setReportMapFilter(map) {
  _reportMapFilter = map || '';
  const teamName = document.getElementById('teamReportModal')?.dataset?.team;
  if (!teamName) return;
  document.getElementById('teamReportModal').remove();
  openTeamReport(teamName);
}

function openTeamReport(teamName) {
  const tBase = DB_MODULE.getTeams()[teamName];
  if (!tBase) return;

  const allMatches = DB_MODULE.getMatches();
  const teamGames = allMatches
    .filter(m => m.blueTeam === teamName || m.redTeam === teamName)
    .filter(m => !_reportMapFilter || (m.map||'') === _reportMapFilter)
    .sort((a,b) => new Date(b.date) - new Date(a.date));

  // When the map filter is active, recompute hero-meta fields (top picks, top
  // bans, bans-received, top first pick) from the filtered teamGames so the
  // report's hero sections reflect the selected map. Overall WR / side / KPI
  // / strengths fields stay sourced from tBase (they're cross-match aggregates
  // documented in the title bar). Without filter, t === tBase so nothing changes.
  const t = _reportMapFilter ? Object.create(tBase) : tBase;
  if (_reportMapFilter) {
    const pickC = {}, pickW = {}, banC = {}, banRecC = {}, fpC = {};
    teamGames.forEach(m => {
      const ours = m.blueTeam === teamName;
      const won = (ours && m.winner === 'blue') || (!ours && m.winner === 'red');
      const picks = ours ? (m.bluePicks||[]) : (m.redPicks||[]);
      const bans  = ours ? (m.blueBans ||[]) : (m.redBans ||[]);
      const oppBans = ours ? (m.redBans||[]) : (m.blueBans||[]);
      picks.forEach(p => { const n = p.name||p; if (n) { pickC[n] = (pickC[n]||0)+1; if (won) pickW[n] = (pickW[n]||0)+1; } });
      bans.forEach(b => { const n = b.name||b; if (n) banC[n] = (banC[n]||0)+1; });
      oppBans.forEach(b => { const n = b.name||b; if (n) banRecC[n] = (banRecC[n]||0)+1; });
      if (picks[0]) { const n = picks[0].name||picks[0]; if (n) fpC[n] = (fpC[n]||0)+1; }
    });
    t.topPicks      = Object.entries(pickC).sort((a,b)=>b[1]-a[1])
                        .map(([n,c]) => ({ name:n, count:c, wr: pickW[n] ? Math.round(pickW[n]/c*100) : 0 }));
    t.topBans       = Object.entries(banC).sort((a,b)=>b[1]-a[1]).map(([n,c]) => ({ name:n, count:c }));
    t.bansReceived  = Object.entries(banRecC).sort((a,b)=>b[1]-a[1]).map(([n,c]) => ({ name:n, count:c }));
    t.topFirstPick  = Object.entries(fpC).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,c]) => ({ name:n, count:c }));
  }

  // Group into series
  const seriesMap = {};
  teamGames.forEach(m => {
    const sid = DB_MODULE.getSeriesId(m);
    if (!seriesMap[sid]) seriesMap[sid] = {
      sid, date: m.date, league: m.league||'',
      blueTeam: m.blueTeam, redTeam: m.redTeam,
      stage: m.stage||'', week: m.week||'', games: []
    };
    seriesMap[sid].games.push(m);
  });
  const series = Object.values(seriesMap).sort((a,b) => new Date(b.date) - new Date(a.date));
  series.forEach(s => {
    s.games.sort((a,b) => (Number(a.gameNum)||1) - (Number(b.gameNum)||1));
    s.opponent = s.blueTeam === teamName ? s.redTeam : s.blueTeam;
    s.ourWins = s.games.filter(g => {
      const isBlue = g.blueTeam === teamName;
      return (isBlue && g.winner==='blue') || (!isBlue && g.winner==='red');
    }).length;
    s.oppWins = s.games.length - s.ourWins;
    s.result = s.ourWins > s.oppWins ? 'W' : 'L';
  });

  // Auto-derived strengths & weaknesses
  const weaknesses = [], strengths = [];
  const wrc = wr => wr >= 60 ? 'var(--green)' : wr >= 50 ? 'var(--gold)' : 'var(--red)';

  if (t.blueSideWR !== null && t.blueSideWR < 40 && (t.blueSideGames||0) >= 3)
    weaknesses.push(`Weak on Blue side (${t.blueSideWR}% in ${t.blueSideGames} games)`);
  if (t.redSideWR !== null && t.redSideWR < 40 && (t.redSideGames||0) >= 3)
    weaknesses.push(`Weak on Red side (${t.redSideWR}% in ${t.redSideGames} games)`);
  if (t.blueSideWR !== null && t.redSideWR !== null && Math.abs(t.blueSideWR - t.redSideWR) > 25)
    weaknesses.push(`Heavy side dependency — Blue ${t.blueSideWR}% vs Red ${t.redSideWR}%`);
  if ((t.poolDepth||0) < 6 && (t.gamesPlayed||0) >= 5)
    weaknesses.push(`Shallow hero pool (${t.poolDepth} heroes with 2+ games)`);
  const badPicks = (t.topPicks||[]).filter(p => p.count >= 3 && p.wr < 40);
  if (badPicks.length)
    weaknesses.push(`Below 40% WR on: ${badPicks.map(p=>`${p.name} (${p.wr}%)`).join(', ')}`);
  if ((t.bansReceived||[]).length >= 3)
    weaknesses.push(`Predictable — opponents target: ${t.bansReceived.slice(0,3).map(b=>b.name).join(', ')}`);

  const comfortPicks = (t.topPicks||[]).filter(p => p.count >= 3 && p.wr >= 65);
  if (comfortPicks.length)
    strengths.push(`Comfort picks: ${comfortPicks.map(p=>`${p.name} (${p.wr}%)`).join(', ')}`);
  if (t.blueSideWR !== null && t.blueSideWR >= 65 && (t.blueSideGames||0) >= 3)
    strengths.push(`Dominant Blue side (${t.blueSideWR}%)`);
  if (t.redSideWR !== null && t.redSideWR >= 65 && (t.redSideGames||0) >= 3)
    strengths.push(`Dominant Red side (${t.redSideWR}%)`);
  if (t.turtleCtrl !== null && t.turtleCtrl >= 65)
    strengths.push(`Strong Turtle control (${t.turtleCtrl}%)`);
  if (t.lordCtrl !== null && t.lordCtrl >= 65)
    strengths.push(`Strong Lord control (${t.lordCtrl}%)`);
  // First-objective + conversion strengths/weaknesses.
  // → Win % is a CONVERSION ("of games we got X, % we won") so its sample-size guard
  //   uses firstTurtleOurs / firstLordOurs / fbOurs (not the contested-games count).
  // The plain rate (X%) is computed over contested games, so its guard uses *Games.
  // Conversion stats — phrased neutrally as plain facts (no editorial labels).
  if (t.firstTurtleToWin !== null && t.firstTurtleToWin >= 75 && (t.firstTurtleOurs||0) >= 3)
    strengths.push(`Wins ${t.firstTurtleToWin}% after securing First Turtle (${t.firstTurtleOurs}g)`);
  if (t.firstLordToWin !== null && t.firstLordToWin >= 80 && (t.firstLordOurs||0) >= 3)
    strengths.push(`Wins ${t.firstLordToWin}% after taking First Lord (${t.firstLordOurs}g)`);
  if (t.fbToWin !== null && t.fbToWin >= 70 && (t.fbOurs||0) >= 3)
    strengths.push(`Wins ${t.fbToWin}% after First Blood (${t.fbOurs}g)`);
  if (t.firstLordToWin !== null && t.firstLordToWin <= 35 && (t.firstLordOurs||0) >= 3)
    weaknesses.push(`Only ${t.firstLordToWin}% wins after taking First Lord (${t.firstLordOurs}g)`);
  if (t.fbRate !== null && t.fbRate <= 30 && (t.fbGames||0) >= 4)
    weaknesses.push(`First Blood rate only ${t.fbRate}% (${t.fbGames}g)`);
  if (t.avgTowers !== null && t.towerDiff !== null && t.towerDiff >= 3 && (t.towerGames||0) >= 3)
    strengths.push(`+${t.towerDiff} avg tower diff · ${t.avgTowers} towers/game (${t.towerGames}g)`);
  if (t.avgTowers !== null && t.towerDiff !== null && t.towerDiff <= -3 && (t.towerGames||0) >= 3)
    weaknesses.push(`${t.towerDiff} avg tower diff · ${t.avgTowers} towers/game (${t.towerGames}g)`);
  // Per-player KDA insights (also factual, no editorial labels).
  if (t.playerKDA) {
    const kdaRatios = Object.entries(t.playerKDA)
      .filter(([_,pk]) => pk.games >= 3)
      .map(([player,pk]) => ({
        player,
        ratio: pk.games ? ((pk.k+pk.a)/Math.max(1,pk.d)) : 0,
        deaths: pk.d/pk.games,
      }));
    if (kdaRatios.length >= 2) {
      const sorted = [...kdaRatios].sort((a,b) => b.ratio - a.ratio);
      const top = sorted[0], next = sorted[1];
      if (top.ratio >= 4 && top.ratio >= next.ratio + 1.5) {
        strengths.push(`${top.player} carries with ${top.ratio.toFixed(1)} KDA (next ${next.ratio.toFixed(1)})`);
      }
      const tilters = kdaRatios.filter(p => p.deaths >= 4.5);
      if (tilters.length) {
        weaknesses.push(`High deaths — ${tilters.map(p=>`${p.player} (${p.deaths.toFixed(1)} d/g)`).join(', ')}`);
      }
    }
  }
  if ((t.poolDepth||0) >= 12)
    strengths.push(`Deep hero pool (${t.poolDepth} heroes)`);

  // Helpers
  const img = (name, size=26) => {
    if (!name) return '';
    const id = heroByName(name)?.id || name.toLowerCase().replace(/[^a-z0-9]/g,'') || name;
    const r = Math.round(size * 0.35);
    return `<img style="width:${size}px;height:${size}px;border-radius:${r}px;object-fit:cover;background:var(--surface3);flex-shrink:0;" src="${_heroIcon(name)}" onerror="${_heroIconErr(name)}" title="${name}">`;
  };

  const wr = t.winRate||0;
  const bsWr = t.blueSideWR;
  const rsWr = t.redSideWR;

  const formDots = (t.form||[]).map(r =>
    `<div style="width:9px;height:9px;border-radius:50%;background:${r==='W'?'var(--green)':'var(--red)'};" title="${r}"></div>`
  ).join('');

  const lb = (t.leagues||[]).map(l =>
    `<span class="league-badge ${LEAGUE_CSS[l]||'lg-other'}">${l}</span>`
  ).join(' ');

  // ── Match History ──
  const matchHistoryHTML = !series.length
    ? `<div style="color:var(--text3);font-size:12px;padding:8px 0;">No matches recorded.</div>`
    : series.map((s, si) => {
        const d = new Date(s.date);
        const ds = isNaN(d.getTime()) ? s.date : `${d.toLocaleString('default',{month:'short'})} ${d.getDate()}, ${d.getFullYear()}`;
        const resColor = s.result==='W' ? 'var(--green)' : 'var(--red)';

        const gameRowsHTML = s.games.map(g => {
          const bp = g.bluePicks||[], rp = g.redPicks||[];
          const bb = g.blueBans||[],  rb = g.redBans||[];
          const rImg = (name, size=26) => {
            const id = heroByName(name)?.id || _normKey(name) || name;
            const cls = size === 26 ? 'hero-thumb' : 'hero-thumb-sm';
            return `<img class="${cls}" src="${_heroIcon(name)}" onerror="${_heroIconErr(name)}" title="${name}" style="${size===20?'width:20px;height:20px;':''}">`;
          };
          const line = (picks, bans, color, tn) => `
            <div class="team-draft-line">
              <div class="team-name-col" style="color:${color};" title="${tn}">${tn}</div>
              <div class="draft-heroes">${picks.map(p=>rImg(p.name||p)).join('')}</div>
              <div class="sep-line"></div>
              <div class="draft-bans">${bans.map(n=>rImg(n,20)).join('')}</div>
            </div>`;
          const wTeam  = g.winner==='blue' ? g.blueTeam : g.redTeam;
          const wColor = g.winner==='blue' ? 'var(--blue)' : 'var(--red)';
          const obj = g.objectives || {};
          const objTeamLabel = (v, blueN, redN) => {
            if (v==='blue') return `<span class="obj-tag obj-blue">${blueN||'Blue'}</span>`;
            if (v==='red')  return `<span class="obj-tag obj-red">${redN||'Red'}</span>`;
            return '';
          };
          const turtles = obj.turtle || [obj.t1,obj.t2,obj.t3].filter(Boolean);
          const lords   = obj.lord   || [obj.l1,obj.l2,obj.l3].filter(Boolean);
          const hasObj  = turtles.length || lords.length;
          const objRow  = hasObj ? `<div class="obj-row">
            ${turtles.length ? `<span style="font-size:8.5px;font-weight:600;color:var(--text3);letter-spacing:.5px;">TUR</span>${turtles.map((v,i)=>`<span style="font-size:7px;color:var(--text4);">T${i+1}</span>${objTeamLabel(v,g.blueTeam,g.redTeam)}`).join('')}` : ''}
            ${turtles.length && lords.length ? `<div style="width:1px;height:10px;background:var(--border2);"></div>` : ''}
            ${lords.length   ? `<span style="font-size:8.5px;font-weight:600;color:var(--text3);letter-spacing:.5px;">LRD</span>${lords.map((v,i)=>`<span style="font-size:7px;color:var(--text4);">L${i+1}</span>${objTeamLabel(v,g.blueTeam,g.redTeam)}`).join('')}` : ''}
          </div>` : '';

          return `<div class="game-row">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
              <span class="game-num">G${g.gameNum||1}</span>
              <span style="font-size:8px;font-weight:700;color:var(--text3);letter-spacing:.5px;">PICKS</span>
              <div style="width:1px;height:8px;background:var(--border2);"></div>
              <span style="font-size:8px;font-weight:700;color:var(--text4);">BANS</span>
              <div style="flex:1;"></div>
              <span class="winner-badge" style="background:${wColor}18;color:${wColor};border:1px solid ${wColor}44;">${wTeam}</span>
              ${g.vodLink ? `<a href="${g.vodLink}" target="_blank" style="font-size:9px;color:var(--blue);text-decoration:none;padding:2px 7px;border:1px solid var(--blue-border);border-radius:8px;">▶ VOD</a>` : ''}
            </div>
            <div>
              ${line(bp, bb, 'var(--blue)', g.blueTeam)}
              ${line(rp, rb, 'var(--red)',  g.redTeam)}
            </div>
            ${objRow}
          </div>`;
        }).join('');

        return `<div style="border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:10px;overflow:hidden;">
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);cursor:pointer;user-select:none;"
               onclick="const g=this.nextElementSibling;g.classList.toggle('hidden');this.querySelector('.chev').textContent=g.classList.contains('hidden')?'▸':'▾'">
            <div style="min-width:36px;text-align:center;">
              <div style="font-size:20px;font-weight:800;font-family:var(--font-head);line-height:1;color:${resColor};">${s.result}</div>
              <div style="font-size:9px;color:var(--text3);font-family:var(--font-mono);margin-top:1px;">${s.ourWins}–${s.oppWins}</div>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;">vs ${s.opponent}</div>
              <div style="font-size:9px;color:var(--text3);margin-top:1px;">${ds}${s.league?' · '+s.league:''}${s.stage?' · '+s.stage:''}${s.week?' · '+s.week:''}</div>
            </div>
            <span class="chev" style="font-size:10px;color:var(--text3);">▾</span>
          </div>
          <div class="series-games">${gameRowsHTML}</div>
        </div>`;
      }).join('');

  // ── Pick/Ban Analysis (full history — onscreen scrolls/columns; print expands) ──
  const _pickRow = p => {
    const pw = wrc(p.wr);
    return `<div class="draft-chiprow draft-chiprow--pick">
      ${img(p.name, 30)}
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
          <div style="flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;">
            <div style="width:${p.wr}%;height:100%;background:${pw};border-radius:2px;"></div>
          </div>
          <span style="font-size:10px;font-weight:700;color:${pw};font-family:var(--font-mono);width:30px;text-align:right;">${p.wr}%</span>
        </div>
      </div>
      <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono);">×${p.count}</span>
    </div>`;
  };
  const pickAnalysisHTML = (t.topPicks||[]).length
    ? `<div class="draft-chiplist">${(t.topPicks||[]).map(_pickRow).join('')}</div>
       <div class="draft-chipcount">${(t.topPicks||[]).length} distinct heroes picked</div>`
    : '';

  const _banRow = (b, color) => `
    <div class="draft-chiprow">
      ${img(b.name, 28)}
      <span style="font-size:11px;flex:1;">${b.name}</span>
      <span style="font-size:10px;font-weight:700;color:${color};font-family:var(--font-mono);">×${b.count}</span>
    </div>`;

  const banAnalysisHTML = (t.topBans||[]).length
    ? `<div class="draft-chiplist">${(t.topBans||[]).map(b=>_banRow(b,'var(--red)')).join('')}</div>
       <div class="draft-chipcount">${(t.topBans||[]).length} distinct heroes banned</div>`
    : '';

  const banReceivedHTML = (t.bansReceived||[]).length
    ? `<div class="draft-chiplist">${(t.bansReceived||[]).map(b=>_banRow(b,'var(--gold)')).join('')}</div>
       <div class="draft-chipcount">${(t.bansReceived||[]).length} distinct heroes banned vs them</div>`
    : '';

  const firstPickHTML = (t.topFirstPick||[]).slice(0,6).map(p => `
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
      ${img(p.name, 28)}
      <span style="font-size:11px;flex:1;">${p.name}</span>
      <span style="font-size:10px;font-weight:700;color:var(--blue);font-family:var(--font-mono);">×${p.count}</span>
    </div>`).join('');

  // ── Map WR ──
  const mapWRHTML = Object.entries(t.mapStats||{}).map(([mp,s]) => {
    const mc = wrc(s.wr);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
      <span style="font-size:10.5px;width:132px;flex-shrink:0;color:var(--text2);">${mp}</span>
      <div style="flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;">
        <div style="width:${s.wr}%;height:100%;background:${mc};border-radius:3px;"></div>
      </div>
      <span style="font-size:11px;font-weight:700;color:${mc};font-family:var(--font-mono);width:36px;text-align:right;">${s.wr}%</span>
      <span style="font-size:9px;color:var(--text3);">${s.games}g</span>
    </div>`;
  }).join('');

  // ── Side Drafts (replaces Side Heatmap) ─────────────────────────
  // For each hero, count games + wins on each side so the report
  // surfaces *what they pick by side* AND *whether they win on it*.
  const blueStats = {}, redStats = {};
  teamGames.forEach(m => {
    const isBlue = m.blueTeam === teamName;
    const won = (isBlue && m.winner === 'blue') || (!isBlue && m.winner === 'red');
    const picks = isBlue ? (m.bluePicks||[]) : (m.redPicks||[]);
    const target = isBlue ? blueStats : redStats;
    picks.forEach(p => {
      const n = p.name||p;
      if (!n) return;
      if (!target[n]) target[n] = { games:0, wins:0 };
      target[n].games += 1;
      if (won) target[n].wins += 1;
    });
  });
  const sideRowHTML = (h, s) => {
    const wr = Math.round(s.wins/s.games*100);
    const wrCol = wrc(wr);
    return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
      ${img(h, 24)}
      <span style="font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);">${h}</span>
      <span style="font-size:9.5px;color:var(--text3);font-family:var(--font-mono);">${s.games}g</span>
      <span style="font-size:11px;font-weight:800;color:${wrCol};font-family:var(--font-mono);width:34px;text-align:right;">${wr}%</span>
    </div>`;
  };
  const blueTopHTML = Object.entries(blueStats)
    .sort((a,b) => b[1].games - a[1].games || b[1].wins - a[1].wins)
    .slice(0,7).map(([h,s]) => sideRowHTML(h,s)).join('');
  const redTopHTML = Object.entries(redStats)
    .sort((a,b) => b[1].games - a[1].games || b[1].wins - a[1].wins)
    .slice(0,7).map(([h,s]) => sideRowHTML(h,s)).join('');
  const blueRecord = (t.blueSideGames||0) ? `${t.blueWins||0}W-${(t.blueSideGames||0)-(t.blueWins||0)}L` : '—';
  const redRecord  = (t.redSideGames||0)  ? `${t.redWins||0}W-${(t.redSideGames||0)-(t.redWins||0)}L`   : '—';
  // ── Per-Lane Roster (combines old Lane Pool + Player Performance into one) ──
  // Aggregation: lane → player → heroes. Replaces both sections so each lane is
  // a single block showing who plays it, their KDA, and their hero pool with WR.
  const LANE_ORDER = ['Gold','Jungle','Mid','EXP','Roam'];
  const LANE_COLORS = {
    Gold:   '#f4a534',
    Jungle: '#a78bfa',
    Mid:    '#60a5fa',
    EXP:    '#f87171',
    Roam:   '#34d17a',
  };
  const UNTAGGED = '__untagged__';
  const laneRoster = {}; // { lane: { player: { games, k, d, a, kdaGames, heroes:{ hero:{games,wins,k,d,a,kdaGames} } } } }
  const laneTotals = {}; // { lane: gamesCount }
  LANE_ORDER.forEach(L => { laneRoster[L] = {}; laneTotals[L] = 0; });
  teamGames.forEach(m => {
    const isBlue = m.blueTeam === teamName;
    const won = (isBlue && m.winner === 'blue') || (!isBlue && m.winner === 'red');
    const picks = isBlue ? (m.bluePicks||[]) : (m.redPicks||[]);
    picks.forEach(p => {
      const hero = p.name, lane = p.lane;
      if (!hero || !lane) return;
      if (!LANE_ORDER.includes(lane)) return;
      const player = p.player || UNTAGGED;
      if (!laneRoster[lane][player]) {
        laneRoster[lane][player] = { games:0, k:0, d:0, a:0, kdaGames:0, heroes:{} };
      }
      const pr = laneRoster[lane][player];
      pr.games += 1;
      if (p.kda) { pr.k += Number(p.kda.k)||0; pr.d += Number(p.kda.d)||0; pr.a += Number(p.kda.a)||0; pr.kdaGames += 1; }
      if (!pr.heroes[hero]) pr.heroes[hero] = { games:0, wins:0, k:0, d:0, a:0, kdaGames:0 };
      const hh = pr.heroes[hero];
      hh.games += 1; if (won) hh.wins += 1;
      if (p.kda) { hh.k += Number(p.kda.k)||0; hh.d += Number(p.kda.d)||0; hh.a += Number(p.kda.a)||0; hh.kdaGames += 1; }
      laneTotals[lane] += 1;
    });
  });
  const anyLaneData = LANE_ORDER.some(L => laneTotals[L] > 0);

  // Per-Lane Roster — for each lane, list players (main first, subs after) with
  // their hero pool. KDA shown when entered, omitted gracefully when not.
  const lanePoolHTML = LANE_ORDER.map(L => {
    const lc = LANE_COLORS[L];
    if (!laneTotals[L]) return `<div class="lp-section" style="opacity:.5;">
      <div class="lp-section-head" style="border-bottom:0;padding-bottom:0;margin-bottom:0;">
        <span class="lp-lane-name" style="color:${lc};">${L}</span>
        <span class="lp-lane-meta">No data</span>
      </div>
    </div>`;
    // Players who played this lane, sorted by games (main first, subs after).
    const players = Object.entries(laneRoster[L]).sort((a,b) => b[1].games - a[1].games);
    const uniqueHeroes = new Set();
    players.forEach(([_, pr]) => Object.keys(pr.heroes).forEach(h => uniqueHeroes.add(h)));

    const heroRow = (h, hh) => {
      const wr = Math.round(hh.wins/hh.games*100);
      const hasKda = hh.kdaGames > 0;
      const ak = hasKda ? (hh.k/hh.kdaGames).toFixed(1) : null;
      const ad = hasKda ? (hh.d/hh.kdaGames).toFixed(1) : null;
      const aa = hasKda ? (hh.a/hh.kdaGames).toFixed(1) : null;
      // Always emit the KDA cell (em-dash when missing) so the grid columns
      // align across all rows. Order: icon · name · KDA · games · WR.
      return `<div class="lp-row${hasKda?' has-kda':''}">
        ${img(h, 22)}
        <span class="lp-name">${h}</span>
        ${hasKda
          ? `<span class="lp-kda-mono">${ak} · ${ad} · ${aa}</span>`
          : `<span class="lp-kda-mono lp-kda-empty">—</span>`}
        <span class="lp-games">${hh.games}g</span>
        <span class="lp-wr" style="color:${wrc(wr)};">${wr}%</span>
      </div>`;
    };

    const playerBlocks = players.map(([player, pr], idx) => {
      const isUntagged = player === UNTAGGED;
      const isSub = !isUntagged && idx > 0;
      const heroEntries = Object.entries(pr.heroes)
        .sort((a,b) => b[1].games - a[1].games || b[1].wins - a[1].wins);
      const hasKda = pr.kdaGames > 0;
      const ak = hasKda ? (pr.k/pr.kdaGames).toFixed(1) : null;
      const ad = hasKda ? (pr.d/pr.kdaGames).toFixed(1) : null;
      const aa = hasKda ? (pr.a/pr.kdaGames).toFixed(1) : null;
      const playerLine = isUntagged
        ? `<div class="lp-player-line lp-untagged">
            <span class="lp-player-ign">Unassigned picks</span>
            <span class="lp-player-stats">${pr.games}g</span>
          </div>`
        : `<div class="lp-player-line">
            <span class="lp-player-ign">${player}${isSub?' <span class="lp-sub-badge">sub</span>':''}</span>
            <span class="lp-player-stats">${pr.games}g${hasKda ? ` · <span class="lp-kda-mono">${ak}/${ad}/${aa}</span>` : ''}</span>
          </div>`;
      return `<div class="lp-player-block">
        ${playerLine}
        ${heroEntries.map(([h, hh]) => heroRow(h, hh)).join('')}
      </div>`;
    }).join('');

    return `<div class="lp-section">
      <div class="lp-section-head">
        <span class="lp-lane-name" style="color:${lc};">${L}</span>
        <span class="lp-lane-meta">${laneTotals[L]}g · ${uniqueHeroes.size} hero${uniqueHeroes.size!==1?'es':''}</span>
      </div>
      ${playerBlocks}
    </div>`;
  }).join('');

  const heatmapHTML = (blueTopHTML || redTopHTML) ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.22);border-radius:10px;padding:10px 12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(96,165,250,.18);">
          <span style="font-size:9.5px;font-weight:800;color:#60a5fa;letter-spacing:1.2px;text-transform:uppercase;">◆ Blue Side</span>
          <span style="font-size:10px;font-family:var(--font-mono);font-weight:700;color:${bsWr!==null?wrc(bsWr):'var(--text3)'};">${blueRecord}${bsWr!==null?` · ${bsWr}%`:''}</span>
        </div>
        ${blueTopHTML || '<div style="font-size:10.5px;color:var(--text3);padding:6px 0;">No blue-side games</div>'}
      </div>
      <div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.22);border-radius:10px;padding:10px 12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(248,113,113,.18);">
          <span style="font-size:9.5px;font-weight:800;color:#f87171;letter-spacing:1.2px;text-transform:uppercase;">◆ Red Side</span>
          <span style="font-size:10px;font-family:var(--font-mono);font-weight:700;color:${rsWr!==null?wrc(rsWr):'var(--text3)'};">${redRecord}${rsWr!==null?` · ${rsWr}%`:''}</span>
        </div>
        ${redTopHTML || '<div style="font-size:10.5px;color:var(--text3);padding:6px 0;">No red-side games</div>'}
      </div>

function openH2H(teamName) {
  const teams = Object.keys(DB_MODULE.getTeams()).filter(n => n !== teamName).sort();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'h2hPickModal';
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <div class="modal-title">H2H — ${teamName}</div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="document.getElementById('h2hPickModal').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Compare against</label>
          <select class="form-select" id="h2hOppSelect">
            <option value="">— select opponent —</option>
            ${teams.map(n=>`<option value="${n}">${n}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.getElementById('h2hPickModal').remove()">Cancel</button>
        <button class="btn btn-accent" onclick="const opp=document.getElementById('h2hOppSelect').value;if(!opp){toast('Select an opponent');return;}document.getElementById('h2hPickModal').remove();renderH2H('${teamName}',opp)">View H2H</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function renderH2H(teamA, teamB) {
  const all = DB_MODULE.getMatches();
  const games = all.filter(m =>
    (m.blueTeam===teamA&&m.redTeam===teamB)||(m.blueTeam===teamB&&m.redTeam===teamA)
  ).sort((a,b)=>new Date(b.date)-new Date(a.date));

  if (!games.length) { toast(`No head-to-head data for ${teamA} vs ${teamB}`); return; }

  let aWins=0, bWins=0, aBlue=0, aBlueW=0, aRed=0, aRedW=0;
  const aBanC={}, bBanC={}, aPickC={}, bPickC={};
  games.forEach(m => {
    const aIsBlue = m.blueTeam===teamA;
    const aWon = (aIsBlue&&m.winner==='blue')||(!aIsBlue&&m.winner==='red');
    if (aWon) aWins++; else bWins++;
    if (aIsBlue) { aBlue++; if (aWon) aBlueW++; } else { aRed++; if (aWon) aRedW++; }
    const aPicks = aIsBlue?(m.bluePicks||[]):(m.redPicks||[]);
    const bPicks = aIsBlue?(m.redPicks||[]):(m.bluePicks||[]);
    const aBans  = aIsBlue?(m.blueBans||[]):(m.redBans||[]);
    const bBans  = aIsBlue?(m.redBans||[]):(m.blueBans||[]);
    aPicks.forEach(p=>{const n=p.name||p;aPickC[n]=(aPickC[n]||0)+1;});
    bPicks.forEach(p=>{const n=p.name||p;bPickC[n]=(bPickC[n]||0)+1;});
    aBans.forEach(b=>{const n=b.name||b;aBanC[n]=(aBanC[n]||0)+1;});
    bBans.forEach(b=>{const n=b.name||b;bBanC[n]=(bBanC[n]||0)+1;});
  });

  const topN=(obj,n=5)=>Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
  const col=aWins>bWins?'var(--green)':aWins<bWins?'var(--red)':'var(--gold)';
  const gameRows = games.map(m=>{
    const aIsBlue=m.blueTeam===teamA;

    </div>`;
  }).join('');

  const chipRow=(entries)=>entries.map(([n,c])=>`<span class="hero-chip">${n} <span style="color:var(--text3);">×${c}</span></span>`).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'h2hModal';
  overlay.innerHTML = `
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <div class="modal-title">⚔ ${teamA} vs ${teamB}</div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="document.getElementById('h2hModal').remove()">✕</button>
      </div>
      <div class="modal-body" style="overflow-y:auto;max-height:70vh;">
        <div style="display:flex;align-items:center;justify-content:center;gap:24px;padding:12px 0;margin-bottom:12px;background:var(--surface2);border-radius:8px;">
          <div style="text-align:center;">
            <div style="font-size:28px;font-weight:800;font-family:var(--font-head);color:${col};">${aWins}</div>
            <div style="font-size:10px;color:var(--text3);">${teamA}</div>
          </div>
          <div style="font-size:13px;color:var(--text3);">–</div>
          <div style="text-align:center;">
            <div style="font-size:28px;font-weight:800;font-family:var(--font-head);color:${aWins<bWins?'var(--green)':aWins>bWins?'var(--red)':'var(--gold)'};">${bWins}</div>
            <div style="font-size:10px;color:var(--text3);">${teamB}</div>
          </div>
          <div style="text-align:center;margin-left:16px;">
            <div style="font-size:11px;color:var(--text3);">${games.length} game${games.length!==1?'s':''}</div>
            ${aBlue?`<div style="font-size:10px;color:var(--text3);">${teamA} Blue: ${aBlueW}/${aBlue} | Red: ${aRedW}/${aRed}</div>`:''}
          </div>
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;">
          <div style="flex:1;min-width:180px;">
            <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">${teamA} PICKS</div>
            <div class="hero-chips">${chipRow(topN(aPickC))}</div>
            <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase;margin-top:8px;margin-bottom:4px;">${teamA} BANS</div>
            <div class="hero-chips">${chipRow(topN(aBanC))}</div>
          </div>
          <div style="flex:1;min-width:180px;">
            <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">${teamB} PICKS</div>
            <div class="hero-chips">${chipRow(topN(bPickC))}</div>
            <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase;margin-top:8px;margin-bottom:4px;">${teamB} BANS</div>
            <div class="hero-chips">${chipRow(topN(bBanC))}</div>
          </div>
        </div>
        <div style="font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">GAME HISTORY</div>
        ${gameRows}
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.getElementById('h2hModal').remove()">Close</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

// ══════════════════════════════════════════════════════════════
// META VIEW
// ══════════════════════════════════════════════════════════════
// ═══════════════ TEAM REPORT VIEW (date-scoped performance) ═══════════════
let _rTeam = '', _rPreset = '7d';
const _rpad = n => String(n).padStart(2,'0');
const _rymd = d => `${d.getFullYear()}-${_rpad(d.getMonth()+1)}-${_rpad(d.getDate())}`;
function _rRangeForPreset(p){
  const today=new Date(); today.setHours(0,0,0,0); const t=_rymd(today);
  if(p==='today') return {from:t,to:t};
  if(p==='yesterday'){ const y=new Date(today); y.setDate(y.getDate()-1); return {from:_rymd(y),to:_rymd(y)}; }
  if(p==='7d'){ const f=new Date(today); f.setDate(f.getDate()-6); return {from:_rymd(f),to:t}; }
  if(p==='30d'){ const f=new Date(today); f.setDate(f.getDate()-29); return {from:_rymd(f),to:t}; }
  if(p==='month'){ const f=new Date(today.getFullYear(),today.getMonth(),1); return {from:_rymd(f),to:t}; }
  if(p==='all') return {from:'0000-01-01',to:'9999-12-31'};
  return null;
}
function _rPrevRange(from,to){
  if(from==='0000-01-01') return null;
  const f=new Date(from),tt=new Date(to); const days=Math.round((tt-f)/86400000)+1;
  const pTo=new Date(f); pTo.setDate(pTo.getDate()-1);
  const pFrom=new Date(pTo); pFrom.setDate(pFrom.getDate()-(days-1));
  return {from:_rymd(pFrom),to:_rymd(pTo)};
}
function _rInRange(m,from,to){ const d=(m.date||''); return d && d>=from && d<=to; }
function _rFmtDate(s){ const d=new Date(s); return isNaN(d)?s:`${d.toLocaleString('default',{month:'short'})} ${d.getDate()}, ${d.getFullYear()}`; }
function _rRangeLabel(from,to,p){
  const names={today:'Today',yesterday:'Yesterday','7d':'Last 7 days','30d':'Last 30 days',month:'This month',all:'All time'};
  if(names[p]&&p!=='custom') return names[p];
  return from===to?_rFmtDate(from):`${_rFmtDate(from)} – ${_rFmtDate(to)}`;
}
function _rComputeTeam(matches,name){
  const games=matches.filter(m=>m.blueTeam===name||m.redTeam===name);
  const t={name,gamesPlayed:games.length}; if(!games.length) return t;
  const won=m=>(m.winner==='blue'&&m.blueTeam===name)||(m.winner==='red'&&m.redTeam===name);
  const sorted=[...games].sort((a,b)=>new Date(a.date)-new Date(b.date));
  t.wins=games.filter(won).length; t.losses=t.gamesPlayed-t.wins;
  t.winRate=Math.round(t.wins/t.gamesPlayed*100);
  t.leagues=[...new Set(games.map(m=>m.league).filter(Boolean))];
  const bg=games.filter(m=>m.blueTeam===name), rg=games.filter(m=>m.redTeam===name);
  t.blueSideGames=bg.length; t.redSideGames=rg.length;
  t.blueWins=bg.filter(m=>m.winner==='blue').length; t.redWins=rg.filter(m=>m.winner==='red').length;
  t.blueSideWR=t.blueSideGames?Math.round(t.blueWins/t.blueSideGames*100):null;
  t.redSideWR=t.redSideGames?Math.round(t.redWins/t.redSideGames*100):null;
  t.form=sorted.slice(-8).map(m=>won(m)?'W':'L');
  let streak=0,st=null;
  for(let i=sorted.length-1;i>=0;i--){ const r=won(sorted[i])?'W':'L'; if(st===null){st=r;streak=1;} else if(r===st)streak++; else break; }
  t.streak={type:st,count:streak};
  const pickC={},banRecC={},pickW={};
  games.forEach(m=>{
    const ours=m.blueTeam===name, w=(ours&&m.winner==='blue')||(!ours&&m.winner==='red');
    const picks=ours?(m.bluePicks||[]):(m.redPicks||[]);
    const oppBans=ours?(m.redBans||[]):(m.blueBans||[]);
    picks.forEach(p=>{const n=p.name||p; if(!n)return; pickC[n]=(pickC[n]||0)+1; if(w)pickW[n]=(pickW[n]||0)+1;});
    oppBans.forEach(b=>{const n=b.name||b; if(n)banRecC[n]=(banRecC[n]||0)+1;});
  });
  t.topPicks=Object.entries(pickC).sort((a,b)=>b[1]-a[1]).map(([n,c])=>({name:n,count:c,wr:pickW[n]?Math.round(pickW[n]/c*100):0}));
  t.bansReceived=Object.entries(banRecC).sort((a,b)=>b[1]-a[1]).map(([n,c])=>({name:n,count:c}));
  t.poolDepth=Object.values(pickC).filter(c=>c>=2).length;
  let tT=0,tW=0,lT=0,lW=0,flOurs=0,flWins=0,fbG=0,fbO=0,fbW=0,twG=0,twS=0,twO=0;
  const pk={};
  games.forEach(m=>{
    const isBlue=m.blueTeam===name, side=isBlue?'blue':'red', w=won(m);
    const obj=m.objectives||{};
    const tArr=obj.turtle||[obj.t1,obj.t2,obj.t3].filter(Boolean)||[];
    const lArr=obj.lord||[obj.l1,obj.l2,obj.l3].filter(Boolean)||[];
    tArr.forEach(v=>{if(v){tT++; if(v===side)tW++;}});
    lArr.forEach(v=>{if(v){lT++; if(v===side)lW++;}});
    const fl=lArr.find(v=>v==='blue'||v==='red'); if(fl&&fl===side){flOurs++; if(w)flWins++;}
    if(m.firstBlood==='blue'||m.firstBlood==='red'){fbG++; if(m.firstBlood===side){fbO++; if(w)fbW++;}}
    if(m.towers&&(m.towers.blue!=null||m.towers.red!=null)){
      const o=isBlue?m.towers.blue:m.towers.red, e=isBlue?m.towers.red:m.towers.blue;
      if(o!=null){twG++; twS+=Number(o)||0; twO+=Number(e)||0;}
    }
    const picks=isBlue?(m.bluePicks||[]):(m.redPicks||[]);
    picks.forEach(p=>{ if(!p||!p.kda||!p.player)return;
      const k=Number(p.kda.k)||0,d=Number(p.kda.d)||0,a=Number(p.kda.a)||0;
      if(!pk[p.player])pk[p.player]={games:0,k:0,d:0,a:0,lane:p.lane||null,wins:0};
      const q=pk[p.player]; q.games++; q.k+=k; q.d+=d; q.a+=a; if(p.lane&&!q.lane)q.lane=p.lane; if(w)q.wins++;
    });
  });
  t.turtleCtrl=tT?Math.round(tW/tT*100):null; t.lordCtrl=lT?Math.round(lW/lT*100):null;
  t.firstLordOurs=flOurs; t.firstLordToWin=flOurs?Math.round(flWins/flOurs*100):null;
  t.fbGames=fbG; t.fbOurs=fbO; t.fbRate=fbG?Math.round(fbO/fbG*100):null;
  t.towerGames=twG; t.avgTowers=twG?+(twS/twG).toFixed(1):null; t.towerDiff=twG?+((twS-twO)/twG).toFixed(1):null;
  t.playerKDA=Object.keys(pk).length?pk:null;
  return t;
}
function _rGroupSeries(matches,name){
  const map={};
  matches.filter(m=>m.blueTeam===name||m.redTeam===name).forEach(m=>{
    const sid=DB_MODULE.getSeriesId(m);
    if(!map[sid])map[sid]={date:m.date,league:m.league||'',week:m.week||'',blueTeam:m.blueTeam,redTeam:m.redTeam,games:[]};
    map[sid].games.push(m);
  });
  const arr=Object.values(map).sort((a,b)=>new Date(b.date)-new Date(a.date));
  arr.forEach(s=>{
    s.opponent=s.blueTeam===name?s.redTeam:s.blueTeam;
    s.ourWins=s.games.filter(g=>(g.blueTeam===name&&g.winner==='blue')||(g.redTeam===name&&g.winner==='red')).length;
    s.oppWins=s.games.length-s.ourWins; s.result=s.ourWins>=s.oppWins?'W':'L';
  });
  return arr;
}
function _rDelta(cur,prev){
  if(prev==null||cur==null) return '';
  const d=cur-prev; if(d===0) return `<span class="delta flat">±0</span>`;
  return `<span class="delta ${d>0?'up':'down'}">${d>0?'▲':'▼'} ${Math.abs(d)} pts</span>`;
}
function _rBar(label,val,games,color){
  if(val==null) return `<div class="bar-row"><div class="br-label">${label}</div><div class="bar-track"></div><div class="br-val" style="color:var(--text2)">—</div></div>`;
  return `<div class="bar-row"><div class="br-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${val}%;background:${color};"></div></div><div class="br-val">${val}%${games!==''&&games!=null?` <span style="color:var(--text2);font-weight:500;">(${games})</span>`:''}</div></div>`;
}
function _rHeroLine(name,metaTxt,wr){
  const img=`<img src="${_heroIcon(name)}" onerror="${_heroIconErr(name)}" alt="">`;
  const wrHtml = wr==null?'' : `<span class="hl-wr" style="color:${wr>=60?'var(--green)':wr>=45?'var(--gold)':'var(--red)'}">${wr}%</span>`;
  return `<div class="hero-line">${img}<span class="hl-name">${name} <span class="hl-meta">${metaTxt}</span></span>${wrHtml}</div>`;
}
function setReportTeam(v){ _rTeam=v; renderReportBody(); }
function setReportPreset(p){
  _rPreset=p;
  document.querySelectorAll('#rPresets .rpt-preset').forEach(x=>x.classList.toggle('active',x.dataset.p===p));
  document.getElementById('rCustom')?.classList.toggle('show',p==='custom');
  if(p!=='custom') renderReportBody();
}
function renderReport(){
  const area=document.getElementById('mainArea');
  let my=''; try{my=WAuth.getProfile()?.team_name||'';}catch(_){}
  if(!my){
    area.innerHTML=`<div class="rpt-empty">This report is about <b>your team</b>. Set your team in <a href="/profile" style="color:var(--accent)">Profile</a> first.<br><span style="font-size:12.5px">Want another team's report? Use the Teams view and open that team.</span></div>`;
    return;
  }
  _rTeam=my;
  const mr=_rRangeForPreset('month');
  area.innerHTML = `
    <div class="rpt-controls">
      <div class="rpt-field" style="flex:1;min-width:240px;"><label>Date range — ${my}</label>
        <div class="rpt-presets" id="rPresets">
          ${[['today','Today'],['yesterday','Yesterday'],['7d','Last 7 days'],['month','This month'],['30d','Last 30 days'],['all','All time'],['custom','Custom']].map(([p,l])=>`<button class="rpt-preset${p===_rPreset?' active':''}" data-p="${p}" onclick="setReportPreset('${p}')">${l}</button>`).join('')}
        </div>
        <div class="rpt-custom${_rPreset==='custom'?' show':''}" id="rCustom" style="margin-top:8px;">
          <input type="date" id="rFrom" value="${mr.from}" onchange="renderReportBody()"><span style="color:var(--text2);align-self:center;">→</span><input type="date" id="rTo" value="${mr.to}" onchange="renderReportBody()">
        </div>
      </div>
      <div class="rpt-actions"><button class="btn btn-ghost btn-sm" onclick="window.print()">Export PDF</button></div>
    </div>
    <div id="rptOut"></div>`;
  renderReportBody();
}
function renderReportBody(){
  const out=document.getElementById('rptOut'); if(!out) return;
  const all=DB_MODULE.getMatches();
  if(!_rTeam){ out.innerHTML=`<div class="rpt-empty">No team data yet. Log some matches first.</div>`; return; }
  let from,to;
  if(_rPreset==='custom'){ from=document.getElementById('rFrom')?.value; to=document.getElementById('rTo')?.value;
    if(!from||!to){ out.innerHTML=`<div class="rpt-empty">Pick a start and end date.</div>`; return; } if(from>to)[from,to]=[to,from]; }
  else { const r=_rRangeForPreset(_rPreset); from=r.from; to=r.to; }
  const cur=all.filter(m=>_rInRange(m,from,to));
  const t=_rComputeTeam(cur,_rTeam);
  const pr=_rPrevRange(from,to); let prevWR=null;
  if(pr){ const pt=_rComputeTeam(all.filter(m=>_rInRange(m,pr.from,pr.to)),_rTeam); if(pt.gamesPlayed) prevWR=pt.winRate; }
  if(!t.gamesPlayed){
    out.innerHTML=`<div class="rcard" style="text-align:center;padding:50px 20px;color:var(--text2)"><b style="color:var(--text)">${_rTeam}</b> played no games in <b style="color:var(--text)">${_rRangeLabel(from,to,_rPreset)}</b>.<br>Try a wider range.</div>`;
    return;
  }
  const wrColor=t.winRate>=60?'var(--green)':t.winRate>=50?'var(--gold)':'var(--red)';
  const streakTxt=t.streak.type?`${t.streak.count}${t.streak.type} streak`:'—';
  const sideTxt=(t.blueSideWR!=null||t.redSideWR!=null)?` Blue side <b>${t.blueSideWR!=null?t.blueSideWR+'%':'—'}</b> · Red side <b>${t.redSideWR!=null?t.redSideWR+'%':'—'}</b>.`:'';
  const trendTxt=prevWR!=null?(t.winRate>prevWR?` Win rate <b style="color:var(--green)">up ${t.winRate-prevWR} pts</b> vs previous period.`:t.winRate<prevWR?` Win rate <b style="color:var(--red)">down ${prevWR-t.winRate} pts</b> vs previous period.`:` Win rate <b>flat</b> vs previous period.`):'';
  const topComfort=t.topPicks.filter(p=>p.count>=2).sort((a,b)=>b.wr-a.wr)[0];
  const comfortTxt=topComfort?` Best pick: <b>${topComfort.name}</b> (${topComfort.wr}% in ${topComfort.count}).`:'';
  const good=[],bad=[];
  if(t.blueSideWR!=null&&t.blueSideWR>=65&&t.blueSideGames>=3) good.push(`Dominant Blue side — ${t.blueSideWR}% (${t.blueSideGames}g)`);
  if(t.redSideWR!=null&&t.redSideWR>=65&&t.redSideGames>=3) good.push(`Dominant Red side — ${t.redSideWR}% (${t.redSideGames}g)`);
  if(t.turtleCtrl!=null&&t.turtleCtrl>=65) good.push(`Strong Turtle control (${t.turtleCtrl}%)`);
  if(t.lordCtrl!=null&&t.lordCtrl>=65) good.push(`Strong Lord control (${t.lordCtrl}%)`);
  if(t.firstLordToWin!=null&&t.firstLordToWin>=80&&t.firstLordOurs>=3) good.push(`Closes games — ${t.firstLordToWin}% win after First Lord`);
  const cp=t.topPicks.filter(p=>p.count>=3&&p.wr>=65); if(cp.length) good.push(`Comfort picks: ${cp.slice(0,3).map(p=>`${p.name} (${p.wr}%)`).join(', ')}`);
  if(t.towerDiff!=null&&t.towerDiff>=3&&t.towerGames>=3) good.push(`+${t.towerDiff} avg tower diff`);
  if(t.blueSideWR!=null&&t.blueSideWR<40&&t.blueSideGames>=3) bad.push(`Weak Blue side — ${t.blueSideWR}% (${t.blueSideGames}g)`);
  if(t.redSideWR!=null&&t.redSideWR<40&&t.redSideGames>=3) bad.push(`Weak Red side — ${t.redSideWR}% (${t.redSideGames}g)`);
  if(t.blueSideWR!=null&&t.redSideWR!=null&&Math.abs(t.blueSideWR-t.redSideWR)>25) bad.push(`Side-dependent — Blue ${t.blueSideWR}% vs Red ${t.redSideWR}%`);
  if(t.poolDepth<6&&t.gamesPlayed>=5) bad.push(`Shallow pool — ${t.poolDepth} heroes with 2+ games`);
  const bp=t.topPicks.filter(p=>p.count>=3&&p.wr<40); if(bp.length) bad.push(`Low WR on: ${bp.slice(0,3).map(p=>`${p.name} (${p.wr}%)`).join(', ')}`);
  if(t.bansReceived.length>=3) bad.push(`Targeted bans: ${t.bansReceived.slice(0,3).map(b=>b.name).join(', ')}`);
  if(t.fbRate!=null&&t.fbRate<=30&&t.fbGames>=4) bad.push(`Low First Blood rate — ${t.fbRate}%`);
  const series=_rGroupSeries(cur,_rTeam);
  let kdaRows='';
  if(t.playerKDA){
    kdaRows=Object.entries(t.playerKDA).map(([player,p])=>({player,...p,ratio:((p.k+p.a)/Math.max(1,p.d)),wr:Math.round(p.wins/p.games*100)}))
      .sort((a,b)=>b.games-a.games).map(p=>`<tr><td><b>${p.player}</b>${p.lane?` <span style="color:var(--text2);font-size:11px">${p.lane}</span>`:''}</td><td class="r">${p.games}</td><td class="r">${(p.k/p.games).toFixed(1)}/${(p.d/p.games).toFixed(1)}/${(p.a/p.games).toFixed(1)}</td><td class="r" style="color:${p.ratio>=4?'var(--green)':p.ratio>=2.5?'var(--gold)':'var(--red)'};font-weight:700">${p.ratio.toFixed(2)}</td><td class="r" style="color:${p.wr>=50?'var(--green)':'var(--red)'}">${p.wr}%</td></tr>`).join('');
  }
  out.innerHTML=`
    <div class="rpt-digest">
      <div class="dh-team">${_rTeam}</div>
      <div class="dh-range">${_rRangeLabel(from,to,_rPreset)} · ${t.gamesPlayed} game${t.gamesPlayed>1?'s':''}${t.leagues.length?` · ${t.leagues.join(', ')}`:''}</div>
      <div class="dh-line">Record <b>${t.wins}–${t.losses}</b> (<b style="color:${wrColor}">${t.winRate}% WR</b>).${trendTxt}${sideTxt}${comfortTxt}</div>
    </div>

function buildMetaTable(matches, roleFilter) {
  roleFilter = roleFilter || 'All';
  if (!matches.length) return `<div class="empty-state"><p>No match data for this filter.</p></div>`;
  const total = matches.length;
  const stats = {};

  matches.forEach(m => {
    [...(m.bluePicks||[]).map(p=>({...p,team:'blue'})), ...(m.redPicks||[]).map(p=>({...p,team:'red'}))].forEach(p => {
      const n = p.name||p;
      if (!stats[n]) stats[n] = {picks:0,bans:0,wins:0};
      stats[n].picks++;
      if (m.winner===p.team) stats[n].wins++;
    });
    [...(m.blueBans||[]), ...(m.redBans||[])].forEach(b => {
      const n = b.name||b;
      if (!stats[n]) stats[n] = {picks:0,bans:0,wins:0};
      stats[n].bans++;
    });
  });

  let rows = Object.entries(stats).map(([name,d]) => ({
    name,
    picks: d.picks, bans: d.bans, wins: d.wins,
    presence:  Math.round((d.picks+d.bans)/total*100),
    pickRate:  Math.round(d.picks/total*100),
    banRate:   Math.round(d.bans/total*100),
    winRate:   d.picks>0 ? Math.round(d.wins/d.picks*100) : null,
    h: heroByName(name),
  }));

  // Apply lane/role filter — use PRIMARY lane only so heroes don't bleed into secondary lanes
  if (roleFilter !== 'All') {
    rows = rows.filter(r => {
      if (!r.h) return false;
      return heroLanes(r.h)[0] === roleFilter;
    });
  }

  rows.sort((a,b) => {
    if (metaSort==='presence') return b.presence-a.presence;
    if (metaSort==='pickrate') return b.pickRate-a.pickRate;
    if (metaSort==='banrate')  return b.banRate-a.banRate;
    if (metaSort==='winrate')  return (b.winRate||0)-(a.winRate||0);
    if (metaSort==='picks')    return b.picks-a.picks;
    return b.bans-a.bans;
  });

  const tbody = rows.map((r,i) => {
    const wrc = r.winRate===null?'var(--text3)':r.winRate>=60?'var(--green)':r.winRate>=50?'var(--gold)':'var(--red)';
    const presenceColor = r.presence>=80?'var(--red)':r.presence>=50?'var(--gold)':'var(--blue)';
    return `<tr>
      <td style="color:var(--text3);font-family:var(--font-mono);font-size:11px;width:28px;">${i+1}</td>
      <td>
        <div class="hero-cell">
          ${r.h ? `<img src="${_heroIcon(r.h.name)}" onerror="${_heroIconErr(r.h.name)}">` : ''}
          <div>
            <div style="font-weight:600;">${r.name}</div>
            <div style="font-size:9px;color:var(--text3);">${r.h?.role||''}</div>
          </div>
        </div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="wr-bar"><div class="wr-fill" style="width:${r.presence}%;background:${presenceColor};"></div></div>
          <span style="font-size:11px;font-weight:700;font-family:var(--font-mono);">${r.presence}%</span>
        </div>
      </td>
      <td><span style="font-weight:700;">${r.pickRate}%</span> <span style="font-size:10px;color:var(--text3);">(${r.picks})</span></td>
      <td><span style="font-weight:700;color:var(--red);">${r.banRate}%</span> <span style="font-size:10px;color:var(--text3);">(${r.bans})</span></td>
      <td><span style="font-weight:700;color:${wrc};">${r.winRate!==null?r.winRate+'%':'—'}</span></td>
    </tr>`;
  }).join('');

  return `
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px;font-family:var(--font-mono);">${total} games · ${rows.length} heroes tracked</div>
    <div style="overflow-x:auto;">
      <table class="meta-table">
        <thead>
          <tr>
            <th>#</th>
            <th onclick="metaSort='picks';renderMeta()">Hero</th>
            <th onclick="metaSort='presence';renderMeta()" class="${metaSort==='presence'?'sorted':''}">Presence ↕</th>
            <th onclick="metaSort='pickrate';renderMeta()" class="${metaSort==='pickrate'?'sorted':''}">Pick Rate ↕</th>
            <th onclick="metaSort='banrate';renderMeta()"  class="${metaSort==='banrate' ?'sorted':''}">Ban Rate ↕</th>
            <th onclick="metaSort='winrate';renderMeta()"  class="${metaSort==='winrate' ?'sorted':''}">Win Rate ↕</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

function importData(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      let imported = 0, updated = 0;
      const wsM = wb.Sheets['Scout_Matches'];
      if (wsM) {
        const rows = XLSX.utils.sheet_to_json(wsM, {header:1});
        const hdrs = (rows[0]||[]).map(h=>(h||'').toString().trim());
        const hasSeriesId = hdrs[1]==='SeriesID';

        rows.slice(1).forEach(r => {
          let id, seriesIdCol, league, season, stage, week, sf, gn, bt, rt, winner, date, vod, notes;
          let bb1,bb2,bb3,bb4,bb5, rb1,rb2,rb3,rb4,rb5;
          let bp1n,bp1l,bp2n,bp2l,bp3n,bp3l,bp4n,bp4l,bp5n,bp5l;
          let rp1n,rp1l,rp2n,rp2l,rp3n,rp3l,rp4n,rp4l,rp5n,rp5l;

          if (hasSeriesId) {
            [id,seriesIdCol,league,season,stage,week,sf,gn,bt,rt,winner,date,vod,notes,bb1,bb2,bb3,bb4,bb5,rb1,rb2,rb3,rb4,rb5,bp1n,bp1l,bp2n,bp2l,bp3n,bp3l,bp4n,bp4l,bp5n,bp5l,rp1n,rp1l,rp2n,rp2l,rp3n,rp3l,rp4n,rp4l,rp5n,rp5l] = r;
          } else {
            [id,league,season,stage,week,sf,gn,bt,rt,winner,date,vod,notes,bb1,bb2,bb3,bb4,bb5,rb1,rb2,rb3,rb4,rb5,bp1n,bp1l,bp2n,bp2l,bp3n,bp3l,bp4n,bp4l,bp5n,bp5l,rp1n,rp1l,rp2n,rp2l,rp3n,rp3l,rp4n,rp4l,rp5n,rp5l] = r;
          }
          if (!id) return;

          const mk = (n,l) => n ? {name:String(n),lane:l||null} : null;
          const wk = (week||'').trim();
          const fmtClean = (sf||'BO3').trim();
          const rawKey = `${(wk||date||'').trim()}|${[bt,rt].sort().join('|')}|${(league||'').trim()}|${(stage||'').trim()}|${fmtClean}`;
          const seriesId = (seriesIdCol && String(seriesIdCol).startsWith('sid_')) ? seriesIdCol :
            ('sid_' + DB_MODULE._hashStr(rawKey));

          // Admin lock — skip official league rows if not admin
          if (typeof WAdmin !== 'undefined' && !WAdmin.canWrite(league||'')) {
            return; // silently skip locked league rows for non-admins
          }

          const existing = DB_MODULE.getMatches().find(m => m.id === id);
          if (existing) {
            if (existing.seriesId !== seriesId) { existing.seriesId = seriesId; updated++; }
            return;
          }

          DB_MODULE.upsertMatch({
            id, league, season, stage, week:wk, seriesFormat:fmtClean,
            gameNum: Number(gn)||1, blueTeam:bt, redTeam:rt, winner, date,
            vodLink:vod||'', notes:notes||'', seriesId,
            blueBans:  [bb1,bb2,bb3,bb4,bb5].filter(Boolean),
            redBans:   [rb1,rb2,rb3,rb4,rb5].filter(Boolean),
            bluePicks: [mk(bp1n,bp1l),mk(bp2n,bp2l),mk(bp3n,bp3l),mk(bp4n,bp4l),mk(bp5n,bp5l)].filter(Boolean),
            redPicks:  [mk(rp1n,rp1l),mk(rp2n,rp2l),mk(rp3n,rp3l),mk(rp4n,rp4l),mk(rp5n,rp5l)].filter(Boolean),
          });
          imported++;
        });
      }

      const wsT = wb.Sheets['Scout_Teams'];
      if (wsT) {
        XLSX.utils.sheet_to_json(wsT, {header:1}).slice(1).forEach(r => {
          const [name,,,,,,,,,,wc,notes] = r;
          if (!name) return;
          DB_MODULE.upsertTeam(String(name), {
            winCondition: wc||'',
            coachNotes:   notes||'',
          });
        });
      }

      DB_MODULE.rebuildTeams();
      DB_MODULE.save();
      showView(currentView);
      toast(`✓ ${imported} new · ${updated} updated`);
    } catch(err) {
      toast('Import failed: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

// OBJECTIVE EDITOR — dynamic turtle / lord tracking
// ══════════════════════════════════════════════════════════════

/* Read objectives from either new array format or legacy t1/t2/t3 keys */
function _readObjArr(m, type) {
  const obj = m.objectives || {};
  if (type === 'turtle') {
    return obj.turtle || [obj.t1, obj.t2, obj.t3].filter(Boolean);
  }
  return obj.lord || [obj.l1, obj.l2, obj.l3].filter(Boolean);
}

/* Build the inner HTML for one objective row (turtle or lord). */
/* Header summary "Turtle · 2 · 1 · First Blue" then labeled chips T1/T2/T3. */
function _buildObjRowHTML(type, values) {
  const labelShort = type === 'turtle' ? 'T' : 'L';
  const label = type === 'turtle' ? 'Turtle' : 'Lord';
  let html = _objHeaderHTML(type, label, values);
  values.forEach((v, i) => {
    const cls = v === 'blue' ? 'blue' : v === 'red' ? 'red' : '';
    const txt = v === 'blue' ? 'Blue' : v === 'red' ? 'Red' : '—';
    html += `<span class="obj-chip">
      <span class="obj-num">${labelShort}${i + 1}</span>
      <button class="obj-pill ${cls}" data-type="${type}" data-val="${v}" onclick="cycleObj(this)" type="button">${txt}</button>
      <button class="obj-x" onclick="removeObj('${type}',${i})" type="button" title="Remove">✕</button>
    </span>`;
  });
  html += `<button class="obj-add" onclick="addObj('${type}')" type="button">+ ${label}</button>`;
  return html;
}

/* Header markup factored out so both initial render and refresh use the same source of truth. */
function _objHeaderHTML(type, label, values) {
  const blueCnt = values.filter(v => v === 'blue').length;
  const redCnt  = values.filter(v => v === 'red').length;
  const firstNonEmpty = values.find(v => v === 'blue' || v === 'red') || '';
  const firstHTML = firstNonEmpty === 'blue' ? '<span class="o-dot" style="color:#60a5fa;">●</span>Blue'
                  : firstNonEmpty === 'red'  ? '<span class="o-dot" style="color:#f87171;">●</span>Red'
                  : '—';
  return `<span class="obj-header" data-obj-header="${type}">
    <span class="o-label">${label}</span>
    <span class="o-cnt-blue">${blueCnt}</span>
    <span style="color:var(--text4);">·</span>
    <span class="o-cnt-red">${redCnt}</span>
    <span class="o-first">First ${firstHTML}</span>
  </span>`;
}

/* Refresh just the header summary of an objective row (called after a cycle click). */
function _refreshObjHeader(type) {
  const row = document.getElementById('obj-' + type + '-row');
  if (!row) return;
  const values = [...row.querySelectorAll('[data-type="' + type + '"]')].map(b => b.dataset.val || '');
  const header = row.querySelector('[data-obj-header="' + type + '"]');
  if (!header) return;
  const label = type === 'turtle' ? 'Turtle' : 'Lord';
  // Re-emit only the header's inner; outer wrapper kept stable.
  header.outerHTML = _objHeaderHTML(type, label, values);
}

/* Re-render one objective row from current button values + add new empty slot */
function addObj(type) {
  const row = document.getElementById('obj-' + type + '-row');
  if (!row) return;
  const vals = [...row.querySelectorAll('[data-type="' + type + '"]')].map(b => b.dataset.val || '');
  vals.push('');
  row.innerHTML = _buildObjRowHTML(type, vals);
}

/* Remove one slot and re-render */
function removeObj(type, idx) {
  const row = document.getElementById('obj-' + type + '-row');
  if (!row) return;
  const vals = [...row.querySelectorAll('[data-type="' + type + '"]')].map(b => b.dataset.val || '');
  vals.splice(idx, 1);
  row.innerHTML = _buildObjRowHTML(type, vals);
}

/* Cycle a single objective button: (none) → blue → red → (none) */
function cycleObj(btn) {
  const states = ['', 'blue', 'red'];
  const cur = btn.dataset.val || '';
  const next = states[(states.indexOf(cur) + 1) % states.length];
  btn.dataset.val = next;
  btn.textContent = next === 'blue' ? 'Blue' : next === 'red' ? 'Red' : '—';
  btn.className = 'obj-pill' + (next ? ' ' + next : '');
  // If this button is part of the first chip in its row, refresh the header summary.
  const row = btn.closest('[id^="obj-"]');
  if (row) _refreshObjHeader(row.id.includes('turtle') ? 'turtle' : 'lord');
}

/* Three-state First Blood picker — iOS-style segment control. Blue / Red / — */
function _buildFirstBloodHTML(current) {
  const opts = [
    { v: 'blue', label: 'Blue', cls: 'blue' },
    { v: 'red',  label: 'Red',  cls: 'red' },
    { v: '',     label: '—',    cls: '' },
  ];
  return opts.map(o => {
    const active = (current||'') === o.v;
    return `<button type="button" data-fb="${o.v}" onclick="setFirstBlood('${o.v}')"
      class="${active ? 'active ' + o.cls : ''}">${o.label}</button>`;
  }).join('');
}

function setFirstBlood(v) {
  const row = document.getElementById('fb-row');
  if (!row) return;
  row.dataset.value = v || '';
  row.innerHTML = _buildFirstBloodHTML(v);
}

function _readFirstBlood() {
  const row = document.getElementById('fb-row');
  return row?.dataset.value || '';
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
function checkLeagueAdminLock(league) {
  const warn = document.getElementById('leagueAdminWarning');
  if (!warn) return;
  const isLocked = typeof WAdmin !== 'undefined' && WAdmin.LOCKED_LEAGUES.includes(league);
  const isAdmin  = typeof WAdmin !== 'undefined' && WAdmin.isAdmin();
  warn.style.display = (isLocked && !isAdmin) ? 'block' : 'none';
}

// Admin-only nav link reveal is handled centrally by warr-nav.js
// (looks for ids prefixed `adminNav_`). Nothing to do here.

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

</script>

</div><!-- /.page-body -->
