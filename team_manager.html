<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Manager — Warr.GG</title>
<link rel="stylesheet" href="warr-styles.css">
<style>
:root { --nav-h: 52px; }
body { background: var(--bg); min-height: 100vh; }
.page-wrap { max-width: 1080px; margin: 0 auto; padding: calc(var(--nav-h) + 32px) 20px 80px; }

.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
}
.page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -.01em; }
.page-sub   { font-size: 13px; color: var(--text3); margin-top: 3px; }

/* ── Layout ── */
.two-col { display: grid; grid-template-columns: 260px 1fr; gap: 20px; align-items: start; }
@media(max-width:760px){ .two-col { grid-template-columns: 1fr; } }

/* ── Card ── */
.card {
  background: var(--surface); border: 1px solid var(--glass-border2);
  border-radius: var(--r2); padding: 20px;
}
.card-title {
  font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}

/* ── Team list ── */
.team-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.team-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: var(--r);
  background: var(--surface2); border: 1px solid transparent;
  cursor: pointer; gap: 8px; transition: border-color .15s;
}
.team-item:hover { border-color: var(--border2); }
.team-item.active { background: var(--accent-dim); border-color: var(--accent-border); }
.team-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
.team-item-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.team-lock { font-size: 10px; color: var(--gold); }

/* ── Buttons ── */
.btn {
  padding: 8px 16px; border-radius: var(--r); font-size: 12px; font-weight: 700;
  border: 1px solid transparent; cursor: pointer; font-family: var(--font-head);
  letter-spacing: .03em; transition: opacity .15s; white-space: nowrap;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn-accent { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }
.btn-green  { background: var(--neon-dim);   color: var(--neon);   border-color: var(--neon-border);   }
.btn-red    { background: var(--red-dim);    color: var(--red);    border-color: var(--red-border);    }
.btn-gold   { background: var(--gold-dim);   color: var(--gold);   border-color: var(--gold-border);   }
.btn-ghost  { background: var(--surface3);   color: var(--text2);  border-color: var(--border2);       }
.btn-sm { padding: 5px 12px; font-size: 11px; }

/* ── Form ── */
.form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.form-input {
  flex: 1; min-width: 120px; padding: 8px 12px;
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--text); font-size: 13px;
  font-family: var(--font-body); outline: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
.form-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; display: block; }

/* ── Team detail header ── */
.team-detail-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
}
.team-detail-name { font-size: 20px; font-weight: 800; color: var(--text); }
.team-detail-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.tab-btn {
  padding: 8px 16px; font-size: 12px; font-weight: 700; letter-spacing: .04em;
  background: none; border: none; cursor: pointer; color: var(--text3);
  border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--font-head);
  transition: color .15s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover { color: var(--text); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Player roster ── */
.roster-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.player-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border: 1px solid var(--glass-border);
  border-radius: var(--r); padding: 12px 14px;
}
.player-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: var(--accent); flex-shrink: 0;
}
.player-info { flex: 1; min-width: 0; }
.player-ign  { font-size: 13px; font-weight: 700; color: var(--text); }
.player-real { font-size: 11px; color: var(--text3); }
.player-status {
  padding: 2px 8px; border-radius: var(--pill); font-size: 10px; font-weight: 700;
}
.player-status.active   { background: var(--neon-dim);  color: var(--neon);  border: 1px solid var(--neon-border); }
.player-status.inactive { background: var(--surface3); color: var(--text3); border: 1px solid var(--border2); }
.role-badge {
  padding: 2px 8px; border-radius: var(--pill); font-size: 10px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
  background: var(--surface3); color: var(--text3); border: 1px solid var(--border2);
}
.role-badge.Gold   { background: rgba(200,144,80,.15);  color: #C89050; border-color: rgba(200,144,80,.35); }
.role-badge.Jungle { background: rgba(76,184,122,.15);  color: #4CB87A; border-color: rgba(76,184,122,.35); }
.role-badge.Mid    { background: rgba(168,136,204,.15); color: #A888CC; border-color: rgba(168,136,204,.35); }
.role-badge.EXP    { background: rgba(94,160,216,.15);  color: #5EA0D8; border-color: rgba(94,160,216,.35); }
.role-badge.Roam   { background: rgba(216,120,128,.15); color: #D87880; border-color: rgba(216,120,128,.35); }
.role-select {
  padding: 4px 8px; background: var(--surface3); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--text); font-size: 11px; font-weight: 600;
  cursor: pointer;
}
.player-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

/* ── Hero pool table ── */
.pool-filters {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center;
}
.pool-filter-select {
  padding: 6px 10px; background: var(--surface3); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--text); font-size: 12px;
  font-family: var(--font-body); outline: none; cursor: pointer;
}
.pool-filter-select:focus { border-color: var(--accent); }

.player-select-btn {
  padding: 6px 12px; border-radius: var(--r); background: var(--surface3);
  border: 1px solid var(--border2); color: var(--text2); font-size: 12px;
  font-weight: 600; cursor: pointer; font-family: var(--font-head);
  transition: border-color .15s;
}
.player-select-btn.selected { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

.hero-pool-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.hero-pool-table th {
  text-align: left; padding: 8px 10px; font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; color: var(--text3);
  border-bottom: 1px solid var(--glass-border);
}
.hero-pool-table td {
  padding: 9px 10px; border-bottom: 1px solid var(--border);
  color: var(--text2); vertical-align: middle;
}
.hero-pool-table tr:last-child td { border-bottom: none; }
.hero-pool-table tr:hover td { background: var(--surface2); }

.hero-name-cell { color: var(--text); font-weight: 600; display: flex; align-items: center; gap: 8px; }
.hero-portrait {
  width: 24px; height: 24px; border-radius: 6px; object-fit: cover;
  background: var(--surface3);
}
.lane-badge {
  display: inline-block; padding: 2px 7px; border-radius: var(--pill);
  font-size: 10px; font-weight: 700; letter-spacing: .04em;
}
.wr-bar-wrap { display: flex; align-items: center; gap: 8px; }
.wr-bar { height: 4px; border-radius: var(--pill); background: var(--surface3); width: 80px; overflow: hidden; }
.wr-bar-fill { height: 100%; border-radius: var(--pill); }

/* ── Empty ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }
.empty-icon  { font-size: 32px; margin-bottom: 8px; }

/* ── Add player form inline ── */
.add-player-form {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r2); padding: 16px; margin-top: 4px;
}
.add-player-form .form-row { margin-bottom: 8px; }

/* ── Toast ── */
.toast-msg {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 10px 20px; font-size: 13px; color: var(--text);
  transition: transform .3s ease; z-index: 9999; white-space: nowrap;
  box-shadow: var(--shadow);
}
</style>
</head>
<body>

<!-- NAV -->
<div id="warr-nav-root"></div><div class="page-wrap">
  <div class="page-header">
    <div>
      <div class="page-title">Team Manager</div>
      <div class="page-sub">Manage rosters, view player hero pools and win rates from match data.</div>
    </div>
    <button class="btn btn-accent" id="addTeamBtn" onclick="openAddTeam()" style="display:none;">+ Add Team</button>
  </div>

  <!-- View mode tabs -->
  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="btn btn-accent" id="viewTeamsBtn" onclick="setViewMode('teams')">By Team</button>
    <button class="btn btn-ghost" id="viewPlayersBtn" onclick="setViewMode('players')">All Players</button>
  </div>

  <!-- All Players view -->
  <div id="allPlayersView" style="display:none;">
    <div class="card">
      <div class="card-title">ALL PLAYERS</div>
      <input class="form-input" id="playerSearch" placeholder="Search player IGN or team…" oninput="renderAllPlayers()" style="margin-bottom:14px;width:100%;box-sizing:border-box;" />
      <div id="allPlayersList"></div>
    </div>
  </div>

  <div id="teamsView">
  <div class="two-col">
    <!-- Left: team list -->
    <div>
      <div class="card">
        <div class="card-title">TEAMS</div>
        <input class="form-input" id="teamSearch" placeholder="Search teams…" oninput="renderTeamList()" style="margin-bottom:10px;width:100%;box-sizing:border-box;" />
        <div class="team-list" id="teamList">
          <div style="color:var(--text3);font-size:12px;padding:8px 0;">Loading…</div>
        </div>

        <!-- Add team form (admin only) -->
        <div id="addTeamForm" style="display:none;">
          <div class="card-title" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">NEW TEAM</div>
          <div class="form-row">
            <input class="form-input" id="newTeamName"   placeholder="Team name (e.g. ECHO)" />
          </div>
          <div class="form-row">
            <input class="form-input" id="newTeamRegion" placeholder="Region (optional)" />
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-green btn-sm" onclick="saveNewTeam()">Save</button>
            <button class="btn btn-ghost btn-sm" onclick="closeAddTeam()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: team detail -->
    <div id="teamDetail">
      <div class="card">
        <div class="empty-state">
          <div class="empty-icon">👥</div>
          <div>Select a team to view its roster and hero pool.</div>
        </div>
      </div>
    </div>
  </div>
  </div><!-- /teamsView -->
</div>

<div id="toastMsg" class="toast-msg"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="warr-lib.js"></script>
<script src="warr-nav.js"></script>
<script>
// ── Auth + permission init ────────────────────────────────────
let _isAdmin = false;
let _isVerified = false;
let _myTeam = null;

(async () => {
  if (typeof WAuth !== 'undefined') {
    await WAuth.restoreSession?.();
    WAuth.renderAuthChip?.('navRight');
    if (typeof WAdmin !== 'undefined') await WAdmin.loadExtraAdmins?.();
  }
  _isAdmin    = WAdmin.isAdmin();
  _isVerified = WAdmin.isVerifiedTeam();
  _myTeam     = WAdmin.myTeamName();

  // Everyone can view — edit controls are shown/hidden per permission inside renderTeamDetail
  if (_isAdmin) document.getElementById('addTeamBtn').style.display = 'inline-block';
  await loadAll();
})();

// ── State ─────────────────────────────────────────────────────
let allTeams   = [];   // { team_name, region, player_count }
let allPlayers = [];   // flat list from DB
let allMatches = [];   // for hero pool computation
let leagues    = [];
let seasons    = [];
let activeTeam = null; // currently selected team_name

let poolFilter = { playerId: null, source: 'all', league: '', season: '' };

// ── Load ──────────────────────────────────────────────────────
async function loadAll() {
  try {
    [allPlayers, allMatches, leagues] = await Promise.all([
      WDB.loadPlayers(),
      WDB.loadMatches(),
      WDB.loadLeagues(),
    ]);
    // Build unique team list from players + existing scout match teams
    buildTeamList();
    renderTeamList();
  } catch(e) {
    toast('Load error: ' + e.message, 'error');
  }
}

function buildTeamList() {
  // Collect team names from players table
  const teamMap = {};
  allPlayers.forEach(p => {
    if (!teamMap[p.team_name]) teamMap[p.team_name] = { team_name: p.team_name, region: '', player_count: 0 };
    teamMap[p.team_name].player_count++;
  });
  // Also surface teams from match data that have no players yet
  allMatches.forEach(m => {
    [m.blueTeam, m.redTeam].forEach(t => {
      if (t && !teamMap[t]) teamMap[t] = { team_name: t, region: '', player_count: 0 };
    });
  });
  allTeams = Object.values(teamMap).sort((a,b) => a.team_name.localeCompare(b.team_name));
}

// ── View mode (by team / all players) ────────────────────────
let viewMode = 'teams';
function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('teamsView').style.display     = mode === 'teams'   ? '' : 'none';
  document.getElementById('allPlayersView').style.display = mode === 'players' ? '' : 'none';
  document.getElementById('viewTeamsBtn').className   = 'btn ' + (mode === 'teams'   ? 'btn-accent' : 'btn-ghost');
  document.getElementById('viewPlayersBtn').className = 'btn ' + (mode === 'players' ? 'btn-accent' : 'btn-ghost');
  if (mode === 'players') renderAllPlayers();
}

// ── All players view ──────────────────────────────────────────
function renderAllPlayers() {
  const q = (document.getElementById('playerSearch')?.value || '').toLowerCase();
  const el = document.getElementById('allPlayersList');
  const filtered = allPlayers.filter(p =>
    !q || p.ign.toLowerCase().includes(q) || (p.real_name||'').toLowerCase().includes(q) || p.team_name.toLowerCase().includes(q)
  );
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>No players found.</div></div>';
    return;
  }
  el.innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr>
        <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--glass-border);">Player</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--glass-border);">Team</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--glass-border);">Role</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--glass-border);">Status</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--glass-border);">Top Heroes</th>
        <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--glass-border);">Games Tagged</th>
        <th style="text-align:right;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--glass-border);"></th>
      </tr></thead>
      <tbody>
        ${filtered.map(p => {
          const { total, games } = WDB.computePlayerHeroPool(allMatches, p.ign);
          const topHeroes = Object.entries(total)
            .sort((a,b) => b[1].games - a[1].games)
            .slice(0, 3)
            .map(([hero, s]) => {
              const wr = s.games ? Math.round(s.wins/s.games*100) : 0;
              const heroId = hero.toLowerCase().replace(/[^a-z0-9]/g,'');
              return `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:6px;">
                <img src="./portraits/${heroId}.png" onerror="this.style.display='none'" style="width:20px;height:20px;border-radius:5px;object-fit:cover;background:var(--surface3);">
                <span style="color:var(--text);font-weight:600;">${esc(hero)}</span>
                <span style="color:${wr>=60?'var(--neon)':wr>=50?'var(--text3)':'var(--red)'};font-size:11px;">${wr}%</span>
              </span>`;
            }).join('');
          return `<tr style="border-bottom:1px solid var(--border);cursor:pointer;" onclick="viewPlayerDetail('${esc(p.id)}')">
            <td style="padding:10px 10px;">
              <div style="font-weight:700;color:var(--text);">${esc(p.ign)}</div>
              ${p.real_name ? `<div style="font-size:11px;color:var(--text3);">${esc(p.real_name)}</div>` : ''}
            </td>
            <td style="padding:10px 10px;color:var(--text2);">${esc(p.team_name)}</td>
            <td style="padding:10px 10px;">
              ${p.role ? `<span class="role-badge ${p.role}">${p.role}</span>` : `<span style="color:var(--text3);font-size:11px;">—</span>`}
            </td>
            <td style="padding:10px 10px;">
              <span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;
                ${p.is_active!==false ? 'background:var(--neon-dim);color:var(--neon);border:1px solid var(--neon-border);' : 'background:var(--surface3);color:var(--text3);border:1px solid var(--border2);'}">
                ${p.is_active!==false ? 'Active' : 'Former'}
              </span>
            </td>
            <td style="padding:10px 10px;">${topHeroes || '<span style="color:var(--text3);font-size:11px;">No data yet</span>'}</td>
            <td style="padding:10px 10px;color:var(--text3);">${games}</td>
            <td style="padding:10px 10px;text-align:right;">
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();viewPlayerDetail('${esc(p.id)}')">View Pool →</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function viewPlayerDetail(playerId) {
  const player = allPlayers.find(p => p.id === playerId);
  if (!player) return;
  // Switch to team view, select that team, then pick the player in the pool tab
  setViewMode('teams');
  selectTeam(player.team_name).then(() => {
    poolFilter.playerId = playerId;
    // Switch to pool tab
    const tabs = document.querySelectorAll('.tab-btn');
    if (tabs[1]) switchTab('pool', player.team_name, tabs[1]);
    // Render pool
    const content = document.getElementById('heroPoolContent');
    if (content) content.innerHTML = renderHeroPool();
    // Highlight the player button
    document.querySelectorAll('.player-select-btn').forEach(b => {
      b.classList.toggle('selected', b.getAttribute('onclick')?.includes(playerId));
    });
  });
}

// ── Render team list ──────────────────────────────────────────
function renderTeamList() {
  const el = document.getElementById('teamList');
  const q  = (document.getElementById('teamSearch')?.value || '').toLowerCase();
  if (!allTeams.length) {
    el.innerHTML = '<div class="empty-state"><div>No teams yet.</div></div>';
    return;
  }
  const visible = q ? allTeams.filter(t => t.team_name.toLowerCase().includes(q)) : allTeams;
  el.innerHTML = visible.map(t => `
    <div class="team-item ${activeTeam === t.team_name ? 'active' : ''}" onclick="selectTeam('${esc(t.team_name)}')">
      <div>
        <div class="team-item-name">${esc(t.team_name)}</div>
        <div class="team-item-meta">${t.player_count} player${t.player_count !== 1 ? 's' : ''}</div>
      </div>
      ${WAdmin.canManageTeam(t.team_name) ? '<span style="font-size:10px;color:var(--accent);">✎</span>' : ''}
    </div>`).join('');
}

// ── Select team ───────────────────────────────────────────────
async function selectTeam(teamName) {
  activeTeam = teamName;
  poolFilter = { playerId: null, source: 'all', league: '', season: '' }; // reset on team switch
  renderTeamList();
  renderTeamDetail(teamName);
  try { seasons = await WDB.loadSeasons(); } catch(e) {}
}

function renderTeamDetail(teamName) {
  const canManage = WAdmin.canManageTeam(teamName);
  const players   = allPlayers.filter(p => p.team_name === teamName);
  const active    = players.filter(p => p.is_active !== false);
  const inactive  = players.filter(p => p.is_active === false);

  document.getElementById('teamDetail').innerHTML = `
    <div class="card">
      <div class="team-detail-header">
        <div>
          <div class="team-detail-name">${esc(teamName)}</div>
          <div class="team-detail-meta">${active.length} active · ${inactive.length} former</div>
        </div>
        ${canManage ? `<button class="btn btn-red btn-sm" onclick="confirmDeleteTeam('${esc(teamName)}')">Delete Team</button>` : ''}
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('roster','${esc(teamName)}',this)">ROSTER</button>
        <button class="tab-btn" onclick="switchTab('pool','${esc(teamName)}',this)">HERO POOL</button>
      </div>

      <!-- ROSTER TAB -->
      <div class="tab-panel active" id="tab-roster">
        <div class="roster-list" id="rosterList">
          ${renderRosterItems(players, canManage)}
        </div>
        ${canManage ? `
        <div id="addPlayerToggle">
          <button class="btn btn-accent btn-sm" onclick="toggleAddPlayer()">+ Add Player</button>
        </div>
        <div id="addPlayerForm" style="display:none;" class="add-player-form">
          <div class="card-title">ADD PLAYER</div>
          <div class="form-row">
            <div style="flex:1;">
              <label class="form-label">IGN (In-Game Name)</label>
              <input class="form-input" id="newIgN" placeholder="e.g. KarlTzy" style="width:100%;box-sizing:border-box;" />
            </div>
            <div style="flex:1;">
              <label class="form-label">Real Name (optional)</label>
              <input class="form-input" id="newRealName" placeholder="e.g. Karl Gabriel" style="width:100%;box-sizing:border-box;" />
            </div>
          </div>
          <div class="form-row">
            <div style="flex:1;">
              <label class="form-label">Role</label>
              <select class="form-input" id="newRole" style="width:100%;box-sizing:border-box;">
                <option value="">— Unassigned —</option>
                <option value="Gold">Gold Lane</option>
                <option value="Jungle">Jungle</option>
                <option value="Mid">Mid Lane</option>
                <option value="EXP">EXP Lane</option>
                <option value="Roam">Roam</option>
              </select>
            </div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-green btn-sm" onclick="addPlayer('${esc(teamName)}')">Save Player</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleAddPlayer()">Cancel</button>
          </div>
        </div>` : ''}
      </div>

      <!-- HERO POOL TAB -->
      <div class="tab-panel" id="tab-pool">
        ${renderHeroPoolTab(teamName, players)}
      </div>
    </div>`;
}

function renderRosterItems(players, canManage) {
  if (!players.length) {
    return '<div class="empty-state"><div class="empty-icon">👤</div><div>No players yet.</div></div>';
  }
  const active   = players.filter(p => p.is_active !== false);
  const inactive = players.filter(p => p.is_active === false);
  const renderGroup = (list, label) => {
    if (!list.length) return '';
    return `
      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin:8px 0 6px;">${label}</div>
      ${list.map(p => `
      <div class="player-row">
        <div class="player-avatar">${esc(p.ign[0].toUpperCase())}</div>
        <div class="player-info">
          <div class="player-ign">${esc(p.ign)}</div>
          ${p.real_name ? `<div class="player-real">${esc(p.real_name)}</div>` : ''}
        </div>
        ${p.role ? `<span class="role-badge ${p.role}">${p.role}</span>` : (canManage ? '' : `<span class="role-badge">—</span>`)}
        <span class="player-status ${p.is_active !== false ? 'active' : 'inactive'}">${p.is_active !== false ? 'Active' : 'Former'}</span>
        ${canManage ? `
        <div class="player-actions">
          <select class="role-select" onchange="setPlayerRole('${p.id}', this.value)" title="Assign role">
            <option value="" ${!p.role?'selected':''}>— Role —</option>
            <option value="Gold"   ${p.role==='Gold'?'selected':''}>Gold</option>
            <option value="Jungle" ${p.role==='Jungle'?'selected':''}>Jungle</option>
            <option value="Mid"    ${p.role==='Mid'?'selected':''}>Mid</option>
            <option value="EXP"    ${p.role==='EXP'?'selected':''}>EXP</option>
            <option value="Roam"   ${p.role==='Roam'?'selected':''}>Roam</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="togglePlayerActive('${p.id}', ${p.is_active !== false})">${p.is_active !== false ? 'Bench' : 'Reactivate'}</button>
          <button class="btn btn-red btn-sm" onclick="removePlayer('${p.id}','${esc(p.ign)}')">✕</button>
        </div>` : ''}
      </div>`).join('')}`;
  };
  return renderGroup(active, 'Active Roster') + renderGroup(inactive, 'Former / Benched');
}

function renderHeroPoolTab(teamName, players) {
  const activePlayers = players.filter(p => p.is_active !== false);
  if (!activePlayers.length) {
    return '<div class="empty-state"><div class="empty-icon">🦸</div><div>Add players to the roster first to view hero pools.</div></div>';
  }

  const leagueOpts = leagues.map(l => `<option value="${esc(l.name)}">${esc(l.name)}</option>`).join('');
  const playerBtns = activePlayers.map(p =>
    `<button class="player-select-btn ${poolFilter.playerId === p.id ? 'selected' : ''}"
      onclick="setPoolPlayer('${p.id}')">${esc(p.ign)}</button>`).join('');

  return `
    <div class="pool-filters">
      <div style="font-size:11px;color:var(--text3);margin-right:4px;">Player:</div>
      ${playerBtns}
    </div>
    <div class="pool-filters">
      <select class="pool-filter-select" id="poolSource" onchange="updatePoolFilter()">
        <option value="all">All matches</option>
        <option value="official">Official only</option>
        <option value="scrims">Scrims only</option>
      </select>
      <select class="pool-filter-select" id="poolLeague" onchange="updatePoolFilter()">
        <option value="">All leagues</option>
        ${leagueOpts}
      </select>
      <select class="pool-filter-select" id="poolSeason" onchange="updatePoolFilter()">
        <option value="">All seasons</option>
      </select>
    </div>
    <div id="heroPoolContent">
      ${poolFilter.playerId ? renderHeroPool() : '<div class="empty-state"><div>Select a player above to view their hero pool.</div></div>'}
    </div>`;
}

function renderHeroPool() {
  if (!poolFilter.playerId) return '<div class="empty-state"><div>Select a player above.</div></div>';
  const player = allPlayers.find(p => p.id === poolFilter.playerId);
  if (!player) return '';

  const { byRole, total, games } = WDB.computePlayerHeroPool(allMatches, player.ign, {
    source: poolFilter.source,
    league: poolFilter.league,
    season: poolFilter.season,
  });

  if (!games) {
    return '<div class="empty-state"><div class="empty-icon">📭</div><div>No tagged match data found for this player.<br><span style="font-size:11px;color:var(--text3);">Tag players in Scout match entries to build their hero pool.</span></div></div>';
  }

  const LANE_COLORS = { Gold:'#C89050', Jungle:'#4CB87A', Mid:'#A888CC', EXP:'#5EA0D8', Roam:'#D87880', Unknown:'#8888AA' };
  const laneOrder   = ['Gold','Jungle','Mid','EXP','Roam','Unknown'];
  const orderedRoles = laneOrder.filter(l => byRole[l]).concat(Object.keys(byRole).filter(l => !laneOrder.includes(l)));

  const rows = orderedRoles.flatMap(lane => {
    const heroes = Object.entries(byRole[lane]).sort((a,b) => b[1].games - a[1].games);
    return heroes.map(([hero, stat]) => {
      const wr = stat.games ? Math.round(stat.wins / stat.games * 100) : 0;
      const c  = LANE_COLORS[lane] || '#888';
      const heroId = hero.toLowerCase().replace(/[^a-z0-9]/g,'');
      return `<tr>
        <td><div class="hero-name-cell">
          <img class="hero-portrait" src="./portraits/${heroId}.png" onerror="this.style.display='none'">
          ${esc(hero)}
        </div></td>
        <td><span class="lane-badge" style="background:${c}18;color:${c};border:1px solid ${c}44;">${esc(lane)}</span></td>
        <td>${stat.games}</td>
        <td>
          <div class="wr-bar-wrap">
            <div class="wr-bar"><div class="wr-bar-fill" style="width:${wr}%;background:${wr>=60?'var(--neon)':wr>=50?'var(--gold)':'var(--red)'};"></div></div>
            <span style="color:${wr>=60?'var(--neon)':wr>=50?'var(--text2)':'var(--red)'};">${wr}%</span>
          </div>
        </td>
      </tr>`;
    });
  });

  return `
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px;">${games} tagged game${games!==1?'s':''} found for <strong style="color:var(--text);">${esc(player.ign)}</strong></div>
    <div style="overflow-x:auto;">
    <table class="hero-pool-table">
      <thead><tr>
        <th>Hero</th><th>Lane</th><th>Games</th><th>Win Rate</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table></div>`;
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(name, teamName, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name)?.classList.add('active');
}

// ── Pool filter ───────────────────────────────────────────────
function setPoolPlayer(playerId) {
  poolFilter.playerId = playerId;
  document.getElementById('heroPoolContent').innerHTML = renderHeroPool();
  document.querySelectorAll('.player-select-btn').forEach(b => {
    b.classList.toggle('selected', b.getAttribute('onclick').includes(playerId));
  });
  // Update season dropdown for selected league
  updateSeasonDropdown();
}

function updatePoolFilter() {
  poolFilter.source = document.getElementById('poolSource')?.value || 'all';
  poolFilter.league = document.getElementById('poolLeague')?.value || '';
  poolFilter.season = document.getElementById('poolSeason')?.value || '';
  updateSeasonDropdown();
  if (poolFilter.playerId) document.getElementById('heroPoolContent').innerHTML = renderHeroPool();
}

function updateSeasonDropdown() {
  const sel = document.getElementById('poolSeason');
  if (!sel) return;
  const leagueName = document.getElementById('poolLeague')?.value;
  const league = leagues.find(l => l.name === leagueName);
  const filtered = league ? seasons.filter(s => s.league_id === league.id) : seasons;
  sel.innerHTML = '<option value="">All seasons</option>' +
    filtered.map(s => `<option value="${esc(s.name)}" ${poolFilter.season===s.name?'selected':''}>${esc(s.name)}</option>`).join('');
}

// ── Add / remove player ───────────────────────────────────────
function toggleAddPlayer() {
  const f = document.getElementById('addPlayerForm');
  const t = document.getElementById('addPlayerToggle');
  const isOpen = f.style.display !== 'none';
  f.style.display  = isOpen ? 'none' : 'block';
  t.style.display  = isOpen ? 'block' : 'none';
  if (!isOpen) document.getElementById('newIgN')?.focus();
}

async function addPlayer(teamName) {
  const ign      = document.getElementById('newIgN')?.value.trim();
  const realName = document.getElementById('newRealName')?.value.trim();
  const role     = document.getElementById('newRole')?.value || null;
  if (!ign) { toast('IGN required', 'error'); return; }
  try {
    const saved = await WDB.savePlayer({ ign, real_name: realName, role, team_name: teamName, is_active: true });
    allPlayers.push(saved);
    buildTeamList();
    renderTeamList();
    renderTeamDetail(teamName);
    toast(`${ign} added to ${teamName}${role ? ` (${role})` : ''}`);
  } catch(e) { toast(e.message, 'error'); }
}

async function setPlayerRole(playerId, newRole) {
  const player = allPlayers.find(p => p.id === playerId);
  if (!player) return;
  const role = newRole || null;
  try {
    const saved = await WDB.savePlayer({ ...player, role });
    Object.assign(player, saved);
    renderTeamDetail(player.team_name);
    if (document.getElementById('allPlayersView')?.style.display !== 'none') renderAllPlayers();
    toast(role ? `${player.ign} → ${role}` : `${player.ign} role cleared`);
  } catch(e) { toast(e.message, 'error'); }
}

async function togglePlayerActive(playerId, currentlyActive) {
  const player = allPlayers.find(p => p.id === playerId);
  if (!player) return;
  try {
    const updated = await WDB.savePlayer({ ...player, is_active: !currentlyActive });
    const idx = allPlayers.findIndex(p => p.id === playerId);
    if (idx !== -1) allPlayers[idx] = updated;
    renderTeamDetail(activeTeam);
    toast(updated.is_active ? `${player.ign} reactivated` : `${player.ign} benched`);
  } catch(e) { toast(e.message, 'error'); }
}

async function removePlayer(playerId, ign) {
  if (!confirm(`Remove ${ign} from the roster? This deletes the player record (match history is preserved).`)) return;
  try {
    await WDB.deletePlayer(playerId);
    allPlayers = allPlayers.filter(p => p.id !== playerId);
    buildTeamList();
    renderTeamList();
    renderTeamDetail(activeTeam);
    toast(`${ign} removed`);
  } catch(e) { toast(e.message, 'error'); }
}

// ── Add / delete team ─────────────────────────────────────────
function openAddTeam()  { document.getElementById('addTeamForm').style.display = 'block'; document.getElementById('newTeamName').focus(); }
function closeAddTeam() { document.getElementById('addTeamForm').style.display = 'none'; document.getElementById('newTeamName').value = ''; document.getElementById('newTeamRegion').value = ''; }

async function saveNewTeam() {
  const name = document.getElementById('newTeamName')?.value.trim();
  if (!name) { toast('Team name required', 'error'); return; }
  // Teams are implicit — created by adding the first player
  // Just pre-select the team name in the UI so user can add players
  if (!allTeams.find(t => t.team_name === name)) {
    allTeams.push({ team_name: name, region: '', player_count: 0 });
    allTeams.sort((a,b) => a.team_name.localeCompare(b.team_name));
  }
  closeAddTeam();
  renderTeamList();
  await selectTeam(name);
  toast(`Team "${name}" ready — add players to the roster`);
}

async function confirmDeleteTeam(teamName) {
  const count = allPlayers.filter(p => p.team_name === teamName).length;
  if (!confirm(`Delete team "${teamName}" and all ${count} player record(s)? Match history is preserved.`)) return;
  try {
    const players = allPlayers.filter(p => p.team_name === teamName);
    await Promise.all(players.map(p => WDB.deletePlayer(p.id)));
    allPlayers = allPlayers.filter(p => p.team_name !== teamName);
    buildTeamList();
    activeTeam = null;
    renderTeamList();
    document.getElementById('teamDetail').innerHTML =
      '<div class="card"><div class="empty-state"><div class="empty-icon">👥</div><div>Select a team from the list.</div></div></div>';
    toast(`Team "${teamName}" deleted`);
  } catch(e) { toast(e.message, 'error'); }
}

// ── Utils ─────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, type) {
  const t = document.getElementById('toastMsg');
  t.textContent = msg;
  if (type === 'error') t.style.borderColor = 'rgba(216,120,128,.4)';
  else t.style.borderColor = 'rgba(76,184,122,.35)';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(80px)'; }, 2800);
}
</script>

</html>
