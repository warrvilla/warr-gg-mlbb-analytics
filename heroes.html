<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heroes — Warr.GG</title>
<link rel="stylesheet" href="warr-styles.css">
<style>
/* ── Page-local styles — all tokens from warr-styles.css ── */

.heroes-intro {
  max-width: 1200px; margin: 0 auto; padding: 20px 24px 4px;
}
.heroes-intro p {
  font-size: 12px; color: var(--text3);
  letter-spacing: -0.01em; line-height: 1.55; max-width: 720px;
}

.heroes-wrap { max-width: 1200px; margin: 0 auto; padding: 16px 24px 60px; }

/* Stats strip — small glass pills, not big number cards */
.stat-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 16px;
}
@media (max-width: 700px) { .stat-strip { grid-template-columns: repeat(2, 1fr); } }
.stat-pill {
  background: var(--glass);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--r2);
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 3px;
  box-shadow: var(--glass-shadow);
  position: relative; overflow: hidden;
}
.stat-pill::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
  pointer-events: none;
}
.stat-pill .v {
  font-size: 18px; font-weight: 600; color: var(--text);
  letter-spacing: -0.02em; font-family: var(--font-head);
}
.stat-pill .l {
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.02em; font-weight: 500;
}
.stat-pill .s {
  font-size: 10px; color: var(--text2);
  letter-spacing: -0.01em;
}

/* Controls row */
.controls {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 18px;
}
.ctrl-select, .ctrl-input {
  padding: 7px 12px; font-size: 12px;
  background: rgba(118,118,128,0.14);
  border: 0.5px solid rgba(255,255,255,0.10);
  border-radius: var(--pill); color: var(--text2);
  outline: none; cursor: pointer; font-family: var(--font-body);
  letter-spacing: -0.01em; transition: all 0.18s;
}
.ctrl-select:focus, .ctrl-input:focus {
  border-color: var(--accent-border);
  background: rgba(118,118,128,0.20);
  color: var(--text);
}
.ctrl-input { width: 160px; cursor: text; }
.ctrl-input::placeholder { color: var(--text4); }

/* Hero card grid */
.hero-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
}
.hero-card {
  background: var(--glass);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--r2);
  box-shadow: var(--glass-shadow);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative; overflow: hidden;
  transition: border-color 0.18s ease, transform 0.18s ease;
}
.hero-card::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
  pointer-events: none; z-index: 1;
}
.hero-card:hover { border-color: var(--glass-border2); }
.hero-card.no-data { opacity: 0.55; }

.hero-head { display: flex; align-items: center; gap: 12px; }
.hero-portrait {
  width: 44px; height: 44px; border-radius: 12px; object-fit: cover;
  background: var(--surface3); flex-shrink: 0;
  border: 0.5px solid var(--glass-border);
}
.hero-meta { flex: 1; min-width: 0; }
.hero-name {
  font-family: var(--font-head); font-weight: 600;
  color: var(--text); font-size: 15px; letter-spacing: -0.02em;
}
.hero-role {
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.04em; margin-top: 2px;
}
.hero-gamecount {
  font-size: 10px; color: var(--text2);
  font-family: var(--font-mono);
}

.relation-block {}
.relation-label {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; font-weight: 500; color: var(--text3);
  letter-spacing: 0.04em; margin-bottom: 7px;
}

.relation-row { display: flex; gap: 6px; flex-wrap: wrap; }
.relation-item {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 10px 3px 3px; border-radius: var(--pill);
  background: rgba(255,255,255,0.04);
  border: 0.5px solid var(--border2);
  font-size: 11px; font-weight: 500; color: var(--text2);
  letter-spacing: -0.01em;
  max-width: 100%; min-width: 0;
}
.relation-item img {
  width: 22px; height: 22px; border-radius: 50%; object-fit: cover;
  background: var(--surface3); flex-shrink: 0;
}
.relation-item .wr {
  font-family: var(--font-mono); font-size: 10px;
  padding: 1px 6px; border-radius: var(--pill);
  letter-spacing: 0;
}
.relation-item .wr.high { color: var(--neon); background: var(--neon-dim); }
.relation-item .wr.mid  { color: var(--gold); background: var(--gold-dim); }
.relation-item .wr.low  { color: var(--red);  background: var(--red-dim); }
/* Low sample size — visually de-emphasize so the eye trusts well-sampled entries first.
   Hover over the badge or tooltip to see the actual game count. */
.relation-item.low-sample {
  opacity: 0.55;
  border-style: dashed;
}
.relation-item.low-sample .wr {
  filter: saturate(0.6);
}
.relation-empty {
  font-size: 11px; color: var(--text4); font-style: italic;
  letter-spacing: -0.01em;
}

/* Admin edit UI */
.edit-btn {
  position: absolute; top: 12px; right: 12px;
  padding: 3px 10px; font-size: 10px; font-weight: 500;
  letter-spacing: -0.01em; border-radius: var(--pill);
  background: rgba(255,255,255,0.06);
  border: 0.5px solid var(--border2);
  color: var(--text3); cursor: pointer;
  font-family: var(--font-body); transition: all 0.18s;
}
.edit-btn:hover {
  color: var(--gold); border-color: var(--gold-border); background: var(--gold-dim);
}
.edit-btn:not(.visible) { display: none; }

.edit-panel {
  border-top: 0.5px solid var(--border); padding-top: 12px; margin-top: 2px;
  display: none; flex-direction: column; gap: 10px;
}
.edit-panel.open { display: flex; }
.edit-block-label {
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.04em; font-weight: 500; margin-bottom: 4px;
}
.edit-selects { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.edit-selects select {
  padding: 6px 10px; font-size: 11px;
  background: rgba(118,118,128,0.14);
  border: 0.5px solid rgba(255,255,255,0.10);
  color: var(--text); border-radius: var(--r);
  outline: none; font-family: var(--font-body);
  letter-spacing: -0.01em;
}
.edit-selects select:focus { border-color: var(--accent-border); }
.edit-actions { display: flex; gap: 6px; align-items: center; }
.edit-status {
  font-size: 10px; color: var(--text3); margin-left: auto;
  font-family: var(--font-mono);
}
.edit-status.err { color: var(--red); }
.edit-status.ok  { color: var(--neon); }

/* Empty / loading */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
  letter-spacing: -0.01em;
}
.empty-icon  { font-size: 32px; margin-bottom: 10px; opacity: 0.6; }
.spin {
  display: inline-block; width: 22px; height: 22px;
  border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Page header extras (right side actions) */
.page-header .header-count {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--text3); letter-spacing: 0.02em;
}
.page-header .admin-toggle {
  display: none; align-items: center; gap: 6px;
  padding: 5px 12px; font-size: 12px; font-weight: 500;
  letter-spacing: -0.01em;
  background: rgba(200,144,80,0.10);
  border: 0.5px solid var(--gold-border);
  color: var(--gold);
  border-radius: var(--pill);
  cursor: pointer; transition: all 0.18s;
  font-family: var(--font-body);
}
.page-header .admin-toggle:hover {
  background: rgba(200,144,80,0.18);
}
.page-header .admin-toggle.on {
  background: var(--gold); color: var(--bg);
  box-shadow: 0 0 14px var(--gold-border);
}
.page-header .admin-toggle.visible { display: inline-flex; }
</style>
</head>
<body>

<!-- NAV -->
<div id="warr-nav-root"></div>

<div class="page-body">

  <!-- Sticky page header — matches scout/stats/draft pages -->
  <div class="page-header">
    <div class="page-title">Heroes</div>
    <div class="page-header-right">
      <button class="admin-toggle" id="adminToggle" onclick="toggleAdminMode()">
        <span>✎</span> Edit curation
      </button>
      <span class="header-count" id="countBadge">— heroes</span>
    </div>
  </div>

  <!-- Intro paragraph -->
  <div class="heroes-intro">
    <p>
      Counters and best-with picks per hero, computed from your Scout database
      (MPL&nbsp;PH/MY/ID/SG, MSC, M-Series only — Scrims are excluded).
      Admin-curated picks override the computed ones.
    </p>
  </div>

  <div class="heroes-wrap">

    <!-- Stats strip -->
    <div class="stat-strip" id="statsRow">
      <div class="stat-pill"><div class="spin"></div></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <select class="ctrl-select" id="roleFilter" onchange="onFilter()" title="Filter by hero class">
        <option value="">All roles</option>
        <option>Assassin</option><option>Fighter</option><option>Marksman</option>
        <option>Mage</option><option>Support</option><option>Tank</option>
      </select>
      <select class="ctrl-select" id="laneFilter" onchange="onFilter()" title="Filter by primary lane observed in Scout matches">
        <option value="">All lanes</option>
        <option value="Gold">Gold</option>
        <option value="Jungle">Jungle</option>
        <option value="Mid">Mid</option>
        <option value="EXP">EXP</option>
        <option value="Roam">Roam</option>
      </select>
      <select class="ctrl-select" id="sortBy" onchange="onFilter()">
        <option value="games">Most played</option>
        <option value="name">Name A–Z</option>
        <option value="hasData">Has Scout data</option>
      </select>
      <select class="ctrl-select" id="dataOnly" onchange="onFilter()">
        <option value="yes">Heroes with data only</option>
        <option value="no">Show all heroes</option>
      </select>
      <input class="ctrl-input" id="searchIn" placeholder="Search hero…" oninput="onFilter()">
    </div>

    <!-- Grid -->
    <div id="gridWrap">
      <div class="empty-state"><div class="spin"></div><br>Loading Scout matches…</div>
    </div>

  </div><!-- /.heroes-wrap -->

</div><!-- /.page-body -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="warr-lib.js"></script>
<script src="warr-nav.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────
let _matches        = [];
let _countersMap    = {};
let _synergiesMap   = {};
let _overrides      = {};
let _playCounts     = {};
let _heroLaneMap    = {}; // { heroName: 'Gold'|'Jungle'|'Mid'|'EXP'|'Roam' } — primary observed lane
let _adminMode      = false;

// Sample-size threshold: relations computed from fewer than this many games
// are dimmed and labeled "low confidence" in the UI.
const LOW_SAMPLE_THRESHOLD = 5;

const HEROES = (typeof WDB !== 'undefined' && WDB.HERO_ROSTER) ? WDB.HERO_ROSTER : [];

// ── Auth + admin detection ────────────────────────────────────
async function initAuth() {
  if (typeof WAuth !== 'undefined') {
    try { await WAuth.restoreSession?.(); } catch (_) {}
  }
  const email = (typeof WAuth !== 'undefined' && WAuth.getUser)
    ? (WAuth.getUser()?.email || '').toLowerCase() : '';
  if (email === 'wrrenvillapando@gmail.com') {
    document.getElementById('adminToggle').classList.add('visible');
  }
}

// ── Load everything ───────────────────────────────────────────
async function loadAll() {
  if (typeof _sbClient === 'undefined') {
    showNoData('Supabase not initialised.');
    return;
  }
  try {
    _matches = await WDB.loadMatches();
  } catch (e) {
    showNoData('Failed to load matches: ' + e.message);
    return;
  }

  const publicMatches = _matches.filter(m => WDB.PUBLIC_LEAGUES.includes(m.league));

  _countersMap  = WDB.computeScoutCountersFromMatches(publicMatches);
  _synergiesMap = WDB.computeScoutSynergiesFromMatches(publicMatches);

  // Build hero → primary lane map from observed picks, so the lane filter works
  // (heroes that were never picked have no lane and won't match a lane filter).
  const laneCounts = {};
  publicMatches.forEach(m => {
    [...(m.bluePicks || []), ...(m.redPicks || [])].forEach(p => {
      if (!p || !p.name || !p.lane) return;
      laneCounts[p.name] = laneCounts[p.name] || {};
      laneCounts[p.name][p.lane] = (laneCounts[p.name][p.lane] || 0) + 1;
    });
  });
  _heroLaneMap = {};
  Object.entries(laneCounts).forEach(([hero, lanes]) => {
    const sorted = Object.entries(lanes).sort((a, b) => b[1] - a[1]);
    if (sorted[0][1] >= 2) _heroLaneMap[hero] = sorted[0][0]; // ≥2 observations → reliable
  });

  _playCounts = {};
  publicMatches.forEach(m => {
    ['bluePicks', 'redPicks'].forEach(k => {
      (m[k] || []).forEach(p => {
        const n = p && (p.name || p);
        if (!n) return;
        _playCounts[n] = (_playCounts[n] || 0) + 1;
      });
    });
  });

  try {
    _overrides = await WDB.loadHeroRelations();
  } catch (e) {
    console.warn('loadHeroRelations failed:', e);
    _overrides = {};
  }

  renderStats(publicMatches);
  renderGrid();
}

function showNoData(msg) {
  document.getElementById('statsRow').innerHTML = '';
  document.getElementById('gridWrap').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">—</div>
      <div>${msg || 'No Scout matches yet.'}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px;">
        Import matches on the Scout page and they'll show up here.
      </div>
    </div>`;
}

// ── Stats strip ────────────────────────────────────────────────
function renderStats(matches) {
  const leagues = new Set(matches.map(m => m.league).filter(Boolean));
  const heroesWithData = new Set();
  matches.forEach(m => {
    ['bluePicks', 'redPicks'].forEach(k => {
      (m[k] || []).forEach(p => {
        const n = p && (p.name || p);
        if (n) heroesWithData.add(n);
      });
    });
  });
  const overrideCount = Object.values(_overrides).reduce((sum, o) => {
    return sum + (o.counter?.length || 0) + (o.synergy?.length || 0);
  }, 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill">
      <div class="v">${matches.length}</div>
      <div class="l">Scout matches</div>
      <div class="s">${leagues.size} league${leagues.size !== 1 ? 's' : ''}</div>
    </div>
    <div class="stat-pill">
      <div class="v">${heroesWithData.size}</div>
      <div class="l">Heroes seen</div>
      <div class="s">of ${HEROES.length} total</div>
    </div>
    <div class="stat-pill">
      <div class="v">${Object.keys(_countersMap).length}</div>
      <div class="l">With counter data</div>
      <div class="s">≥ 2 games together</div>
    </div>
    <div class="stat-pill">
      <div class="v">${overrideCount}</div>
      <div class="l">Admin overrides</div>
      <div class="s">curated picks</div>
    </div>`;
}

// ── Filter + sort ─────────────────────────────────────────────
function onFilter() { renderGrid(); }

function getFilteredHeroes() {
  const role   = document.getElementById('roleFilter').value;
  const lane   = document.getElementById('laneFilter')?.value || '';
  const sort   = document.getElementById('sortBy').value;
  const onlyD  = document.getElementById('dataOnly').value === 'yes';
  const q      = document.getElementById('searchIn').value.trim().toLowerCase();

  let list = HEROES.map(h => ({
    name: h.name || h.n,
    role: h.role || h.r || '',
    lane: _heroLaneMap[h.name || h.n] || '',
  }));

  if (role)  list = list.filter(h => h.role.includes(role));
  if (lane)  list = list.filter(h => h.lane === lane);
  if (q)     list = list.filter(h => h.name.toLowerCase().includes(q));
  if (onlyD) list = list.filter(h => _playCounts[h.name] > 0);

  list.sort((a, b) => {
    const ga = _playCounts[a.name] || 0;
    const gb = _playCounts[b.name] || 0;
    if (sort === 'name')    return a.name.localeCompare(b.name);
    if (sort === 'hasData') return (gb > 0) - (ga > 0) || gb - ga;
    return gb - ga;
  });
  return list;
}

// ── Grid render ───────────────────────────────────────────────
function renderGrid() {
  const list = getFilteredHeroes();
  document.getElementById('countBadge').textContent =
    `${list.length} hero${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    document.getElementById('gridWrap').innerHTML =
      '<div class="empty-state"><div class="empty-icon">—</div><div>No heroes match your filters.</div></div>';
    return;
  }

  document.getElementById('gridWrap').innerHTML =
    `<div class="hero-grid">${list.map(heroCardHTML).join('')}</div>`;
}

function heroCardHTML(h) {
  const games   = _playCounts[h.name] || 0;
  const hasData = games > 0;

  const over = _overrides[h.name] || { counter: [], synergy: [] };
  const useCounterOverride  = over.counter.length > 0;
  const useSynergyOverride  = over.synergy.length > 0;

  const computedCounters  = (_countersMap[h.name]  || []).slice(0, 3);
  const computedSynergies = (_synergiesMap[h.name] || []).slice(0, 3);

  const counters  = useCounterOverride
    ? over.counter.map(n => ({ name: n, _admin: true }))
    : computedCounters;
  const synergies = useSynergyOverride
    ? over.synergy.map(n => ({ name: n, _admin: true }))
    : computedSynergies;

  const portraitURL = (typeof WDB !== 'undefined' && WDB.heroPortrait)
    ? WDB.heroPortrait(h.name)
    : 'portraits/' + h.name.replace(/[^A-Za-z0-9]/g, '') + '.png';

  const heroSlug = h.name.replace(/[^A-Za-z0-9]/g, '_');

  const counterBadge = useCounterOverride
    ? '<span class="badge badge-gold">Admin pick</span>'
    : computedCounters.length
      ? '<span class="badge badge-muted">From Scout</span>'
      : '<span class="badge badge-muted">No data</span>';
  const synergyBadge = useSynergyOverride
    ? '<span class="badge badge-gold">Admin pick</span>'
    : computedSynergies.length
      ? '<span class="badge badge-muted">From Scout</span>'
      : '<span class="badge badge-muted">No data</span>';

  return `
    <div class="hero-card ${hasData ? '' : 'no-data'}" data-hero="${escHtml(h.name)}">
      <button class="edit-btn ${_adminMode ? 'visible' : ''}"
              onclick="openEdit('${escJs(h.name)}')">✎ Edit</button>

      <div class="hero-head">
        <img class="hero-portrait" src="${portraitURL}" alt="${escHtml(h.name)}"
             onerror="this.style.background='var(--surface3)';this.removeAttribute('src')">
        <div class="hero-meta">
          <div class="hero-name">${escHtml(h.name)}</div>
          <div class="hero-role">${escHtml((h.role || '—').toUpperCase())}${h.lane ? ` · ${escHtml(h.lane.toUpperCase())}` : ''}</div>
          <div class="hero-gamecount">${games} game${games !== 1 ? 's' : ''} scouted</div>
        </div>
      </div>

      <div class="relation-block">
        <div class="relation-label" title="Heroes that beat ${escHtml(h.name)} most often. % shown is the counter's win rate against ${escHtml(h.name)}.">
          <span>Counters</span>
          ${counterBadge}
        </div>
        <div class="relation-row">${relationItemsHTML(counters, 'counter', h.name)}</div>
      </div>

      <div class="relation-block">
        <div class="relation-label" title="Heroes drafted on the same team as ${escHtml(h.name)} that won most often. % shown is the pair's win rate together.">
          <span>Best with</span>
          ${synergyBadge}
        </div>
        <div class="relation-row">${relationItemsHTML(synergies, 'synergy', h.name)}</div>
      </div>

      <div class="edit-panel" id="edit_${heroSlug}">
        <div>
          <div class="edit-block-label">Counters (pick 1–3)</div>
          <div class="edit-selects" id="selCounter_${heroSlug}"></div>
        </div>
        <div>
          <div class="edit-block-label">Best with (pick 1–3)</div>
          <div class="edit-selects" id="selSynergy_${heroSlug}"></div>
        </div>
        <div class="edit-actions">
          <button class="btn btn-accent" onclick="saveEdit('${escJs(h.name)}')">Save</button>
          <button class="btn btn-ghost"  onclick="closeEdit('${escJs(h.name)}')">Cancel</button>
          <span class="edit-status" id="status_${heroSlug}"></span>
        </div>
      </div>
    </div>`;
}

function relationItemsHTML(items, kind, heroName) {
  if (!items || !items.length) {
    return '<span class="relation-empty">—</span>';
  }
  return items.map(it => {
    const name = it.name;
    const portrait = (typeof WDB !== 'undefined' && WDB.heroPortrait)
      ? WDB.heroPortrait(name)
      : 'portraits/' + name.replace(/[^A-Za-z0-9]/g, '') + '.png';
    let wrHTML = '';
    let lowSample = false;
    let tooltip = name;
    if (!it._admin && typeof it.wr === 'number') {
      const pct = Math.round(it.wr * 100);
      const cls = it.wr >= 0.60 ? 'high' : it.wr >= 0.50 ? 'mid' : 'low';
      lowSample = (it.count || 0) < LOW_SAMPLE_THRESHOLD;
      const sampleNote = lowSample ? ' ⚠' : '';
      wrHTML = `<span class="wr ${cls}">${pct}% · ${it.count}g${sampleNote}</span>`;
      // Honest tooltip — different sentence for counter vs synergy because the WR means different things
      if (kind === 'counter') {
        tooltip = `${name} won ${pct}% vs ${heroName || 'this hero'} across ${it.count} game${it.count===1?'':'s'}` +
                  (lowSample ? ` (low sample — only ${it.count} game${it.count===1?'':'s'})` : '');
      } else if (kind === 'synergy') {
        tooltip = `${heroName || 'This hero'} + ${name} won ${pct}% across ${it.count} game${it.count===1?'':'s'} together` +
                  (lowSample ? ` (low sample — only ${it.count} game${it.count===1?'':'s'})` : '');
      }
    } else if (it._admin) {
      tooltip = `${name} (admin pick)`;
    }
    return `
      <span class="relation-item${lowSample ? ' low-sample' : ''}" title="${escHtml(tooltip)}">
        <img src="${portrait}" alt="" onerror="this.style.background='var(--surface3)';this.removeAttribute('src')">
        ${escHtml(name)}
        ${wrHTML}
      </span>`;
  }).join('');
}

// ── Admin edit mode ───────────────────────────────────────────
function toggleAdminMode() {
  _adminMode = !_adminMode;
  document.getElementById('adminToggle').classList.toggle('on', _adminMode);
  document.querySelectorAll('.edit-btn').forEach(b => b.classList.toggle('visible', _adminMode));
  if (!_adminMode) {
    document.querySelectorAll('.edit-panel.open').forEach(p => p.classList.remove('open'));
  }
}

function buildEditSelects(containerId, picked, excludeHero) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const opts = HEROES
    .map(h => h.name || h.n)
    .filter(n => n && n !== excludeHero)
    .sort((a, b) => a.localeCompare(b));
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const sel = document.createElement('select');
    sel.innerHTML = '<option value="">— (none) —</option>' +
      opts.map(n => `<option value="${escHtml(n)}"${picked[i] === n ? ' selected' : ''}>${escHtml(n)}</option>`).join('');
    container.appendChild(sel);
  }
}

function openEdit(heroName) {
  const slug = heroName.replace(/[^A-Za-z0-9]/g, '_');
  const panel = document.getElementById('edit_' + slug);
  if (!panel) return;
  const over = _overrides[heroName] || { counter: [], synergy: [] };
  const seedCounters  = over.counter.length ? over.counter  : (_countersMap[heroName]  || []).slice(0, 3).map(x => x.name);
  const seedSynergies = over.synergy.length ? over.synergy  : (_synergiesMap[heroName] || []).slice(0, 3).map(x => x.name);
  buildEditSelects('selCounter_' + slug, seedCounters, heroName);
  buildEditSelects('selSynergy_' + slug, seedSynergies, heroName);
  const status = document.getElementById('status_' + slug);
  status.textContent = '';
  status.className = 'edit-status';
  panel.classList.add('open');
}

function closeEdit(heroName) {
  const slug = heroName.replace(/[^A-Za-z0-9]/g, '_');
  document.getElementById('edit_' + slug)?.classList.remove('open');
}

async function saveEdit(heroName) {
  const slug   = heroName.replace(/[^A-Za-z0-9]/g, '_');
  const status = document.getElementById('status_' + slug);
  const readSelects = (id) =>
    [...document.getElementById(id).querySelectorAll('select')]
      .map(s => s.value).filter(Boolean);

  const counters  = readSelects('selCounter_' + slug);
  const synergies = readSelects('selSynergy_' + slug);

  status.textContent = 'Saving…';
  status.className = 'edit-status';

  try {
    await WDB.saveHeroRelation(heroName, 'counter', counters);
    await WDB.saveHeroRelation(heroName, 'synergy', synergies);
    _overrides[heroName] = { counter: counters, synergy: synergies };
    status.textContent = 'Saved';
    status.className = 'edit-status ok';
    setTimeout(() => { renderGrid(); }, 300);
  } catch (e) {
    console.error(e);
    status.textContent = 'Error: ' + e.message;
    status.className = 'edit-status err';
  }
}

// ── Helpers ───────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escJs(s) {
  return String(s || '').replace(/['\\]/g, c => '\\' + c);
}

// ── Boot ──────────────────────────────────────────────────────
(async () => {
  await initAuth();
  await loadAll();
})();
</script>
