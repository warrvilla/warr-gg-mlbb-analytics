<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="assets/favicon.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heroes — Warr.GG</title>
<link rel="stylesheet" href="warr-styles.css">
<style>
/* ── Page-local styles — all tokens from warr-styles.css ── */

.heroes-intro {
  max-width: 1200px; margin: 0 auto; padding: 20px 24px 4px;
}
.heroes-intro p {
  font-size: 12px; color: var(--text3);
  letter-spacing: -0.01em; line-height: 1.55; max-width: 720px;
}

.heroes-wrap { max-width: 1200px; margin: 0 auto; padding: 16px 24px 60px; }

/* Stats strip — small glass pills, not big number cards */
.stat-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 16px;
}
@media (max-width: 700px) { .stat-strip { grid-template-columns: repeat(2, 1fr); } }
.stat-pill {
  background: var(--glass);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--r2);
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 3px;
  box-shadow: var(--glass-shadow);
  position: relative; overflow: hidden;
}
.stat-pill::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
  pointer-events: none;
}
.stat-pill .v {
  font-size: 18px; font-weight: 600; color: var(--text);
  letter-spacing: -0.02em; font-family: var(--font-head);
}
.stat-pill .l {
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.02em; font-weight: 500;
}
.stat-pill .s {
  font-size: 10px; color: var(--text2);
  letter-spacing: -0.01em;
}

/* Controls row */
.controls {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 18px;
}
.ctrl-select, .ctrl-input {
  padding: 7px 12px; font-size: 12px;
  background: rgba(118,118,128,0.14);
  border: 0.5px solid rgba(255,255,255,0.10);
  border-radius: var(--pill); color: var(--text2);
  outline: none; cursor: pointer; font-family: var(--font-body);
  letter-spacing: -0.01em; transition: all 0.18s;
}
.ctrl-select:focus, .ctrl-input:focus {
  border-color: var(--accent-border);
  background: rgba(118,118,128,0.20);
  color: var(--text);
}
.ctrl-input { width: 160px; cursor: text; }
.ctrl-input::placeholder { color: var(--text4); }

/* Secondary action button that lives in the controls row alongside selects.
   Same pill geometry as ctrl-select so the row stays visually balanced. */
.ctrl-action {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; font-size: 11px; font-weight: 600;
  background: rgba(118,118,128,0.10);
  border: 0.5px solid rgba(255,255,255,0.10);
  border-radius: var(--pill);
  color: var(--text2);
  font-family: var(--font-body);
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.18s ease;
}
.ctrl-action:hover {
  background: rgba(124,92,246,0.10);
  border-color: var(--accent-border);
  color: var(--text);
}
.ctrl-action:disabled { opacity: 0.5; cursor: not-allowed; }

/* Hero card grid */
.hero-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
}
.hero-card {
  background: var(--glass);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--r2);
  box-shadow: var(--glass-shadow);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative; overflow: hidden;
  transition: border-color 0.18s ease, transform 0.18s ease;
}
.hero-card::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
  pointer-events: none; z-index: 1;
}
.hero-card:hover { border-color: var(--glass-border2); }
.hero-card.no-data { opacity: 0.55; }

.hero-head { display: flex; align-items: center; gap: 12px; }
.hero-portrait {
  width: 44px; height: 44px; border-radius: 12px; object-fit: cover;
  background: var(--surface3); flex-shrink: 0;
  border: 0.5px solid var(--glass-border);
}
.hero-meta { flex: 1; min-width: 0; }
.hero-name {
  font-family: var(--font-head); font-weight: 600;
  color: var(--text); font-size: 15px; letter-spacing: -0.02em;
}
.hero-role {
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.04em; margin-top: 2px;
}
.hero-gamecount {
  font-size: 10px; color: var(--text2);
  font-family: var(--font-mono);
}
.map-splits {
  font-size: 9.5px; color: var(--text3);
  margin-top: 3px; line-height: 1.5;
  font-family: var(--font-body); font-weight: 500;
  letter-spacing: -0.01em;
}
.map-splits .ms-wr { font-family: var(--font-mono); font-weight: 600; }
.map-splits .ms-wr.ms-pos { color: var(--neon, #34d17a); }
.map-splits .ms-wr.ms-neg { color: var(--red, #f05252); }
.map-splits .ms-g { color: var(--text4); font-family: var(--font-mono); font-size: 9px; margin-left: 1px; }
.map-splits .ms-sep { color: var(--text4); margin: 0 4px; }
.map-splits.map-split-low { opacity: .6; }

.relation-block {}
.relation-label {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; font-weight: 500; color: var(--text3);
  letter-spacing: 0.04em; margin-bottom: 7px;
}

.relation-row { display: flex; gap: 6px; flex-wrap: wrap; }
.relation-item {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 10px 3px 3px; border-radius: var(--pill);
  background: rgba(255,255,255,0.04);
  border: 0.5px solid var(--border2);
  font-size: 11px; font-weight: 500; color: var(--text2);
  letter-spacing: -0.01em;
  max-width: 100%; min-width: 0;
}
.relation-item img {
  width: 22px; height: 22px; border-radius: 50%; object-fit: cover;
  background: var(--surface3); flex-shrink: 0;
}
.relation-item .wr {
  font-family: var(--font-mono); font-size: 10px;
  padding: 1px 6px; border-radius: var(--pill);
  letter-spacing: 0;
}
.relation-item .wr.high { color: var(--neon); background: var(--neon-dim); }
.relation-item .wr.mid  { color: var(--gold); background: var(--gold-dim); }
.relation-item .wr.low  { color: var(--red);  background: var(--red-dim); }
/* Low sample size — visually de-emphasize so the eye trusts well-sampled entries first.
   Hover over the badge or tooltip to see the actual game count. */
.relation-item.low-sample {
  opacity: 0.55;
  border-style: dashed;
}
.relation-item.low-sample .wr {
  filter: saturate(0.6);
}
.relation-empty {
  font-size: 11px; color: var(--text4); font-style: italic;
  letter-spacing: -0.01em;
}

/* Admin edit UI */
.edit-btn {
  position: absolute; top: 12px; right: 12px;
  padding: 3px 10px; font-size: 10px; font-weight: 500;
  letter-spacing: -0.01em; border-radius: var(--pill);
  background: rgba(255,255,255,0.06);
  border: 0.5px solid var(--border2);
  color: var(--text3); cursor: pointer;
  font-family: var(--font-body); transition: all 0.18s;
}
.edit-btn:hover {
  color: var(--gold); border-color: var(--gold-border); background: var(--gold-dim);
}
.edit-btn:not(.visible) { display: none; }

.edit-panel {
  border-top: 0.5px solid var(--border); padding-top: 12px; margin-top: 2px;
  display: none; flex-direction: column; gap: 10px;
}
.edit-panel.open { display: flex; }
.edit-block-label {
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.04em; font-weight: 500; margin-bottom: 4px;
}
.edit-selects { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.edit-selects select {
  padding: 6px 10px; font-size: 11px;
  background: rgba(118,118,128,0.14);
  border: 0.5px solid rgba(255,255,255,0.10);
  color: var(--text); border-radius: var(--r);
  outline: none; font-family: var(--font-body);
  letter-spacing: -0.01em;
}
.edit-selects select:focus { border-color: var(--accent-border); }
.edit-actions { display: flex; gap: 6px; align-items: center; }
.edit-status {
  font-size: 10px; color: var(--text3); margin-left: auto;
  font-family: var(--font-mono);
}
.edit-status.err { color: var(--red); }
.edit-status.ok  { color: var(--neon); }

/* Empty / loading */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
  letter-spacing: -0.01em;
}
.empty-icon  { font-size: 32px; margin-bottom: 10px; opacity: 0.6; }
.spin {
  display: inline-block; width: 22px; height: 22px;
  border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Page header extras (right side actions) */
.page-header .header-count {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--text3); letter-spacing: 0.02em;
}
.page-header .admin-toggle {
  display: none; align-items: center; gap: 6px;
  padding: 5px 12px; font-size: 12px; font-weight: 500;
  letter-spacing: -0.01em;
  background: rgba(200,144,80,0.10);
  border: 0.5px solid var(--gold-border);
  color: var(--gold);
  border-radius: var(--pill);
  cursor: pointer; transition: all 0.18s;
  font-family: var(--font-body);
}
.page-header .admin-toggle:hover {
  background: rgba(200,144,80,0.18);
}
.page-header .admin-toggle.on {
  background: var(--gold); color: var(--bg);
  box-shadow: 0 0 14px var(--gold-border);
}
.page-header .admin-toggle.visible { display: inline-flex; }

/* ── PRINT STYLES ── */
/* Browser-native print produces clean A4 pagination. We hide the chrome,
   force a 2-column grid suited to A4 width, and tell each hero card to
   never split across a page break. */
@media print {
  /* Switch to a print-friendly white background — saves toner and reads
     better on paper. Users who prefer dark can enable 'Background graphics'
     in the print dialog for the original look. */
  body { background: #fff !important; color: #111 !important; }

  /* Hide all the chrome that doesn't belong on paper */
  .topnav, .topbar, .page-header, .stat-strip, .controls,
  .admin-toggle, .edit-btn, .edit-panel, #heroesPdfBtn,
  #warr-toast, .empty-state { display: none !important; }

  /* Tighten page margins; the browser adds its own + the user can adjust */
  body { margin: 0; padding: 0; }
  .heroes-wrap { padding: 0; max-width: 100%; }

  /* 2 cards per row at A4 width — comfortable and keeps cards readable */
  .hero-grid {
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8mm !important;
  }

  /* Don't split a card across a page boundary. break-inside is the
     modern standard, page-break-inside is the older alias for compat. */
  .hero-card {
    break-inside: avoid !important;
    page-break-inside: avoid !important;
    background: #fff !important;
    border: 0.5px solid #ccc !important;
    box-shadow: none !important;
    color: #111 !important;
    margin: 0 !important;
  }

  /* Turn glass surfaces into plain backgrounds for print */
  .hero-card * { background: transparent !important; }
  .hero-card .badge { border: 0.5px solid #999 !important; color: #333 !important; }
  .hero-card .relation-item { border: 0.5px solid #ddd !important; color: #111 !important; }
  .hero-card .relation-item .wr.high { background: #d4f5dd !important; color: #137a3b !important; }
  .hero-card .relation-item .wr.mid  { background: #fbeac0 !important; color: #8a5b00 !important; }
  .hero-card .relation-item .wr.low  { background: #fadcdc !important; color: #9c1b1b !important; }
  .hero-card .hero-name { color: #111 !important; }
  .hero-card .hero-role, .hero-card .hero-gamecount,
  .hero-card .map-splits, .hero-card .relation-label { color: #444 !important; }

  /* Don't print URLs after links (default browser behaviour can be ugly) */
  a[href]::after { content: none !important; }
}

/* ── HERO DEEP-DIVE DRAWER — same glass language as the cards ── */
.hero-card { cursor: pointer; }
.drawer-backdrop {
  position: fixed; inset: 0; background: rgba(5,5,9,0.55);
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none; transition: opacity .25s ease; z-index: 80;
}
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }
.hero-drawer {
  position: fixed; top: 50%; left: 50%; width: min(560px, calc(100vw - 24px));
  max-height: min(86vh, 900px);
  background: var(--glass);
  backdrop-filter: var(--blur-lg, blur(24px)); -webkit-backdrop-filter: var(--blur-lg, blur(24px));
  border: 0.5px solid var(--glass-border);
  border-radius: var(--r3, 20px);
  box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03) inset;
  transform: translate(-50%, -50%) scale(0.96); opacity: 0; pointer-events: none;
  transition: transform .25s cubic-bezier(.32,.72,.27,1), opacity .2s ease;
  z-index: 81; overflow-y: auto; padding: 22px 22px 32px;
}
.hero-drawer.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
.dd-close {
  position: absolute; top: 14px; right: 14px; width: 28px; height: 28px;
  border-radius: var(--pill); border: 0.5px solid var(--glass-border);
  background: var(--surface3); color: var(--text2); font-size: 12px;
  cursor: pointer; transition: color .15s ease;
}
.dd-close:hover { color: var(--text); }
.dd-head { display: flex; gap: 14px; align-items: center; margin-bottom: 16px; }
.dd-portrait {
  width: 64px; height: 64px; border-radius: var(--r2); object-fit: cover;
  background: var(--surface3); border: 0.5px solid var(--glass-border); flex-shrink: 0;
}
.dd-name { font-family: var(--font-head); font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.dd-sub  { font-size: 10px; color: var(--accent); letter-spacing: 0.06em; font-weight: 600; margin-top: 2px; }
.dd-sub2 { font-size: 10px; color: var(--text3); margin-top: 2px; }
.dd-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px; }
@media (max-width: 420px) { .dd-stats { grid-template-columns: repeat(2, 1fr); } }
.dd-stat {
  background: var(--surface3); border: 0.5px solid var(--glass-border);
  border-radius: var(--r2); padding: 9px 10px; position: relative; overflow: hidden;
}
.dd-stat::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
}
.dd-stat .v { font-family: var(--font-head); font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.dd-stat .l { font-size: 9px; color: var(--text3); letter-spacing: 0.02em; margin-top: 1px; }
.dd-stat .s { font-size: 9px; color: var(--text2); }
.dd-section { margin-bottom: 18px; }
.dd-title {
  font-size: 10px; font-weight: 600; color: var(--text2);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
  padding-bottom: 5px; border-bottom: 0.5px solid var(--glass-border);
}
.dd-maprow, .dd-teamrow {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 11px; color: var(--text);
}
.dd-maprow .map-name { width: 92px; flex-shrink: 0; color: var(--text); letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-maprow .map-bar {
  flex: 1; height: 5px; border-radius: var(--pill);
  background: var(--surface3); overflow: hidden;
}
.dd-maprow .map-fill { display: block; height: 100%; border-radius: var(--pill);
  background: linear-gradient(90deg, #7C5CF6, #5E5CE6); }
.dd-maprow .map-fill.low { opacity: 0.45; }
.dd-maprow .map-fill.dim { opacity: 0.3; }
.map-wr { width: 38px; text-align: right; font-weight: 600; flex-shrink: 0; }
.map-wr.high { color: var(--green, #4ade80); }
.map-wr.mid  { color: var(--gold); }
.map-wr.low, .map-wr.dim { color: var(--text3); }
.map-g { width: 40px; text-align: right; color: var(--text3); font-size: 10px; flex-shrink: 0; }
.dd-teamrow .t-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-teamrow .t-league { font-size: 9px; color: var(--text3); flex-shrink: 0; max-width: 110px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-gamerow {
  display: flex; align-items: center; gap: 8px; padding: 5px 0;
  font-size: 10.5px; border-bottom: 0.5px solid var(--glass-border);
}
.dd-gamerow:last-child { border-bottom: none; }
.dd-gamerow .g-res {
  width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 9px;
}
.dd-gamerow.won  .g-res { background: rgba(74,222,128,.12); color: #4ade80; border: 0.5px solid rgba(74,222,128,.3); }
.dd-gamerow.lost .g-res { background: rgba(240,82,82,.10);  color: #f87171; border: 0.5px solid rgba(240,82,82,.28); }
.dd-gamerow .g-vs { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-gamerow .g-meta { color: var(--text2); flex-shrink: 0; }
.dd-gamerow .g-date { color: var(--text3); font-size: 9px; flex-shrink: 0; }
.dd-empty { font-size: 11px; color: var(--text3); padding: 6px 0; }


.meta-tier-badge{display:inline-block;font-weight:800;font-size:9px;padding:1px 6px;border-radius:6px;letter-spacing:.04em;}
.meta-tier-badge.t-Sp{background:linear-gradient(135deg,#7C5CF6,#5E5CE6);color:#fff;}
.meta-tier-badge.t-S{background:rgba(200,144,80,.18);color:#C89050;border:0.5px solid rgba(200,144,80,.4);}
.meta-tier-badge.t-A{background:rgba(94,160,216,.16);color:#5EA0D8;}
.meta-tier-badge.t-B{background:rgba(255,255,255,.06);color:var(--text2);}
.meta-tier-badge.t-C{background:rgba(255,255,255,.04);color:var(--text3);}
</style>
</head>
<body>

<!-- NAV -->
<div id="warr-nav-root"></div>

<div class="page-body">

  <!-- Intro paragraph -->
  <div class="heroes-intro">
    <p>
      Counters and best-with picks per hero, computed from your Scout database
      (MPL&nbsp;PH/MY/ID/SG, MSC, M-Series only — Scrims are excluded).
      Admin-curated picks override the computed ones.
    </p>
  </div>

  <div class="heroes-wrap">

    <!-- Stats strip — populated after matches load. Empty during initial load
         since the grid below already shows the loading spinner. -->
    <div class="stat-strip" id="statsRow"></div>

    <!-- Controls -->
    <div class="controls">
      <select class="ctrl-select" id="roleFilter" onchange="onFilter()" title="Filter by hero class">
        <option value="">All roles</option>
        <option>Assassin</option><option>Fighter</option><option>Marksman</option>
        <option>Mage</option><option>Support</option><option>Tank</option>
      </select>
      <select class="ctrl-select" id="laneFilter" onchange="onFilter()" title="Filter by primary lane observed in Scout matches">
        <option value="">All lanes</option>
        <option value="Gold">Gold</option>
        <option value="Jungle">Jungle</option>
        <option value="Mid">Mid</option>
        <option value="EXP">EXP</option>
        <option value="Roam">Roam</option>
      </select>
      <select class="ctrl-select" id="mapFilter" onchange="onMapChange()" title="Filter stats to games on a specific map">
        <option value="">All maps</option>
        <option value="Dangerous Grass">Dangerous Grass</option>
        <option value="Broken Walls">Broken Walls</option>
        <option value="Flying Cloud">Flying Cloud</option>
        <option value="Expanding River">Expanding River</option>
      </select>
      <select class="ctrl-select" id="leagueFilterH" onchange="onLeagueChange()" title="Which league's meta to show — tiers are computed from that league's scout matches">
        <option value="all">All leagues</option>
      </select>
      <select class="ctrl-select" id="seasonFilter" onchange="onSeasonChange()" title="Filter stats to games from a specific season — defaults to the admin's current season so meta-shift between seasons doesn't blend data">
        <option value="">All seasons</option>
      </select>
      <select class="ctrl-select" id="sortBy" onchange="onFilter()">
        <option value="games">Most played</option>
        <option value="name">Name A–Z</option>
        <option value="hasData">Has Scout data</option>
      </select>
      <select class="ctrl-select" id="dataOnly" onchange="onFilter()">
        <option value="yes">Heroes with data only</option>
        <option value="no">Show all heroes</option>
      </select>
      <input class="ctrl-input" id="searchIn" placeholder="Search hero…" oninput="onFilter()">
      <span class="header-count" id="countBadge" style="margin-left:auto;font-size:11px;color:var(--text3);align-self:center;white-space:nowrap;">— heroes</span>
      <div style="width:1px;height:18px;background:var(--border);margin:0 4px;" aria-hidden="true"></div>
      <button class="ctrl-action" id="heroesPdfBtn" onclick="exportHeroesPDF()" title="Export currently filtered heroes as PDF">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        Export PDF
      </button>
      <button class="admin-toggle" id="adminToggle" onclick="toggleAdminMode()" style="font-size:11px;padding:6px 12px;">
        <span>✎</span> Edit curation
      </button>
    </div>

    <!-- Grid -->
    <div id="gridWrap">
      <div class="empty-state"><div class="spin"></div><br>Loading Scout matches…</div>
    </div>

  </div><!-- /.heroes-wrap -->

</div><!-- /.page-body -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="warr-lib.js"></script>
<script src="warr-nav.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────
let _matches        = [];
let _publicMatches  = [];  // cached match pool (PUBLIC_LEAGUES filtered)
let _countersMap    = {};
let _synergiesMap   = {};
let _draftedAgainst = {}; // { [hero]: [{name, count}] } — who opponents pick when hero is on enemy team
let _overrides      = {};
let _playCounts     = {};
let _heroLaneMap    = {}; // { heroName: 'Gold'|'Jungle'|'Mid'|'EXP'|'Roam' } — primary observed lane
let _heroMapStats   = {}; // { heroName: { mapName: { games, wins } } } — per-map performance
let _adminMode      = false;
let _activeSeason   = ''; // '' = all seasons; otherwise a specific season label
let _activeLeague   = 'all'; // 'all' or a specific league name
let _metaTiers      = {};    // hero name → computed tier for current league+season scope
// Single source of truth for the scoped match pool (league + season).
function _scopedMatches() {
  let pool = _publicMatches;
  if (_activeLeague !== 'all') pool = pool.filter(m => (m.league||'') === _activeLeague);
  if (_activeSeason)           pool = pool.filter(m => (m.season||'') === _activeSeason);
  return pool;
}
// Compute a meta tier per hero from the scoped pool: pick rate + shrunk WR.
function _computeMetaTiers(pool) {
  const total = pool.length;
  // Too small a sample to assign a league/season meta tier honestly.
  if (total < 5) return {};
  const stat = {};
  pool.forEach(m => {
    [[m.bluePicks||[],'blue'],[m.redPicks||[],'red']].forEach(([picks,side]) => {
      picks.forEach(p => { const n=p&&(p.name||p); if(!n)return;
        stat[n]=stat[n]||{g:0,w:0}; stat[n].g++; if(m.winner===side) stat[n].w++; });
    });
  });
  const tiers = {};
  Object.entries(stat).forEach(([n,v]) => {
    const g = v.g;
    const pr = g/total*100;
    const wr = ((v.w + 0.5*4)/(g + 4))*100;   // shrunk WR (k=4)
    // SAMPLE GATE: a hero needs real games before WR can lift it. 1 game = C,
    // 2 = B max — no S off a lucky single match.
    tiers[n] = g < 2 ? 'C'
             : g < 3 ? 'B'
             : (pr>=30 || (pr>=18 && wr>=58)) ? 'S+'
             : (pr>=15 || (pr>=8  && wr>=55)) ? 'S'
             : (pr>=8)  ? 'A'
             : 'B';
  });
  return tiers;
}
const MAP_NAMES = ['Dangerous Grass','Broken Walls','Flying Cloud','Expanding River'];

// Sample-size threshold: relations computed from fewer than this many games
// are dimmed and labeled "low confidence" in the UI.
const LOW_SAMPLE_THRESHOLD = 5;

const HEROES = (typeof WDB !== 'undefined' && WDB.HERO_ROSTER) ? WDB.HERO_ROSTER : [];

// ── Auth + admin detection ────────────────────────────────────
async function initAuth() {
  if (typeof WAuth !== 'undefined') {
    try { await WAuth.restoreSession?.(); } catch (_) {}
  }
  const email = (typeof WAuth !== 'undefined' && WAuth.getUser)
    ? (WAuth.getUser()?.email || '').toLowerCase() : '';
  if (email === 'wrrenvillapando@gmail.com') {
    document.getElementById('adminToggle').classList.add('visible');
  }
}

// ── Load everything ───────────────────────────────────────────
async function loadAll() {
  if (typeof _sbClient === 'undefined') {
    showNoData('Supabase not initialised.');
    return;
  }
  try {
    _matches = await WDB.loadMatches();
  } catch (e) {
    showNoData('Failed to load matches: ' + e.message);
    return;
  }

  _publicMatches = _matches.filter(m => WDB.PUBLIC_LEAGUES.includes(m.league));
  // Adopt the admin's default league BEFORE first paint so Heroes opens on it.
  try {
    if (typeof WDB!=='undefined' && WDB.initLeagues) await WDB.initLeagues();
    const dm = WDB.defaultMeta ? WDB.defaultMeta() : null;
    if (dm && dm.league && dm.league!=='all') _activeLeague = dm.league;
  } catch(_) {}
  populateLeagueDropdownH();
  // Populate the Season dropdown (scoped to the active league; default season
  // = admin's current season for that league, else most-recent).
  populateSeasonDropdown();

  // Compute per-map hero stats — respects the active season filter so map
  // splits reflect the current meta's performance, not historic patches.
  _heroMapStats = {};
  const seasonScopedForMapStats = _activeSeason
    ? _publicMatches.filter(m => (m.season||'') === _activeSeason)
    : _publicMatches;
  seasonScopedForMapStats.forEach(m => {
    if (!m.map) return;
    const blueWon = m.winner === 'blue';
    [...(m.bluePicks || [])].forEach(p => {
      const n = p && (p.name || p); if (!n) return;
      _heroMapStats[n] = _heroMapStats[n] || {};
      _heroMapStats[n][m.map] = _heroMapStats[n][m.map] || { games:0, wins:0 };
      _heroMapStats[n][m.map].games++;
      if (blueWon) _heroMapStats[n][m.map].wins++;
    });
    [...(m.redPicks || [])].forEach(p => {
      const n = p && (p.name || p); if (!n) return;
      _heroMapStats[n] = _heroMapStats[n] || {};
      _heroMapStats[n][m.map] = _heroMapStats[n][m.map] || { games:0, wins:0 };
      _heroMapStats[n][m.map].games++;
      if (!blueWon) _heroMapStats[n][m.map].wins++;
    });
  });

  // Build the lane map once across the full pool — primary lane shouldn't shift
  // when the user filters by map. Lane filter still uses observed primary lane.
  const laneCounts = {};
  _publicMatches.forEach(m => {
    [...(m.bluePicks || []), ...(m.redPicks || [])].forEach(p => {
      if (!p || !p.name || !p.lane) return;
      laneCounts[p.name] = laneCounts[p.name] || {};
      laneCounts[p.name][p.lane] = (laneCounts[p.name][p.lane] || 0) + 1;
    });
  });
  _heroLaneMap = {};
  Object.entries(laneCounts).forEach(([hero, lanes]) => {
    const sorted = Object.entries(lanes).sort((a, b) => b[1] - a[1]);
    if (sorted[0][1] >= 2) _heroLaneMap[hero] = sorted[0][0];
  });

  // Counters/synergies/play-counts get recomputed per map filter change.
  recomputeForMapFilter();

  try {
    _overrides = await WDB.loadHeroRelations();
  } catch (e) {
    console.warn('loadHeroRelations failed:', e);
    _overrides = {};
  }

  const seasonScoped = _activeSeason
    ? _publicMatches.filter(m => (m.season||'') === _activeSeason)
    : _publicMatches;
  renderStats(seasonScoped);
  renderGrid();

  // Deep link: heroes.html#HeroName (homepage Meta Hierarchies cards link here)
  if (location.hash) {
    const hn = decodeURIComponent(location.hash.slice(1));
    if (hn && HEROES.some(x => x.name === hn)) setTimeout(() => openHeroDrawer(hn), 60);
  }
}

function showNoData(msg) {
  document.getElementById('statsRow').innerHTML = '';
  document.getElementById('gridWrap').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">—</div>
      <div>${msg || 'No Scout matches yet.'}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px;">
        Import matches on the Scout page and they'll show up here.
      </div>
    </div>`;
}

// ── Stats strip ────────────────────────────────────────────────
function renderStats(matches) {
  const leagues = new Set(matches.map(m => m.league).filter(Boolean));
  const heroesWithData = new Set();
  matches.forEach(m => {
    ['bluePicks', 'redPicks'].forEach(k => {
      (m[k] || []).forEach(p => {
        const n = p && (p.name || p);
        if (n) heroesWithData.add(n);
      });
    });
  });
  const overrideCount = Object.values(_overrides).reduce((sum, o) => {
    return sum + (o.counter?.length || 0) + (o.synergy?.length || 0);
  }, 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill">
      <div class="v">${matches.length}</div>
      <div class="l">Scout matches</div>
      <div class="s">${leagues.size} league${leagues.size !== 1 ? 's' : ''}</div>
    </div>
    <div class="stat-pill">
      <div class="v">${heroesWithData.size}</div>
      <div class="l">Heroes seen</div>
      <div class="s">of ${HEROES.length} total</div>
    </div>
    <div class="stat-pill">
      <div class="v">${Object.keys(_countersMap).length}</div>
      <div class="l">With counter data</div>
      <div class="s">≥ 2 games together</div>
    </div>
    <div class="stat-pill">
      <div class="v">${overrideCount}</div>
      <div class="l">Admin overrides</div>
      <div class="s">curated picks</div>
    </div>`;
}

// ── Filter + sort ─────────────────────────────────────────────
function onFilter() { renderGrid(); }

// Map filter changes alter the underlying match pool counters/synergies/play-counts
// are computed from. Recompute, then re-render.
function onMapChange() {
  recomputeForMapFilter();
  renderGrid();
}

// Season filter changes — same pattern as map. Defaults to the most-recent
// season so new-season meta-shift doesn't blend with stale data.
function populateLeagueDropdownH() {
  const sel = document.getElementById('leagueFilterH');
  if (!sel || typeof WDB==='undefined' || !WDB.officialLeagues) return;
  const cur = _activeLeague;
  sel.innerHTML = `<option value="all">All leagues</option>`
    + WDB.officialLeagues().map(n => `<option value="${n}"${cur===n?' selected':''}>${n}</option>`).join('');
}
window.addEventListener('warr-leagues-ready', populateLeagueDropdownH);
function onLeagueChange() {
  _activeLeague = document.getElementById('leagueFilterH')?.value || 'all';
  populateSeasonDropdown();           // seasons depend on league
  recomputeForMapFilter();
  renderStats(_scopedMatches());
  renderGrid();
}
function onSeasonChange() {
  _activeSeason = document.getElementById('seasonFilter')?.value || '';
  recomputeForMapFilter();
  renderStats(_publicMatches.filter(m => !_activeSeason || (m.season||'') === _activeSeason));
  renderGrid();
}

// Populate the season dropdown from observed seasons in public matches.
// Default selection = most-recent season (the analytics use case: 'show me
// current meta'). User can switch to All Seasons or a specific past season.
function populateSeasonDropdown() {
  const sel = document.getElementById('seasonFilter');
  if (!sel) return;
  const leaguePool = _activeLeague==='all' ? _publicMatches : _publicMatches.filter(m=>(m.league||'')===_activeLeague);
  const seasons = [...new Set(leaguePool.map(m => (m.season||'').trim()).filter(Boolean))]
    .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));
  // Prefer the admin's default season for this league if present, else most-recent.
  const dm = (typeof WDB!=='undefined' && WDB.defaultMeta) ? WDB.defaultMeta() : {league:'all',season:''};
  const adminSeason = (dm.league===_activeLeague && dm.season && seasons.includes(dm.season)) ? dm.season : '';
  const pick = (_activeSeason && seasons.includes(_activeSeason)) ? _activeSeason : (adminSeason || seasons[0] || '');
  sel.innerHTML = `<option value="">All seasons</option>`
    + seasons.map(s => `<option value="${s}" ${s===pick?'selected':''}>${s}${s===adminSeason?' (current)':''}</option>`).join('');
  _activeSeason = pick;
}

// Re-derive _countersMap, _synergiesMap, _playCounts from _publicMatches filtered
// by the current Map filter ('' = all maps). Called once at load and again on
// every Map dropdown change.
function recomputeForMapFilter() {
  const mapSel = document.getElementById('mapFilter')?.value || '';
  // Apply BOTH map and season filters to the match pool. Season default is
  // most-recent so out-of-date patch data doesn't bleed into current analytics.
  let pool = _scopedMatches();
  if (mapSel)        pool = pool.filter(m => (m.map||'') === mapSel);
  _metaTiers = _computeMetaTiers(_scopedMatches()); // tier ignores map filter
  _countersMap   = WDB.computeScoutCountersFromMatches(pool);
  _synergiesMap  = WDB.computeScoutSynergiesFromMatches(pool);
  _draftedAgainst = WDB.computeDraftedAgainstFromMatches?.(pool) || {};
  _playCounts = {};
  pool.forEach(m => {
    ['bluePicks', 'redPicks'].forEach(k => {
      (m[k] || []).forEach(p => {
        const n = p && (p.name || p);
        if (!n) return;
        _playCounts[n] = (_playCounts[n] || 0) + 1;
      });
    });
  });
}

function getFilteredHeroes() {
  const role   = document.getElementById('roleFilter').value;
  const lane   = document.getElementById('laneFilter')?.value || '';
  const sort   = document.getElementById('sortBy').value;
  const onlyD  = document.getElementById('dataOnly').value === 'yes';
  const q      = document.getElementById('searchIn').value.trim().toLowerCase();

  let list = HEROES.map(h => {
    const name = h.name || h.n;
    const heroRole = h.role || h.r || '';
    // Scout-observed lane wins; otherwise fall back to the static default lanes
    // from warr-lib so heroes that haven't been picked yet still appear under
    // their natural lane filter (Phoveus → EXP, Lancelot → Jungle, etc.).
    const observedLane = _heroLaneMap[name] || '';
    const defaultLanes = (typeof WDB !== 'undefined' && WDB.getHeroLanes)
      ? WDB.getHeroLanes(name, heroRole) : [];
    const allLanes = observedLane ? [observedLane] : defaultLanes;
    return { name, role: heroRole, lane: observedLane, allLanes };
  });

  if (role)  list = list.filter(h => h.role.includes(role));
  if (lane)  list = list.filter(h => h.allLanes.includes(lane));
  if (q)     list = list.filter(h => h.name.toLowerCase().includes(q));
  if (onlyD) list = list.filter(h => _playCounts[h.name] > 0);

  list.sort((a, b) => {
    const ga = _playCounts[a.name] || 0;
    const gb = _playCounts[b.name] || 0;
    if (sort === 'name')    return a.name.localeCompare(b.name);
    if (sort === 'hasData') return (gb > 0) - (ga > 0) || gb - ga;
    return gb - ga;
  });
  return list;
}

// ── Grid render ───────────────────────────────────────────────
function renderGrid() {
  const list = getFilteredHeroes();
  document.getElementById('countBadge').textContent =
    `${list.length} hero${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    document.getElementById('gridWrap').innerHTML =
      '<div class="empty-state"><div class="empty-icon">—</div><div>No heroes match your filters.</div></div>';
    return;
  }

  document.getElementById('gridWrap').innerHTML =
    `<div class="hero-grid">${list.map(heroCardHTML).join('')}</div>`;
}

function heroCardHTML(h) {
  const games   = _playCounts[h.name] || 0;
  const hasData = games > 0;

  const over = _overrides[h.name] || { counter: [], synergy: [] };
  const useCounterOverride  = over.counter.length > 0;
  const useSynergyOverride  = over.synergy.length > 0;

  const computedCounters  = (_countersMap[h.name]  || []).slice(0, 5);
  const computedSynergies = (_synergiesMap[h.name] || []).slice(0, 5);
  // Drafted-against: pure behavioral signal — what enemy teams actually
  // pick when this hero is on the board, regardless of WR outcome.
  const draftedAgainst = (_draftedAgainst[h.name] || []).slice(0, 5);

  const counters  = useCounterOverride
    ? over.counter.map(n => ({ name: n, _admin: true }))
    : computedCounters;
  const synergies = useSynergyOverride
    ? over.synergy.map(n => ({ name: n, _admin: true }))
    : computedSynergies;

  const portraitURL = (typeof WDB !== 'undefined' && WDB.heroPortrait)
    ? WDB.heroPortrait(h.name)
    : 'portraits/' + h.name.replace(/[^A-Za-z0-9]/g, '') + '.png';

  const heroSlug = h.name.replace(/[^A-Za-z0-9]/g, '_');

  const counterBadge = useCounterOverride
    ? '<span class="badge badge-gold">Admin pick</span>'
    : computedCounters.length
      ? '<span class="badge badge-muted">From Scout</span>'
      : '<span class="badge badge-muted">No data</span>';
  const synergyBadge = useSynergyOverride
    ? '<span class="badge badge-gold">Admin pick</span>'
    : computedSynergies.length
      ? '<span class="badge badge-muted">From Scout</span>'
      : '<span class="badge badge-muted">No data</span>';

  return `
    <div class="hero-card ${hasData ? '' : 'no-data'}" data-hero="${escHtml(h.name)}" onclick="openHeroDrawer('${escJs(h.name)}')">
      <button class="edit-btn ${_adminMode ? 'visible' : ''}"
              onclick="event.stopPropagation();openEdit('${escJs(h.name)}')">✎ Edit</button>

      <div class="hero-head">
        <img class="hero-portrait" src="${portraitURL}" alt="${escHtml(h.name)}"
             loading="lazy" decoding="async" width="44" height="44"
             onerror="this.style.background='var(--surface3)';this.removeAttribute('src')">
        <div class="hero-meta">
          <div class="hero-name">${escHtml(h.name)}</div>
          <div class="hero-role">${escHtml((h.role || '—').toUpperCase())}${h.lane ? ` · ${escHtml(h.lane.toUpperCase())}` : ''}</div>
          <div class="hero-gamecount">${games} game${games !== 1 ? 's' : ''} scouted${_metaTiers[h.name] && games>0 ? ` · <span class="meta-tier-badge t-${_metaTiers[h.name].replace('+','p')}">${_metaTiers[h.name]}</span>` : ''}</div>
          ${mapSplitsHTML(h.name)}
        </div>
      </div>

      <div class="relation-block">
        <div class="relation-label" title="Heroes that beat ${escHtml(h.name)} most often. % shown is the counter's win rate against ${escHtml(h.name)}.">
          <span>Counters</span>
          ${counterBadge}
        </div>
        <div class="relation-row">${relationItemsHTML(counters, 'counter', h.name)}</div>
      </div>

      <div class="relation-block">
        <div class="relation-label" title="Heroes drafted on the same team as ${escHtml(h.name)} that won most often. % shown is the pair's win rate together.">
          <span>Best with</span>
          ${synergyBadge}
        </div>
        <div class="relation-row">${relationItemsHTML(synergies, 'synergy', h.name)}</div>
      </div>

      <div class="relation-block">
        <div class="relation-label" title="When opponents see ${escHtml(h.name)} on the enemy team, these are the heroes they most often pick in response — pure draft-habit signal, not win-rate.">
          <span>Drafted against</span>
          ${draftedAgainst.length
            ? '<span class="badge badge-muted">From Scout</span>'
            : '<span class="badge badge-muted">No data</span>'}
        </div>
        <div class="relation-row">${relationItemsHTML(draftedAgainst, 'response', h.name)}</div>
      </div>

      <div class="edit-panel" id="edit_${heroSlug}" onclick="event.stopPropagation()">
        <div>
          <div class="edit-block-label">Counters (pick 1–3)</div>
          <div class="edit-selects" id="selCounter_${heroSlug}"></div>
        </div>
        <div>
          <div class="edit-block-label">Best with (pick 1–3)</div>
          <div class="edit-selects" id="selSynergy_${heroSlug}"></div>
        </div>
        <div class="edit-actions">
          <button class="btn btn-accent" onclick="saveEdit('${escJs(h.name)}')">Save</button>
          <button class="btn btn-ghost"  onclick="closeEdit('${escJs(h.name)}')">Cancel</button>
          <span class="edit-status" id="status_${heroSlug}"></span>
        </div>
      </div>
    </div>`;
}

// Build a compact best/worst-map line for a hero card. Suppresses maps with
// fewer than 2 games (noise), and omits the line entirely when no map has
// enough data — keeps cards clean for low-sample heroes.
function mapSplitsHTML(heroName) {
  const stats = _heroMapStats[heroName];
  if (!stats) return '';
  const usable = Object.entries(stats)
    .filter(([_, s]) => s.games >= 2)
    .map(([map, s]) => ({ map, games: s.games, wr: Math.round(s.wins/s.games*100) }));
  if (!usable.length) return '';
  const byWR = [...usable].sort((a,b) => b.wr - a.wr);
  const best = byWR[0];
  const worst = byWR.length > 1 ? byWR[byWR.length - 1] : null;
  const lowConf = best.games < 5 ? ' map-split-low' : '';
  if (!worst || best.map === worst.map) {
    return `<div class="map-splits${lowConf}">Best ${escHtml(best.map)} <span class="ms-wr ms-pos">${best.wr}%</span> <span class="ms-g">${best.games}g</span></div>`;
  }
  return `<div class="map-splits${lowConf}">
    Best ${escHtml(best.map)} <span class="ms-wr ms-pos">${best.wr}%</span> <span class="ms-g">${best.games}g</span>
    <span class="ms-sep">·</span>
    Worst ${escHtml(worst.map)} <span class="ms-wr ms-neg">${worst.wr}%</span> <span class="ms-g">${worst.games}g</span>
  </div>`;
}

function relationItemsHTML(items, kind, heroName) {
  if (!items || !items.length) {
    return '<span class="relation-empty">—</span>';
  }
  return items.map(it => {
    const name = it.name;
    const portrait = (typeof WDB !== 'undefined' && WDB.heroPortrait)
      ? WDB.heroPortrait(name)
      : 'portraits/' + name.replace(/[^A-Za-z0-9]/g, '') + '.png';
    let wrHTML = '';
    let lowSample = false;
    let tooltip = name;
    if (!it._admin && typeof it.wr === 'number') {
      const pct = Math.round(it.wr * 100);
      const cls = it.wr >= 0.60 ? 'high' : it.wr >= 0.50 ? 'mid' : 'low';
      lowSample = (it.count || 0) < LOW_SAMPLE_THRESHOLD;
      const sampleNote = lowSample ? ' ⚠' : '';
      wrHTML = `<span class="wr ${cls}">${pct}% · ${it.count}g${sampleNote}</span>`;
      // Honest tooltip — wording differs per relation kind because the WR
      // semantically means something different in each context.
      if (kind === 'counter') {
        tooltip = `${name} won ${pct}% vs ${heroName || 'this hero'} across ${it.count} game${it.count===1?'':'s'}` +
                  (lowSample ? ` (low sample — only ${it.count} game${it.count===1?'':'s'})` : '');
      } else if (kind === 'synergy') {
        tooltip = `${heroName || 'This hero'} + ${name} won ${pct}% across ${it.count} game${it.count===1?'':'s'} together` +
                  (lowSample ? ` (low sample — only ${it.count} game${it.count===1?'':'s'})` : '');
      } else if (kind === 'response') {
        tooltip = `${name} was drafted against ${heroName || 'this hero'} ${it.count} time${it.count===1?'':'s'} — won ${pct}% (high % = effective response)` +
                  (lowSample ? ` · low sample` : '');
      }
    } else if (it._admin) {
      tooltip = `${name} (admin pick)`;
    }
    return `
      <span class="relation-item${lowSample ? ' low-sample' : ''}" title="${escHtml(tooltip)}">
        <img src="${portrait}" alt="" loading="lazy" decoding="async" width="22" height="22"
             onerror="this.style.background='var(--surface3)';this.removeAttribute('src')">
        ${escHtml(name)}
        ${wrHTML}
      </span>`;
  }).join('');
}


// ── HERO DEEP-DIVE DRAWER ─────────────────────────────────────
// Everything is computed from the same season-scoped public pool the cards
// use, so the drawer never disagrees with the grid.
function _drawerPool() {
  return _activeSeason ? _publicMatches.filter(m => (m.season||'') === _activeSeason) : _publicMatches;
}
function _banNamesDD(m) {
  return [...(m.blueBans||[]), ...(m.redBans||[])].map(b => typeof b === 'string' ? b : (b && b.name) || '').filter(Boolean);
}
function _inPicksDD(picks, name) { return (picks||[]).some(p => p && (p.name || p) === name); }

function openHeroDrawer(name) {
  const drawer = document.getElementById('heroDrawer');
  const backdrop = document.getElementById('drawerBackdrop');
  if (!drawer || !backdrop) return;
  const pool = _drawerPool();
  const total = pool.length || 1;

  // Per-game rows for this hero
  const rows = [];
  pool.forEach(m => {
    const inB = _inPicksDD(m.bluePicks, name), inR = _inPicksDD(m.redPicks, name);
    if (!inB && !inR) return;
    const side = inB ? 'blue' : 'red';
    const picks = inB ? m.bluePicks : m.redPicks;
    const entry = (picks||[]).find(p => p && (p.name || p) === name) || {};
    const idx = (picks||[]).findIndex(p => p && (p.name || p) === name);
    rows.push({ m, side, won: m.winner === side, lane: entry.lane || '', idx: idx >= 0 ? idx : null,
      team: side === 'blue' ? (m.blueTeam || '?') : (m.redTeam || '?'),
      opp:  side === 'blue' ? (m.redTeam  || '?') : (m.blueTeam || '?') });
  });

  const games = rows.length, wins = rows.filter(r => r.won).length;
  const bans = pool.filter(m => _banNamesDD(m).includes(name)).length;
  const wr = games ? Math.round(wins / games * 100) : 0;
  const pr = Math.round(games / total * 100), br = Math.round(bans / total * 100);
  const presence = Math.min(100, Math.round((games + bans) / total * 100));
  const posVals = rows.map(r => r.idx).filter(i => i !== null);
  const avgPos = posVals.length ? posVals.reduce((a,b) => a+b, 0) / posVals.length : null;
  const posLabel = avgPos === null ? '—' : avgPos <= 1.3 ? 'P1 priority' : avgPos >= 2.8 ? 'Counter-pick tool' : 'Mid-draft';
  const blue = rows.filter(r => r.side === 'blue'), red = rows.filter(r => r.side === 'red');
  const sideCell = (arr, label) => {
    const g = arr.length, w = arr.filter(r => r.won).length;
    return `<div class="dd-stat"><div class="v">${g ? Math.round(w/g*100) + '%' : '—'}</div><div class="l">${label}</div><div class="s">${g}g</div></div>`;
  };

  // ALL maps — full table, sample size visible, <2g flagged
  const mapAgg = {};
  rows.forEach(r => { const mp = r.m.map || 'Unknown'; if (!mapAgg[mp]) mapAgg[mp] = { g:0, w:0 }; mapAgg[mp].g++; if (r.won) mapAgg[mp].w++; });
  const mapRows = Object.entries(mapAgg).sort((a,b) => b[1].g - a[1].g).map(([mp, v]) => {
    const w = Math.round(v.w / v.g * 100);
    const cls = v.g < 2 ? 'dim' : w >= 60 ? 'high' : w >= 50 ? 'mid' : 'low';
    return `<div class="dd-maprow"><span class="map-name" title="${escHtml(mp)}">${escHtml(mp)}</span>
      <span class="map-bar"><span class="map-fill ${cls}" style="width:${w}%"></span></span>
      <span class="map-wr ${cls}">${w}%</span><span class="map-g">${v.g}g${v.g < 2 ? ' ⚠' : ''}</span></div>`;
  }).join('') || '<div class="dd-empty">No map data for this hero yet.</div>';

  // Who plays it — comfort detection for target bans
  const teamAgg = {};
  rows.forEach(r => { if (!teamAgg[r.team]) teamAgg[r.team] = { g:0, w:0, lg:new Set() }; teamAgg[r.team].g++; if (r.won) teamAgg[r.team].w++; teamAgg[r.team].lg.add(r.m.league || ''); });
  const teamRows = Object.entries(teamAgg).sort((a,b) => b[1].g - a[1].g).slice(0, 8).map(([t, v]) => {
    const w = Math.round(v.w / v.g * 100);
    const cls = w >= 60 ? 'high' : w >= 50 ? 'mid' : 'low';
    return `<div class="dd-teamrow"><span class="t-name" title="${escHtml(t)}">${escHtml(t)}</span><span class="t-league">${escHtml([...v.lg].filter(Boolean).join(', '))}</span><span class="map-wr ${cls}">${w}%</span><span class="map-g">${v.g}g</span></div>`;
  }).join('') || '<div class="dd-empty">—</div>';

  // Season trend — across all seasons regardless of the page filter
  const seasonAgg = {};
  _publicMatches.forEach(m => {
    const inB = _inPicksDD(m.bluePicks, name), inR = _inPicksDD(m.redPicks, name);
    if (!inB && !inR) return;
    const sk = m.season || '—';
    if (!seasonAgg[sk]) seasonAgg[sk] = { g:0, w:0 };
    seasonAgg[sk].g++;
    if (m.winner === (inB ? 'blue' : 'red')) seasonAgg[sk].w++;
  });
  const seasonRows = Object.entries(seasonAgg)
    .sort((a,b) => String(a[0]).localeCompare(String(b[0]), undefined, { numeric:true }))
    .map(([sk, v]) => {
      const w = Math.round(v.w / v.g * 100);
      const cls = w >= 60 ? 'high' : w >= 50 ? 'mid' : 'low';
      return `<div class="dd-maprow"><span class="map-name">${escHtml(sk)}</span><span class="map-bar"><span class="map-fill ${cls}" style="width:${w}%"></span></span><span class="map-wr ${cls}">${w}%</span><span class="map-g">${v.g}g</span></div>`;
    }).join('');

  // Recent games — newest first
  const recent = [...rows]
    .sort((a,b) => String(b.m.date||'').localeCompare(String(a.m.date||'')))
    .slice(0, 8).map(r => {
      const d = (r.m.date || '').slice(0, 10);
      return `<div class="dd-gamerow ${r.won ? 'won' : 'lost'}">
        <span class="g-res">${r.won ? 'W' : 'L'}</span>
        <span class="g-vs">${escHtml(r.team)} vs ${escHtml(r.opp)}</span>
        <span class="g-meta">${escHtml(r.lane || '?')}${r.m.map ? ' · ' + escHtml(r.m.map) : ''}</span>
        <span class="g-date">${escHtml(r.m.league || '')}${d ? ' · ' + d : ''}</span>
      </div>`;
    }).join('') || '<div class="dd-empty">No games yet.</div>';

  const counters  = (_countersMap[name]  || []).slice(0, 8);
  const synergies = (_synergiesMap[name] || []).slice(0, 8);
  const against   = (_draftedAgainst[name] || []).slice(0, 8);
  const portraitURL = (typeof WDB !== 'undefined' && WDB.heroPortrait)
    ? WDB.heroPortrait(name)
    : 'portraits/' + name.replace(/[^A-Za-z0-9]/g, '') + '.png';
  const hero = HEROES.find(x => x.name === name) || {};

  drawer.innerHTML = `
    <button class="dd-close" onclick="closeHeroDrawer()" aria-label="Close">✕</button>
    <div class="dd-head">
      <img class="dd-portrait" src="${portraitURL}" alt="" onerror="this.style.background='var(--surface3)';this.removeAttribute('src')">
      <div>
        <div class="dd-name">${escHtml(name)}</div>
        <div class="dd-sub">${escHtml((hero.role || '—').toUpperCase())}${_heroLaneMap[name] ? ' · ' + escHtml(_heroLaneMap[name].toUpperCase()) : ''}</div>
        <div class="dd-sub2">${games} game${games !== 1 ? 's' : ''} scouted · ${_activeSeason ? escHtml(_activeSeason) : 'all seasons'}</div>
      </div>
    </div>
    <div class="dd-stats">
      <div class="dd-stat"><div class="v">${wr}%</div><div class="l">Win rate</div><div class="s">${games}g</div></div>
      <div class="dd-stat"><div class="v">${pr}%</div><div class="l">Pick rate</div><div class="s">${games} picks</div></div>
      <div class="dd-stat"><div class="v">${br}%</div><div class="l">Ban rate</div><div class="s">${bans} bans</div></div>
      <div class="dd-stat"><div class="v">${presence}%</div><div class="l">Presence</div><div class="s">pick + ban</div></div>
      ${sideCell(blue, 'Blue side')}
      ${sideCell(red, 'Red side')}
      <div class="dd-stat"><div class="v">${avgPos === null ? '—' : avgPos.toFixed(1)}</div><div class="l">Avg pick pos</div><div class="s">${posLabel}</div></div>
      <div class="dd-stat"><div class="v">${Object.keys(teamAgg).length}</div><div class="l">Teams run it</div><div class="s">in scout data</div></div>
    </div>
    <div class="dd-section"><div class="dd-title">Map performance</div>${mapRows}</div>
    <div class="dd-section"><div class="dd-title">Who plays it</div>${teamRows}</div>
    <div class="dd-section"><div class="dd-title">Countered by</div><div class="relation-row">${relationItemsHTML(counters, 'counter', name)}</div></div>
    <div class="dd-section"><div class="dd-title">Best with</div><div class="relation-row">${relationItemsHTML(synergies, 'synergy', name)}</div></div>
    <div class="dd-section"><div class="dd-title">Drafted against it</div><div class="relation-row">${relationItemsHTML(against, 'response', name)}</div></div>
    ${seasonRows ? `<div class="dd-section"><div class="dd-title">Season trend</div>${seasonRows}</div>` : ''}
    <div class="dd-section"><div class="dd-title">Recent games</div>${recent}</div>`;

  drawer.classList.add('open');
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  try { history.replaceState(null, '', '#' + encodeURIComponent(name)); } catch(_) {}
}

function closeHeroDrawer() {
  document.getElementById('heroDrawer')?.classList.remove('open');
  document.getElementById('drawerBackdrop')?.classList.remove('open');
  document.body.style.overflow = '';
  try { history.replaceState(null, '', location.pathname + location.search); } catch(_) {}
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeHeroDrawer(); });

// ── Export PDF ────────────────────────────────────────────────
// Browser-native print is the right tool for the Heroes grid because:
//  (1) the list is potentially 100+ cards — needs proper A4 pagination
//  (2) @media print styles let us hide chrome and force card-aware page breaks
//  (3) user can save as PDF or print to paper from the same dialog
// Force-load any lazy images first so they render on the printed pages.
async function exportHeroesPDF() {
  const btn = document.getElementById('heroesPdfBtn');
  if (btn) { btn.textContent = 'Preparing…'; btn.disabled = true; }
  try {
    // Force-load lazy portraits so they're visible on every printed page.
    const grid = document.getElementById('gridWrap');
    if (grid) {
      const imgs = [...grid.querySelectorAll('img[loading="lazy"]')];
      imgs.forEach(img => { img.loading = 'eager'; });
      // Wait briefly for them to fetch; print after a short delay so layout settles.
      await new Promise(r => setTimeout(r, 250));
      await Promise.all(imgs.map(img => new Promise(res => {
        if (img.complete && img.naturalWidth > 0) return res();
        const done = () => res();
        img.addEventListener('load', done, { once: true });
        img.addEventListener('error', done, { once: true });
        setTimeout(done, 1500);
      })));
    }
    // Set a print-time title so the saved PDF gets a sensible filename.
    const role = document.getElementById('roleFilter')?.value || '';
    const lane = document.getElementById('laneFilter')?.value || '';
    const map  = document.getElementById('mapFilter')?.value || '';
    const safe = s => (s||'').replace(/[^a-z0-9]/gi, '_');
    const parts = ['Warr.GG_Heroes'];
    if (role) parts.push(safe(role));
    if (lane) parts.push(safe(lane));
    if (map)  parts.push(safe(map));
    const prevTitle = document.title;
    document.title = parts.join('_');
    window.print();
    // Restore title shortly after the print dialog returns.
    setTimeout(() => { document.title = prevTitle; }, 1000);
  } catch(e) {
    console.error('Heroes print error:', e);
    _toastLite('Print failed: ' + (e?.message || 'unknown error'));
  }
  if (btn) { btn.textContent = 'Export PDF'; btn.disabled = false; }
}
function _toastLite(msg) {
  // Minimal toast since heroes.html doesn't already have one.
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:0.5px solid var(--border3);color:var(--text);padding:10px 18px;border-radius:10px;z-index:9999;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Admin edit mode ───────────────────────────────────────────
function toggleAdminMode() {
  _adminMode = !_adminMode;
  document.getElementById('adminToggle').classList.toggle('on', _adminMode);
  document.querySelectorAll('.edit-btn').forEach(b => b.classList.toggle('visible', _adminMode));
  if (!_adminMode) {
    document.querySelectorAll('.edit-panel.open').forEach(p => p.classList.remove('open'));
  }
}

function buildEditSelects(containerId, picked, excludeHero) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const opts = HEROES
    .map(h => h.name || h.n)
    .filter(n => n && n !== excludeHero)
    .sort((a, b) => a.localeCompare(b));
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const sel = document.createElement('select');
    sel.innerHTML = '<option value="">— (none) —</option>' +
      opts.map(n => `<option value="${escHtml(n)}"${picked[i] === n ? ' selected' : ''}>${escHtml(n)}</option>`).join('');
    container.appendChild(sel);
  }
}

function openEdit(heroName) {
  const slug = heroName.replace(/[^A-Za-z0-9]/g, '_');
  const panel = document.getElementById('edit_' + slug);
  if (!panel) return;
  const over = _overrides[heroName] || { counter: [], synergy: [] };
  const seedCounters  = over.counter.length ? over.counter  : (_countersMap[heroName]  || []).slice(0, 5).map(x => x.name);
  const seedSynergies = over.synergy.length ? over.synergy  : (_synergiesMap[heroName] || []).slice(0, 5).map(x => x.name);
  buildEditSelects('selCounter_' + slug, seedCounters, heroName);
  buildEditSelects('selSynergy_' + slug, seedSynergies, heroName);
  const status = document.getElementById('status_' + slug);
  status.textContent = '';
  status.className = 'edit-status';
  panel.classList.add('open');
}

function closeEdit(heroName) {
  const slug = heroName.replace(/[^A-Za-z0-9]/g, '_');
  document.getElementById('edit_' + slug)?.classList.remove('open');
}

async function saveEdit(heroName) {
  const slug   = heroName.replace(/[^A-Za-z0-9]/g, '_');
  const status = document.getElementById('status_' + slug);
  const readSelects = (id) =>
    [...document.getElementById(id).querySelectorAll('select')]
      .map(s => s.value).filter(Boolean);

  const counters  = readSelects('selCounter_' + slug);
  const synergies = readSelects('selSynergy_' + slug);

  status.textContent = 'Saving…';
  status.className = 'edit-status';

  try {
    await WDB.saveHeroRelation(heroName, 'counter', counters);
    await WDB.saveHeroRelation(heroName, 'synergy', synergies);
    _overrides[heroName] = { counter: counters, synergy: synergies };
    status.textContent = 'Saved';
    status.className = 'edit-status ok';
    setTimeout(() => { renderGrid(); }, 300);
  } catch (e) {
    console.error(e);
    status.textContent = 'Error: ' + e.message;
    status.className = 'edit-status err';
  }
}

// ── Helpers ───────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escJs(s) {
  return String(s || '').replace(/['\\]/g, c => '\\' + c);
}

// ── Boot ──────────────────────────────────────────────────────
(async () => {
  await initAuth();
  await loadAll();
})();
</script>
<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeHeroDrawer()"></div>
<aside class="hero-drawer" id="heroDrawer" aria-label="Hero deep dive"></aside>
</body>
</html>
